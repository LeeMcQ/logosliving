const SING=[
["Jesus","Yahweh","Jesus performed over 37 recorded miracles including turning water into wine, walking on water, and raising the dead. The name Jesus (Yeshua in Hebrew) literally means 'God saves' — His very name declares His mission to rescue humanity from sin. Jesus was likely a carpenter who worked with stone as well as wood, since the Greek word 'tekton' means craftsman of hard materials.","The personal name of God revealed to Moses, meaning 'I AM WHO I AM' "+F[0]+" "+F[1]+" "+F[6]+""],
["Lord","Messiah","In the Old Testament, 'LORD' in all capitals represents God's personal name Yahweh, used over 6,800 times. Calling Jesus 'Lord' (Greek: Kyrios) was a radical claim of deity, since Kyrios was used in Greek translations for Yahweh. Roman emperors demanded to be called 'Lord' — early Christians were martyred for refusing, saying only Jesus is Lord.","The anointed one; the promised deliverer of Israel, fulfilled in Jesus Christ "+F[1]+" "+F[2]+" "+F[6]+""],
["God","Immanuel","The Bible uses over 900 different names and titles for God, each revealing a different aspect of His character. God exists as a Trinity — three persons (Father, Son, Holy Spirit) sharing one divine nature, a mystery beyond full human comprehension. The Hebrew word 'Elohim' used for God in Genesis 1 is actually a plural noun, hinting at the Trinity from the very first verse.","'God with us' — the prophetic name given to Jesus (Isaiah 7:14) "+F[0]+" "+F[1]+" "+F[6]+""],
["Love","Exalt","The Bible says 'God is love' (1 John 4:8) — love is not just something God does, it is the very essence of who He is. The Greek New Testament uses four different words for love: agape (unconditional), phileo (friendship), storge (family), and eros (romantic). The 'love chapter' (1 Corinthians 13) was written to a church full of conflict — Paul was teaching that spiritual gifts mean nothing without genuine love.","To raise in rank, power, or character; to lift God high in worship and praise "+F[2]+" "+F[0]+" "+F[11]+""],
["Praise","Magnify","The book of Psalms contains 150 songs of praise, and the word 'hallelujah' (praise the Lord) appears throughout as the ultimate expression of worship. Seven Hebrew words are translated as 'praise' in English, each with a different meaning — from loud shouting (halal) to quiet reflection (yadah) to physical dancing (machol). The walls of Jericho fell not by military force but by praise — the priests blew trumpets and the people shouted, and God brought the walls down flat.","To declare the greatness of God; to make His name larger in our hearts and lives "+F[2]+" "+F[0]+" "+F[12]+""],
["Worship","Rejoice","The English word 'worship' comes from 'worth-ship' — declaring the worth and value of the one being praised. True worship is not about music style or location — Jesus told the Samaritan woman that God seeks worshippers who worship 'in spirit and in truth' (John 4:24). The first recorded act of worship in the Bible is Abel's offering in Genesis 4 — and it cost him his life when his brother Cain became jealous.","To feel or show great joy and delight, especially in God's goodness and salvation "+F[2]+" "+F[0]+" "+F[8]+""],
["Holy","Celebrate","The word 'holy' means set apart, pure, and dedicated to God — it is God's most essential attribute, repeated as 'holy, holy, holy' in Isaiah 6 and Revelation 4. God is the only being whose attribute is repeated three times (holy, holy, holy) — this 'trisagion' emphasises that holiness is the foundation of all God's other attributes. In the original Hebrew, 'holy' (qadosh) was a commercial term meaning 'to cut off' or 'separate' — like cutting a piece of cloth to be reserved for a special purpose.","To honour a special occasion with festivities; to mark God's faithfulness with joy "+F[1]+" "+F[2]+" "+F[6]+""],
["Glory","Dance","God's glory is the visible manifestation of His presence — it appeared as fire on Sinai, a cloud in the tabernacle, and a star over Bethlehem. The Hebrew word for glory (kavod) literally means 'weight' or 'heaviness' — God's glory is the weighty, overwhelming reality of His magnificent presence. When Moses asked to see God's glory, God said no one can see His face and live — He placed Moses in a rock cleft and let only His 'back' pass by (Exodus 33).","Expressing praise through joyful bodily movement, as David danced before the Lord "+F[1]+" "+F[2]+" "+F[9]+""],
["Grace","Bow","Grace means God's undeserved favour — getting good things we don't deserve, while mercy means not getting the punishment we do deserve. The Greek word 'charis' (grace) appears 156 times in the New Testament and is the root of 'charisma' (spiritual gifts) and 'eucharist' (thanksgiving). In the ancient world, 'grace' was a patron-client term — a wealthy benefactor would show 'grace' to those who couldn't repay, which is exactly what God does for us.","To bend in reverence and submission before God, acknowledging His sovereignty "+F[2]+" "+F[0]+" "+F[13]+""],
["King","Adore","Jesus spoke about the Kingdom of God more than any other topic — it was the central theme of His teaching and appears over 100 times in the Gospels. The Kingdom of God is both 'already' and 'not yet' — it began with Jesus' first coming and will be fully established at His second coming. Jesus said the kingdom belongs to those who become like little children (Matthew 18:3) — not childish, but trusting, humble, and dependent on the Father.","To worship with profound reverence and deep, passionate love for God "+F[2]+" "+F[0]+" "+F[6]+""],
["Savior","Seek","One who saves; Jesus Christ who rescues humanity from sin and death "+F[1]+" "+F[2]+" "+F[8]+"","To earnestly look for God's presence, will, and truth with a whole heart "+F[1]+" "+F[2]+" "+F[7]+""],
["Name","Abide","The name of Jesus through which salvation and authority come "+F[1]+" "+F[2]+" "+F[13]+"","To remain, stay, or dwell continuously in God's presence and His Word "+F[1]+" "+F[2]+" "+F[10]+""],
["Light","Dwell","Jesus declared 'I am the light of the world' (John 8:12) — whoever follows Him will never walk in darkness but will have the light of life. God's first creative act was to speak light into existence (Genesis 1:3) — light existed before the sun was created on day four, meaning God Himself was the source. In the New Jerusalem, there will be no need for sun or moon because the glory of God gives it light and the Lamb is its lamp (Revelation 21:23).","To live and remain in God's presence; to make one's home in His love "+F[0]+" "+F[1]+" "+F[6]+""],
["Heart","Draw","The Bible mentions the heart over 800 times — not the physical organ but the centre of a person's thoughts, will, emotions, and spiritual life. God told Samuel 'people look at the outward appearance, but the Lord looks at the heart' (1 Samuel 16:7) — God values inner character over external religion. Jeremiah 17:9 says the heart is 'deceitful above all things' while Ezekiel 36:26 promises God will give believers 'a new heart' — the gospel transforms us from the inside out.","To come closer to God; to be pulled toward His presence by the Holy Spirit "+F[0]+" "+F[1]+" "+F[6]+""],
["Spirit","Communion","The Holy Spirit is the third person of the Trinity — not an impersonal force but a divine person who speaks, guides, comforts, and can be grieved. The Hebrew word for Spirit is 'ruach' which also means 'wind' and 'breath' — the Spirit is as essential to spiritual life as breath is to physical life. The Holy Spirit appeared as a dove at Jesus' baptism, as tongues of fire at Pentecost, and as a mighty rushing wind — showing He works in diverse ways.","Intimate sharing and fellowship with God and with fellow believers The original Hebrew or Greek word carries rich layers of meaning that English translations cannot fully capture. "+F[31]+" "+F[6]+""],
["Cross","Fellowship","The cross was the most shameful form of execution in the Roman world — reserved for slaves and the worst criminals, designed to maximise pain and humiliation. What appeared to be Satan's greatest victory (killing God's Son) was actually God's master plan all along — the cross defeated sin, death, and the devil simultaneously. Crucifixion victims typically died from asphyxiation as their body weight made it impossible to breathe — they had to push up on the nails to take each breath.","Deep companionship and unity among believers, sharing life together in Christ "+F[14]+" "+F[16]+" "+F[7]+""],
["Blood","Redeemed","The Bible says 'without the shedding of blood there is no forgiveness of sins' (Hebrews 9:22) — Jesus' blood was the ultimate and final sacrifice. Blood represents life in Scripture (Leviticus 17:11) — when Jesus shed His blood, He was pouring out His very life as a substitute for ours. The Passover lamb's blood on the doorposts in Egypt formed the shape of a cross — the top of the door and two side posts, centuries before crucifixion was invented.","Bought back from slavery to sin by the precious blood of Jesus Christ "+F[2]+" "+F[0]+" "+F[13]+""],
["Mercy","Forgiven","God showed mercy to David after his sin with Bathsheba, to Peter after his denial, and to Paul after he persecuted Christians — no one is beyond mercy. The Hebrew word for mercy is 'chesed' which combines love, loyalty, and compassion — it describes God's covenant faithfulness even when we are unfaithful. The Mercy Seat on the Ark of the Covenant was where God's presence dwelt — it sat directly above the Ten Commandments, symbolising mercy covering the law.","Jesus taught His followers to forgive 'seventy times seven' times (490 times), meaning forgiveness should have no limit — just as God's forgiveness has no limit. The Greek word for forgiveness (aphesis) means 'to release' or 'to let go' — when God forgives, He releases us completely from the debt of sin. On the cross, Jesus prayed 'Father, forgive them, for they do not know what they are doing' — offering forgiveness even to those who were killing Him."],
["Joy","Restored","Paul wrote his most joy-filled letter (Philippians, mentioning joy 16 times) while chained in a Roman prison — proving joy is not dependent on circumstances. The 'joy of the Lord is your strength' (Nehemiah 8:10) — in Hebrew theology, joy was not an emotion but a supernatural force that gave power to endure. There are over 400 references to joy and rejoicing in the Bible, making it one of the most commanded emotions — God wants His people to be joyful.","Brought back to original condition; renewed and made whole by God's power "+F[2]+" "+F[0]+" "+F[9]+""],
["Peace","Healed","Jesus is called the Prince of Peace (Isaiah 9:6), and He promised His followers a peace 'the world cannot give' — inner calm regardless of circumstances. The Hebrew word 'shalom' means far more than absence of conflict — it means completeness, wholeness, health, prosperity, and total well-being. When Jesus said 'Peace be with you' after His resurrection, He was not just greeting the disciples — He was pronouncing the cosmic peace achieved through the cross.","Made whole in body, mind, or spirit through God's healing touch "+F[2]+" "+F[0]+" "+F[12]+""],
["Hope","Delivered","Biblical hope is not wishful thinking but confident certainty based on God's unbreakable promises and proven faithfulness throughout history. Paul lists hope alongside faith and love as the three things that last forever (1 Cor 13:13) — it is an eternal quality, not a temporary feeling. The anchor was the earliest Christian symbol (before the cross), based on Hebrews 6:19 which calls hope 'an anchor for the soul, firm and secure.'","Set free from bondage, oppression, or evil by God's mighty hand "+F[3]+" "+F[4]+" "+F[13]+""],
["Faith","Sacrifice","Hebrews 11:1 defines faith as 'the substance of things hoped for, the evidence of things not seen' — it is confident trust based on God's character. Jesus said faith the size of a mustard seed (the smallest seed known in Israel) could move mountains — it's not the quantity of faith that matters but its object. The word 'faith' (pistis in Greek) appears 243 times in the New Testament but only twice in the Old Testament, reflecting the shift from law to grace.","In the Old Testament, animals were sacrificed to temporarily cover sins — Jesus' sacrifice on the cross permanently removed sins once and for all. The word 'sacrifice' comes from Latin 'sacri-facere' meaning 'to make sacred' — through Christ's sacrifice, believers are made holy and set apart for God. Abraham's near-sacrifice of Isaac on Mount Moriah happened on the same mountain ridge where Jesus would be crucified approximately 2,000 years later."],
["Heaven","Atonement","Jesus said in His Father's house are many rooms and He was going to prepare a place for His followers (John 14:2-3). The Bible describes three heavens: the sky (atmosphere), space (cosmos), and the dwelling place of God — Paul said he was caught up to the 'third heaven.' Revelation describes the New Jerusalem as a perfect cube, 1,400 miles on each side, with streets of gold and gates made of single pearls. "+F[32]+"","The reconciliation of God and humanity through Christ's substitutionary death This points to the heart of the gospel — God's plan of salvation through Jesus Christ. "+F[0]+" "+F[1]+""],
["Earth","Resurrection","The world God created and sustains; the stage of human history "+F[26]+" "+F[17]+" "+F[9]+"","Jesus rose from the dead on the third day, appearing to over 500 people over 40 days — the most attested miracle in ancient history. Paul said if Christ has not been raised, our faith is futile (1 Cor 15:17) — the resurrection is not a side doctrine but the foundation of all Christianity. The first witnesses of the resurrection were women — in first-century culture, women's testimony was not accepted in court, making this an unlikely detail to invent."],
["Sing","Eternal","The most common Greek word for sin is 'hamartia' which literally means 'to miss the mark' — like an archer's arrow falling short of the target. Sin entered the world through one man (Adam) and death through sin — but grace overflowed through one man (Christ) to bring life to all who believe (Romans 5). The Bible identifies three categories of sin: the lust of the flesh, the lust of the eyes, and the pride of life (1 John 2:16) — the same three temptations Satan used on Eve and on Jesus.","Eternal life is not just living forever — Jesus defined it as knowing God personally: 'This is eternal life, that they know You' (John 17:3). The Bible says God has 'set eternity in the human heart' (Eccl 3:11) — there is an innate longing in every person for something beyond this temporary world. The Hebrew word 'olam' (eternal/everlasting) comes from a root meaning 'hidden' — eternity is a reality hidden from full human comprehension."],
["Bless","Crown","To speak well of or to bestow God's favour upon someone "+F[0]+" "+F[1]+" "+F[11]+"","The Bible mentions five crowns believers can receive: the crown of life, crown of glory, crown of righteousness, crown incorruptible, and crown of rejoicing. Jesus wore a crown of thorns — thorns were part of the curse in Genesis 3, so by wearing them He was symbolically taking the curse of sin upon Himself. In Revelation 4:10, the 24 elders cast their crowns before God's throne — showing that every reward we receive ultimately belongs to and glorifies God."],
["Mighty","Triumph","Having great power and strength; describing God's awesome abilities "+F[1]+" "+F[2]+" The angel called Gideon a mighty warrior even though he felt weak and afraid (Judges 6:12).","Decisive victory over enemies; Christ's triumph over sin, death, and the grave "+F[0]+" "+F[1]+" "+F[11]+""],
["Worthy","Darkness","Deserving of honour, respect, and devotion; Jesus alone is worthy "+F[2]+" "+F[0]+" In Revelation 4:11 the elders in heaven declare You are worthy, our Lord and God, to receive glory.","Noah's ark was approximately 450 feet long, 75 feet wide, and 45 feet high — large enough to hold over 500 railroad cars worth of space. The ark is a picture of salvation — there was only one door to enter (Jesus said 'I am the door'), and God Himself shut it when the time of grace ended. The ark came to rest on the mountains of Ararat (modern Turkey), and explorers have searched for its remains for centuries, with several claimed sightings."],
["Rock","Fortress","Jesus told Peter that on 'this rock' (Peter's confession of faith) He would build His church — the foundation of Christianity is the truth that Jesus is the Messiah. In the Old Testament, God is called 'the Rock' at least 30 times — symbolising His unchanging nature, strength, and reliability as a foundation for life. Moses struck the rock at Meribah and water gushed out for two million people — Paul says 'that rock was Christ' (1 Cor 10:4), providing living water to His people.","A place of strong defence and protection; God is our mighty fortress (Psalm 18:2) "+F[29]+" "+F[1]+" "+F[2]+""],
["Refuge","Stronghold","A safe place of shelter and protection found in God alone "+F[1]+" "+F[2]+" "+F[6]+"","A fortified place of safety; God as our secure hiding place in times of trouble "+F[0]+" "+F[1]+" "+F[8]+""],
["Life","Shield","Eternal life offered through Jesus Christ; 'I am the life' (John 14:6) "+F[1]+" "+F[2]+" Jesus said I am the way, the truth, and the life, no one comes to the Father except through me (John 14:6).","The shield of faith that extinguishes the devil's fiery darts (Ephesians 6:16) "+F[25]+" "+F[15]+" "+F[14]+""],
["Power","Pure","God's ability to accomplish all things according to His will "+F[0]+" "+F[1]+" The same power that raised Jesus from the dead lives in every believer (Ephesians 1:19-20).","Free from contamination; clean in heart, mind, and motive before God "+F[2]+" "+F[0]+" "+F[7]+""],
["Strength","Perfect","The might and endurance that God provides to His people "+F[0]+" "+F[1]+" David said The Lord is my strength and my shield, my heart trusts in Him (Psalm 28:7).","Complete, without flaw; God's character and His finished work in believers "+F[1]+" "+F[2]+" "+F[8]+""],
["Victory","True","Triumph over sin, death, and evil through Christ's power "+F[25]+" "+F[2]+" "+F[0]+"","Genuine, reliable, and faithful; God's Word and promises are always true "+F[2]+" "+F[0]+" "+F[7]+""],
["Great","Living","Surpassing in size, extent, or intensity; describing God's attributes "+F[0]+" "+F[1]+" "+F[8]+"","Alive and active; the living God who speaks, acts, and intervenes today "+F[2]+" "+F[0]+" "+F[10]+""],
["High","Risen","Exalted, lofty, supreme; God is the Most High over all the earth "+F[0]+" "+F[1]+" "+F[8]+"","Raised from the dead; Christ is risen and reigns at the Father's right hand "+F[1]+" "+F[2]+" "+F[7]+""],
["Lifted","Crucified","Raised up; Christ lifted on the cross; our hands lifted in worship "+F[1]+" "+F[2]+" "+F[9]+"","Put to death on a cross; Christ's willing sacrifice for the sins of the world "+F[0]+" "+F[1]+" "+F[12]+""],
["Forever","Broken","Eve was the first woman, created from Adam's rib to be his equal partner and companion in the Garden of Eden. Eve's creation from Adam's side symbolises equality — not from his head to rule over him, nor from his feet to be trampled, but from his side to be his equal. The name Eve (Chavah in Hebrew) means 'life-giver' or 'mother of all living' — given to her by Adam after the Fall.","Shattered by sin and suffering; made whole by Christ's broken body for us "+F[1]+" "+F[2]+" "+F[6]+""],
["Reign","Poured","To rule as sovereign; Christ reigns over all creation now and forever "+F[1]+" "+F[2]+" "+F[11]+"","Emptied out; the Holy Spirit poured out on believers; Christ's blood poured for us "+F[2]+" "+F[0]+" "+F[7]+""],
["Father","Lion","God as loving parent; the first person of the Trinity "+F[0]+" "+F[1]+" "+F[6]+"","The Lion of the tribe of Judah; Christ in His majesty and kingly authority (Rev 5:5) "+F[1]+" "+F[2]+" "+F[8]+""],
["Lamb","Judah","Jesus is called the 'Lamb of God who takes away the sin of the world' (John 1:29) — connecting Him to the Passover lamb whose blood saved Israel in Egypt. A sacrificial lamb had to be without blemish or defect — Jesus lived a sinless life so He could be the perfect, unblemished sacrifice for all humanity. In Revelation, Jesus appears as both a Lion (power) and a Lamb (sacrifice) — the only time in literature where the hero conquers by being slain.","The tribe of Israel from which Jesus descended; associated with kingship and praise "+F[5]+" "+F[3]+" "+F[8]+""],
["Blessed","Everlasting","Enjoying God's favour; happy and fortunate in a spiritual sense "+F[0]+" "+F[1]+" Jesus began the Sermon on the Mount with Blessed are the poor in spirit, theirs is the kingdom of heaven (Matthew 5:3).","Eve was the first woman, created from Adam's rib to be his equal partner and companion in the Garden of Eden. Eve's creation from Adam's side symbolises equality — not from his head to rule over him, nor from his feet to be trampled, but from his side to be his equal. The name Eve (Chavah in Hebrew) means 'life-giver' or 'mother of all living' — given to her by Adam after the Fall."],
["Sin","Infinite","The most common Greek word for sin is 'hamartia' which literally means 'to miss the mark' — like an archer's arrow falling short of the target. Sin entered the world through one man (Adam) and death through sin — but grace overflowed through one man (Christ) to bring life to all who believe (Romans 5). The Bible identifies three categories of sin: the lust of the flesh, the lust of the eyes, and the pride of life (1 John 2:16) — the same three temptations Satan used on Eve and on Jesus.","Without limits or bounds; describing God's wisdom, power, love, and presence "+F[0]+" "+F[1]+" "+F[8]+""],
["Grave","Boundless","The place of burial; symbol of death that Christ conquered "+F[0]+" "+F[1]+" "+F[8]+"","Having no limits; God's love and grace that extend beyond all measure "+F[2]+" "+F[0]+" "+F[6]+""],

["Redeemer","Shadow","One who pays a price to set another free; Jesus Christ our Redeemer "+F[1]+" "+F[2]+" "+F[8]+"","A dark area; the shadow of death; also God's protective shadow (Psalm 91:1) "+F[0]+" "+F[1]+" "+F[7]+""],
["Creator","Covenant","The God who made heaven and earth and everything in them "+F[1]+" "+F[2]+" "+F[9]+"","A covenant in the Bible is far stronger than a contract — it is a solemn, unbreakable bond sealed with blood, like a marriage vow before God. God made covenants with Noah (rainbow), Abraham (circumcision), Moses (law), David (eternal throne), and the New Covenant through Jesus' blood. In ancient covenant ceremonies, animals were cut in half and both parties walked between the pieces — when God made covenant with Abraham, only God walked through (Gen 15), meaning He took all the responsibility."],
["Healer","Zion","God who restores health in body, mind, and spirit "+F[1]+" "+F[2]+" "+F[10]+"","A name for Jerusalem and God's holy mountain; symbol of God's eternal kingdom "+F[1]+" "+F[2]+" "+F[11]+""],
["Provider","David","God who supplies every need according to His riches in glory "+F[0]+" "+F[1]+" "+F[13]+"","David defeated the giant Goliath with just a sling and a stone, then became Israel's greatest king and established Jerusalem as the capital. God called David 'a man after My own heart' (Acts 13:22) — not because he was sinless, but because he always returned to God in genuine repentance. David was likely a redhead — the Hebrew word used to describe him ('admoni') means ruddy or red-haired, unusual in the ancient Near East."],
["Shepherd","Avenger","Jesus called Himself the Good Shepherd who lays down His life for His sheep — in ancient Israel, shepherds literally slept across the door of the sheepfold to protect the flock. The shepherd metaphor reveals Jesus' intimate care — He calls each sheep by name, leads them to green pastures, and searches tirelessly for even one that is lost. Shepherds were considered the lowest social class in Israel, yet God chose shepherds to be the first to hear the announcement of Jesus' birth.","God who vindicates His people and executes justice against wickedness "+F[1]+" "+F[2]+" "+F[9]+""],
["Deliverer","Upholder","God who rescues His people from danger, oppression, and bondage "+F[3]+" "+F[4]+" "+F[11]+"","God who sustains and maintains all things by the word of His power "+F[2]+" "+F[0]+" "+F[13]+""],
["Almighty","Ruler","All-powerful; one of God's attributes meaning unlimited in power "+F[1]+" "+F[2]+" The angel called Gideon a mighty warrior even though he felt weak and afraid (Judges 6:12).","Supreme authority; God as sovereign ruler over all nations and all creation "+F[2]+" "+F[0]+" "+F[10]+""],
["Righteous","Pillar","Morally right and just; God's perfect standard of holiness "+F[1]+" "+F[2]+" "+F[13]+"","A strong column of support; believers as pillars in God's temple (Rev 3:12) "+F[29]+" "+F[16]+" "+F[15]+""],
["Sovereign","Thunder","Supreme in power and authority; God rules over all "+F[0]+" "+F[1]+" "+F[11]+"","The voice of God; His power displayed in nature and His mighty declarations "+F[22]+" "+F[26]+" "+F[10]+""],
["Faithful","Sanctified","Hebrews 11:1 defines faith as 'the substance of things hoped for, the evidence of things not seen' — it is confident trust based on God's character. Jesus said faith the size of a mustard seed (the smallest seed known in Israel) could move mountains — it's not the quantity of faith that matters but its object. The word 'faith' (pistis in Greek) appears 243 times in the New Testament but only twice in the Old Testament, reflecting the shift from law to grace.","Set apart and made holy by God; dedicated to His purposes and purified "+F[2]+" "+F[0]+" "+F[7]+""],
["Glorious","Consecrated","Full of glory; resplendent with God's majesty and splendour "+F[0]+" "+F[1]+" "+F[10]+"","Formally dedicated to God's service; set apart as sacred and holy "+F[0]+" "+F[1]+" "+F[11]+""],
["Merciful","Hallowed","Showing compassion and forgiveness even when punishment is deserved "+F[2]+" "+F[0]+" "+F[7]+"","Made holy and sacred; revered and honoured as deeply holy — 'hallowed be Thy name' "+F[1]+" "+F[2]+" "+F[6]+""],
["Throne","Overcome","God's throne is described in Revelation as surrounded by a rainbow, 24 elders, four living creatures, and a sea of glass — a scene of overwhelming majesty. The throne represents God's sovereign rule over all creation — every earthly throne is temporary, but God's throne endures forever and ever. Jesus promised that overcomers would sit with Him on His throne, just as He overcame and sat down with His Father on His throne (Revelation 3:21).","To conquer and prevail; 'He who overcomes will inherit all things' (Rev 21:7) "+F[1]+" "+F[2]+" "+F[6]+""],
["Kingdom","Conquer","Jesus spoke about the Kingdom of God more than any other topic — it was the central theme of His teaching and appears over 100 times in the Gospels. The Kingdom of God is both 'already' and 'not yet' — it began with Jesus' first coming and will be fully established at His second coming. Jesus said the kingdom belongs to those who become like little children (Matthew 18:3) — not childish, but trusting, humble, and dependent on the Father.","To defeat and gain control over enemies; Christ conquered sin and death for us "+F[1]+" "+F[2]+" "+F[9]+""],
["Soul","Victorious","The Hebrew word for soul is 'nephesh' which means the whole living being — in Genesis 2:7, God breathed into Adam and he 'became a living soul.' Jesus asked 'What does it profit a man to gain the whole world and lose his own soul?' (Mark 8:36) — the soul's value exceeds all earthly wealth combined. In Hebrew thought, the soul is not a separate ghostly entity trapped in a body — it is the whole person, the complete integrated life that God created and sustains. "+F[32]+"","Having won a victory; triumphant through Christ who gives us the victory "+F[2]+" "+F[0]+" "+F[11]+""],
["Breath","Triumphant","The life force given by God; every breath is a gift from the Creator "+F[0]+" "+F[1]+" God breathed into Adam the breath of life and he became a living person (Genesis 2:7).","Celebrating a great victory; rejoicing in Christ's total defeat of evil "+F[0]+" "+F[1]+" "+F[8]+""],
["Fire","Radiant","God appeared to Moses in a burning bush that was not consumed, and led Israel as a pillar of fire by night during their wilderness journey. Fire in Scripture represents God's presence, purification, and judgment — it refines gold, consumes sacrifice, and will ultimately purify the earth. On the Day of Pentecost, tongues of fire rested on each believer — fire that empowers rather than destroys, marking the birth of the Spirit-filled church.","Shining brightly; glowing with light; reflecting the glory of God's presence "+F[2]+" "+F[0]+" "+F[8]+""],
["River","Splendor","A flowing stream; the river of life in God's eternal kingdom (Rev 22) "+F[20]+" "+F[26]+" "+F[17]+"","Magnificent and impressive beauty; the splendour of God's holiness and majesty "+F[1]+" "+F[2]+" "+F[12]+""],
["Wind","Majesty","Symbol of the Holy Spirit's powerful, unseen movement "+F[23]+" "+F[17]+" "+F[22]+"","The greatness and dignity of God as supreme ruler of all creation "+F[0]+" "+F[1]+" "+F[9]+""],
["Ocean","Divine","The vast sea; symbolising God's immeasurable depth and power "+F[20]+" "+F[22]+" "+F[26]+"","Of, from, or like God; heavenly, sacred, and supremely excellent "+F[22]+" "+F[26]+" "+F[11]+""],
["Mountain","Salvation","Major events in the Bible happened on mountains: the Law on Sinai, Elijah's contest on Carmel, the Transfiguration, and the Crucifixion on Golgotha. Mountains in Scripture symbolise the meeting place between God and humanity — they represent rising above the earthly to encounter the divine. Jesus often withdrew to mountains to pray alone (Luke 6:12) — He spent an entire night in prayer on a mountain before choosing His twelve apostles.","The name Jesus (Yeshua) literally means 'God saves' — salvation is the central theme of the entire Bible from Genesis to Revelation. Salvation involves three tenses: we have been saved (justification), we are being saved (sanctification), and we will be saved (glorification). The Bible describes salvation as being rescued from slavery, healed from disease, freed from prison, and adopted into a royal family — all at once."],
["Hallelujah","Freedom","Hallelujah is a Hebrew word meaning 'Praise the Lord' (Hallelu-Yah) — it appears 24 times in the Psalms and 4 times in Revelation. Hallelujah is one of the few Hebrew words that has passed unchanged into virtually every language on earth — it is the universal language of praise. The four 'Hallelujahs' in Revelation 19 are the only ones in the New Testament, celebrating the final victory of God over evil.","Liberation from bondage, sin, and death through Christ's redemptive work "+F[1]+" "+F[2]+" "+F[9]+""],
["Presence","Fortress","Being in the same place as someone; God's manifest nearness to us "+F[2]+" "+F[0]+" "+F[13]+"","A fortified place; God as our strong defence and impenetrable refuge "+F[29]+" "+F[1]+" "+F[2]+""],

const ACT=[
["Adam","Garden of Eden","Adam was the first human, formed from the dust of the ground and given life by God's own breath in the Garden of Eden. Paul calls Jesus the 'second Adam' (1 Cor 15:45) — where the first Adam brought death through disobedience, Christ brings life through obedience. The Hebrew word 'adam' simply means 'man' or 'humanity' and comes from 'adamah' meaning 'ground' or 'red earth.'","The paradise God created for Adam and Eve with the tree of life "+F[18]+" "+F[19]+" "+F[8]+""],
["Eve","Serpent","Eve was the first woman, created from Adam's rib to be his equal partner and companion in the Garden of Eden. Eve's creation from Adam's side symbolises equality — not from his head to rule over him, nor from his feet to be trampled, but from his side to be his equal. The name Eve (Chavah in Hebrew) means 'life-giver' or 'mother of all living' — given to her by Adam after the Fall.","The crafty creature Satan used to tempt Eve to eat the forbidden fruit "+F[2]+" "+F[0]+" "+F[10]+""],
["Noah","Ark","Noah built the ark over many decades, preaching righteousness to a world that ignored his warnings about the coming flood. Noah's ark is a type (foreshadow) of Christ — just as the ark saved those inside from judgment, so Christ saves those who enter into faith in Him. The ark's dimensions (300x50x30 cubits) give it a 6:1 length-to-width ratio, which modern naval architects confirm is ideal for stability in rough seas.","Noah's ark was approximately 450 feet long, 75 feet wide, and 45 feet high — large enough to hold over 500 railroad cars worth of space. The ark is a picture of salvation — there was only one door to enter (Jesus said 'I am the door'), and God Himself shut it when the time of grace ended. The ark came to rest on the mountains of Ararat (modern Turkey), and explorers have searched for its remains for centuries, with several claimed sightings."],
["Flood","Abraham","The flood covered the entire earth for 150 days, and Noah's family spent over a year inside the ark before the ground was dry enough to leave. Jesus compared His second coming to the days of Noah — people were eating and drinking, unaware of coming judgment, until the flood swept them away (Matt 24:37-39). Over 200 cultures worldwide have ancient flood stories remarkably similar to Noah's account — from Mesopotamia to China to Native American traditions.","God called Abraham to leave his home in Ur and journey to an unknown land, promising to make him the father of a great nation. Abraham believed God's promise even when it seemed impossible, and this faith was 'credited to him as righteousness' (Genesis 15:6) — the foundation of salvation by faith. Abraham came from Ur of the Chaldees, a sophisticated city in modern-day Iraq with running water, libraries, and a massive ziggurat temple."],
["Isaac","Sacrifice","Isaac was the miracle son born to Abraham and Sarah when they were 100 and 90 years old — proving nothing is impossible with God. Abraham's willingness to sacrifice Isaac on Mount Moriah is the most powerful foreshadowing of God the Father offering His own Son on the cross. Isaac is the only patriarch who never left the Promised Land — even when there was famine, God told him to stay and He would bless him there.","In the Old Testament, animals were sacrificed to temporarily cover sins — Jesus' sacrifice on the cross permanently removed sins once and for all. The word 'sacrifice' comes from Latin 'sacri-facere' meaning 'to make sacred' — through Christ's sacrifice, believers are made holy and set apart for God. Abraham's near-sacrifice of Isaac on Mount Moriah happened on the same mountain ridge where Jesus would be crucified approximately 2,000 years later."],
["Jacob","Ladder","Jacob tricked his brother Esau out of his birthright and his father's blessing, then spent 20 years working for his uncle Laban as consequence. After wrestling with God all night at Peniel, Jacob's name was changed to Israel ('he who struggles with God'), and he walked with a limp for the rest of his life. Jacob fathered 12 sons who became the 12 tribes of Israel — the entire nation descended from one man's family.","The stairway to heaven Jacob saw in a dream with angels ascending and descending "+F[1]+" "+F[2]+" "+F[11]+""],
["Joseph","Coat","Joseph was sold into slavery by his jealous brothers but rose to become the second most powerful ruler in all of Egypt, saving nations from famine. Joseph is one of the clearest 'types' of Christ in the Old Testament — betrayed by his own, sold for silver, falsely accused, and raised to glory to save his people. Joseph was 30 years old when he became ruler of Egypt — the same age Jesus was when He began His public ministry.","The special garment of many colours Jacob gave to his son Joseph "+F[1]+" "+F[2]+" "+F[11]+""],
["Moses","Bush","Moses led the Israelites out of 400 years of slavery in Egypt and received the Ten Commandments directly from God on Mount Sinai. Moses is a 'type' of Christ — both were saved from death as infants, both fasted 40 days, both were mediators between God and His people. Moses had a speech impediment and tried to refuse God's call five times before finally agreeing to confront Pharaoh.","The burning bush through which God spoke to Moses on Mount Horeb "+F[2]+" "+F[0]+" "+F[9]+""],
["Pharaoh","Plague","The king of Egypt who refused to let the Israelites go free "+F[5]+" "+F[3]+" "+F[6]+"","The devastating judgments God sent upon Egypt to free His people "+F[0]+" "+F[1]+" "+F[9]+""],
["Sea","Staff","The Red Sea that God parted for Israel to cross on dry ground "+F[20]+" "+F[17]+" "+F[22]+"","Moses' rod that God used to perform mighty miracles and signs "+F[14]+" "+F[16]+" "+F[10]+""],
["Tablet","Manna","The stone tablets on which God wrote the Ten Commandments "+F[15]+" "+F[14]+" "+F[6]+"","The bread from heaven God provided daily for Israel in the wilderness "+F[34]+" "+F[35]+" "+F[13]+""],
["David","Goliath","David defeated the giant Goliath with just a sling and a stone, then became Israel's greatest king and established Jerusalem as the capital. God called David 'a man after My own heart' (Acts 13:22) — not because he was sinless, but because he always returned to God in genuine repentance. David was likely a redhead — the Hebrew word used to describe him ('admoni') means ruddy or red-haired, unusual in the ancient Near East.","The massive Philistine warrior who defied Israel's army for forty days "+F[3]+" "+F[4]+" "+F[13]+""],
["Sling","Crown","The simple weapon David used to defeat the giant Goliath "+F[16]+" "+F[15]+" "+F[11]+"","The Bible mentions five crowns believers can receive: the crown of life, crown of glory, crown of righteousness, crown incorruptible, and crown of rejoicing. Jesus wore a crown of thorns — thorns were part of the curse in Genesis 3, so by wearing them He was symbolically taking the curse of sin upon Himself. In Revelation 4:10, the 24 elders cast their crowns before God's throne — showing that every reward we receive ultimately belongs to and glorifies God."],
["Solomon","Temple","Solomon asked God for wisdom instead of wealth or power, and God was so pleased He gave him all three, making him the richest king on earth. Solomon's temple took 7 years to build using 180,000 workers, but he spent 13 years building his own palace — a subtle warning about misplaced priorities. Solomon composed 3,000 proverbs and 1,005 songs, yet only a fraction survive in Scripture through Proverbs, Ecclesiastes, and Song of Solomon.","Solomon's temple was overlaid with 20 tons of pure gold and took seven years to build using 180,000 workers from across the kingdom. When Jesus said 'Destroy this temple and I will raise it in three days,' He was speaking about His body — the ultimate temple where God dwells (John 2:19-21). The temple veil that tore from top to bottom at Jesus' death was 60 feet tall, 30 feet wide, and 4 inches thick — only God could have torn it."],
["Elijah","Fire","Elijah challenged 450 prophets of Baal on Mount Carmel, and God answered with fire from heaven that consumed the sacrifice, the altar, and even the water. Elijah appeared with Moses at the Transfiguration of Jesus (Matt 17), representing the Prophets just as Moses represented the Law. After his greatest victory on Carmel, Elijah fell into such deep depression he wanted to die — showing that even great prophets struggled with mental health.","God appeared to Moses in a burning bush that was not consumed, and led Israel as a pillar of fire by night during their wilderness journey. Fire in Scripture represents God's presence, purification, and judgment — it refines gold, consumes sacrifice, and will ultimately purify the earth. On the Day of Pentecost, tongues of fire rested on each believer — fire that empowers rather than destroys, marking the birth of the Spirit-filled church."],
["Chariot","Jonah","The fiery chariot that took Elijah up to heaven in a whirlwind "+F[14]+" "+F[16]+" "+F[8]+"","Jonah tried to run from God by sailing in the opposite direction, was swallowed by a great fish, and spent three days inside before being vomited onto shore. Jesus directly compared Jonah's three days in the fish to His own three days in the tomb (Matt 12:40), making it a prophetic sign of the resurrection. Jonah is the only prophet who was angry that his preaching worked — he wanted Nineveh destroyed and was furious when the entire city repented."],
["Whale","Daniel","The great sea creature that swallowed Jonah for three days "+F[1]+" "+F[2]+" "+F[12]+"","Daniel was thrown into a den of hungry lions for praying to God, but God shut the lions' mouths and he emerged without a scratch. Daniel's prophecies in chapters 2, 7-12 outline world history from Babylon to the end times with remarkable accuracy, including the timing of the Messiah's coming. Daniel served faithfully under four different kings across two empires (Babylonian and Persian) — a career spanning over 70 years in government."],
["Lion","Esther","A powerful beast; Daniel was thrown into a den of lions "+F[1]+" "+F[2]+" "+F[8]+"","Queen Esther risked her life by approaching the king uninvited to save her people from Haman's plot to destroy all the Jews in Persia. The book of Esther is the only book in the Bible that never directly mentions God's name, yet His providential hand is visible in every event. The Jewish festival of Purim, still celebrated today, commemorates Esther's bravery and the miraculous deliverance of the Jewish people."],
["Queen","Cross","A female monarch; Esther became queen of Persia "+F[0]+" "+F[1]+" "+F[6]+"","The cross was the most shameful form of execution in the Roman world — reserved for slaves and the worst criminals, designed to maximise pain and humiliation. What appeared to be Satan's greatest victory (killing God's Son) was actually God's master plan all along — the cross defeated sin, death, and the devil simultaneously. Crucifixion victims typically died from asphyxiation as their body weight made it impossible to breathe — they had to push up on the nails to take each breath."],
["Jesus","Manger","Jesus performed over 37 recorded miracles including turning water into wine, walking on water, and raising the dead. The name Jesus (Yeshua in Hebrew) literally means 'God saves' — His very name declares His mission to rescue humanity from sin. Jesus was likely a carpenter who worked with stone as well as wood, since the Greek word 'tekton' means craftsman of hard materials.","The feeding trough where baby Jesus was laid after His birth "+F[14]+" "+F[16]+" "+F[9]+""],
["Star","Shepherd","The bright light that guided the wise men to baby Jesus "+F[17]+" "+F[22]+" "+F[6]+"","Jesus called Himself the Good Shepherd who lays down His life for His sheep — in ancient Israel, shepherds literally slept across the door of the sheepfold to protect the flock. The shepherd metaphor reveals Jesus' intimate care — He calls each sheep by name, leads them to green pastures, and searches tirelessly for even one that is lost. Shepherds were considered the lowest social class in Israel, yet God chose shepherds to be the first to hear the announcement of Jesus' birth."],
["Lamb","Camel","Jesus is called the 'Lamb of God who takes away the sin of the world' (John 1:29) — connecting Him to the Passover lamb whose blood saved Israel in Egypt. A sacrificial lamb had to be without blemish or defect — Jesus lived a sinless life so He could be the perfect, unblemished sacrifice for all humanity. In Revelation, Jesus appears as both a Lion (power) and a Lamb (sacrifice) — the only time in literature where the hero conquers by being slain.","The large animal the wise men rode across the desert to find Jesus "+F[2]+" "+F[0]+" "+F[6]+""],
["Donkey","Miracle","The humble animal Jesus rode into Jerusalem on Palm Sunday "+F[14]+" "+F[16]+" "+F[7]+"","Jesus performed at least 37 recorded miracles, but John 21:25 says if everything Jesus did were written down, the world could not contain the books. Jesus' first miracle was turning water into wine at a wedding — transforming the ordinary into the extraordinary, which is exactly what He does with human lives. The miracles of Jesus were never performed for show — each one was an act of compassion that also served as a 'sign' pointing to His divine identity."],
["Heal","Pray","To restore health; Jesus healed the blind, lame, and sick "+F[0]+" "+F[1]+" "+F[6]+"","The Bible records over 650 prayers, and Jesus Himself prayed constantly — rising early in the morning, spending entire nights, and praying in His final hours. Prayer is not informing God of our needs (He already knows) but aligning our hearts with His will and deepening our relationship with Him. The longest prayer in the Bible is Solomon's dedication prayer for the temple (1 Kings 8), and the shortest is Peter's 'Lord, save me!' as he sank in the water."],
["Baptize","Peter","To immerse in water as a sign of faith and new life in Christ "+F[1]+" "+F[2]+" "+F[8]+"","Peter was a fisherman whom Jesus called to be a 'fisher of men' — he became the leader of the twelve apostles and the early church. Jesus renamed Simon as Peter (Petros/Cephas meaning 'rock'), declaring he would be the foundation stone on which the church would be built. Peter initially sank when walking on water because he looked at the waves instead of Jesus — a powerful metaphor for faith amidst life's storms."],
["Fish","Bread","Jesus called His disciples to be fishers of men "+F[1]+" "+F[2]+" "+F[8]+"","Jesus as the Bread of Life who feeds our spiritual hunger "+F[15]+" "+F[14]+" "+F[13]+""],
["Wine","Tomb","Jesus turned water into wine at the wedding in Cana "+F[16]+" "+F[15]+" "+F[10]+"","The sealed cave where Jesus' body was laid after crucifixion "+F[0]+" "+F[1]+" "+F[7]+""],
["Rise","Angel","To come back to life; Jesus rose from the dead on the third day "+F[2]+" "+F[0]+" "+F[10]+"","Angels are powerful spiritual beings created by God to serve as messengers, protectors, and warriors — the Bible mentions them nearly 300 times. The word 'angel' comes from the Greek 'angelos' meaning 'messenger' — their primary role is to deliver God's messages and carry out His will. Angels don't have wings in most biblical descriptions — cherubim and seraphim do, but the angels who appeared to Abraham and the women at the tomb looked like ordinary men."],
["Mary","Gabriel","Mary was chosen by God to give birth to Jesus through the Holy Spirit, making her the most honoured woman in all of Scripture. Mary's song of praise, the Magnificat (Luke 1:46-55), reveals deep theological understanding of God's justice, mercy, and faithfulness to His promises. Mary was likely between 12-14 years old when the angel Gabriel appeared to her — the typical age for betrothal in first-century Jewish culture.","The archangel who announced to Mary that she would bear God's Son "+F[35]+" "+F[33]+" "+F[8]+""],
["John","Dove","The beloved disciple who wrote a Gospel and Revelation Known as the beloved disciple, he was closest to Jesus during His earthly ministry. "+F[34]+" "+F[35]+"","A bird symbolising the Holy Spirit; descended on Jesus at His baptism "+F[0]+" "+F[1]+" "+F[6]+""],

["Paul","Ship","Paul transformed from Christianity's fiercest persecutor to its greatest missionary, planting churches across the entire Roman Empire. Paul's theology of grace — that salvation comes through faith alone, not works — revolutionised religion and remains the heart of Protestant Christianity. Paul was likely under five feet tall, partially blind, and suffered from a mysterious 'thorn in the flesh' that God refused to remove (2 Cor 12:7-9).","The English word 'worship' comes from 'worth-ship' — declaring the worth and value of the one being praised. True worship is not about music style or location — Jesus told the Samaritan woman that God seeks worshippers who worship 'in spirit and in truth' (John 4:24). The first recorded act of worship in the Bible is Abel's offering in Genesis 4 — and it cost him his life when his brother Cain became jealous."],

["Sing","Ruth","The most common Greek word for sin is 'hamartia' which literally means 'to miss the mark' — like an archer's arrow falling short of the target. Sin entered the world through one man (Adam) and death through sin — but grace overflowed through one man (Christ) to bring life to all who believe (Romans 5). The Bible identifies three categories of sin: the lust of the flesh, the lust of the eyes, and the pride of life (1 John 2:16) — the same three temptations Satan used on Eve and on Jesus.","Ruth left her homeland of Moab to stay with her mother-in-law Naomi, famously saying 'Where you go I will go, your God will be my God.' Ruth's story illustrates the concept of the kinsman-redeemer — Boaz redeemed Ruth just as Christ redeems believers, paying the price to make us His own. Ruth was a Moabite (a traditionally enemy nation), yet she appears in the genealogy of Jesus — showing God's grace extends to all peoples. "+F[32]+""],
["Boaz","Harvest","The wealthy landowner who redeemed and married Ruth "+F[3]+" "+F[4]+" "+F[10]+"","The gathering of crops; Ruth gleaned in the fields during harvest "+F[22]+" "+F[26]+" "+F[11]+""],
["Samson","Hair","Samson had supernatural strength from God that allowed him to kill a lion with his bare hands, defeat 1,000 men with a donkey jawbone, and tear down a temple. Samson's story is a warning about squandering God-given gifts — his physical strength was unmatched, but his moral weakness led to his downfall. Samson is listed in the 'Hall of Faith' in Hebrews 11 despite his many failures, showing that God judges the heart and honours genuine faith even in flawed people.","The source of Samson's strength; Delilah had it cut off "+F[1]+" "+F[2]+" "+F[9]+""],
["Delilah","Jawbone","The woman who deceived Samson and discovered his secret "+F[5]+" "+F[3]+" "+F[9]+"","The bone of a donkey Samson used to defeat a thousand Philistines "+F[2]+" "+F[0]+" "+F[12]+""],

["Sinai","Mountain","The most common Greek word for sin is 'hamartia' which literally means 'to miss the mark' — like an archer's arrow falling short of the target. Sin entered the world through one man (Adam) and death through sin — but grace overflowed through one man (Christ) to bring life to all who believe (Romans 5). The Bible identifies three categories of sin: the lust of the flesh, the lust of the eyes, and the pride of life (1 John 2:16) — the same three temptations Satan used on Eve and on Jesus.","Major events in the Bible happened on mountains: the Law on Sinai, Elijah's contest on Carmel, the Transfiguration, and the Crucifixion on Golgotha. Mountains in Scripture symbolise the meeting place between God and humanity — they represent rising above the earthly to encounter the divine. Jesus often withdrew to mountains to pray alone (Luke 6:12) — He spent an entire night in prayer on a mountain before choosing His twelve apostles."],
["Command","Worship","An order from God; the Ten Commandments are God's instructions "+F[0]+" "+F[1]+" "+F[12]+"","The English word 'worship' comes from 'worth-ship' — declaring the worth and value of the one being praised. True worship is not about music style or location — Jesus told the Samaritan woman that God seeks worshippers who worship 'in spirit and in truth' (John 4:24). The first recorded act of worship in the Bible is Abel's offering in Genesis 4 — and it cost him his life when his brother Cain became jealous."],
["Idol","Calf","A false god or image that people worship instead of the true God "+F[1]+" "+F[2]+" "+F[8]+"","The golden statue the Israelites made while Moses was on Sinai "+F[0]+" "+F[1]+" "+F[6]+""],
["Repent","Faith","The Greek word for repentance is 'metanoia' which means a complete change of mind and direction — not just feeling sorry but turning completely around. Repentance was the first word of John the Baptist's preaching, the first word of Jesus' public ministry, and the first word of Peter's sermon at Pentecost. True repentance produces fruit — Zacchaeus demonstrated genuine repentance by giving half his possessions to the poor and repaying four times what he had stolen.","Hebrews 11:1 defines faith as 'the substance of things hoped for, the evidence of things not seen' — it is confident trust based on God's character. Jesus said faith the size of a mustard seed (the smallest seed known in Israel) could move mountains — it's not the quantity of faith that matters but its object. The word 'faith' (pistis in Greek) appears 243 times in the New Testament but only twice in the Old Testament, reflecting the shift from law to grace."],
["Love","Hope","The Bible says 'God is love' (1 John 4:8) — love is not just something God does, it is the very essence of who He is. The Greek New Testament uses four different words for love: agape (unconditional), phileo (friendship), storge (family), and eros (romantic). The 'love chapter' (1 Corinthians 13) was written to a church full of conflict — Paul was teaching that spiritual gifts mean nothing without genuine love.","Biblical hope is not wishful thinking but confident certainty based on God's unbreakable promises and proven faithfulness throughout history. Paul lists hope alongside faith and love as the three things that last forever (1 Cor 13:13) — it is an eternal quality, not a temporary feeling. The anchor was the earliest Christian symbol (before the cross), based on Hebrews 6:19 which calls hope 'an anchor for the soul, firm and secure.'"],
["Grace","Glory","Grace means God's undeserved favour — getting good things we don't deserve, while mercy means not getting the punishment we do deserve. The Greek word 'charis' (grace) appears 156 times in the New Testament and is the root of 'charisma' (spiritual gifts) and 'eucharist' (thanksgiving). In the ancient world, 'grace' was a patron-client term — a wealthy benefactor would show 'grace' to those who couldn't repay, which is exactly what God does for us.","God's glory is the visible manifestation of His presence — it appeared as fire on Sinai, a cloud in the tabernacle, and a star over Bethlehem. The Hebrew word for glory (kavod) literally means 'weight' or 'heaviness' — God's glory is the weighty, overwhelming reality of His magnificent presence. When Moses asked to see God's glory, God said no one can see His face and live — He placed Moses in a rock cleft and let only His 'back' pass by (Exodus 33)."],
["Heaven","Throne","Jesus said in His Father's house are many rooms and He was going to prepare a place for His followers (John 14:2-3). The Bible describes three heavens: the sky (atmosphere), space (cosmos), and the dwelling place of God — Paul said he was caught up to the 'third heaven.' Revelation describes the New Jerusalem as a perfect cube, 1,400 miles on each side, with streets of gold and gates made of single pearls. "+F[32]+"","God's throne is described in Revelation as surrounded by a rainbow, 24 elders, four living creatures, and a sea of glass — a scene of overwhelming majesty. The throne represents God's sovereign rule over all creation — every earthly throne is temporary, but God's throne endures forever and ever. Jesus promised that overcomers would sit with Him on His throne, just as He overcame and sat down with His Father on His throne (Revelation 3:21)."],

["Dream","Interpret","A vision during sleep; God spoke through dreams to Joseph and Daniel "+F[27]+" "+F[1]+" "+F[2]+"","To explain the meaning; Joseph and Daniel interpreted dreams from God "+F[1]+" "+F[2]+" "+F[9]+""],
["Wise","King","Having good judgment; the wise men followed the star to Jesus "+F[2]+" "+F[0]+" "+F[13]+"","Jesus spoke about the Kingdom of God more than any other topic — it was the central theme of His teaching and appears over 100 times in the Gospels. The Kingdom of God is both 'already' and 'not yet' — it began with Jesus' first coming and will be fully established at His second coming. Jesus said the kingdom belongs to those who become like little children (Matthew 18:3) — not childish, but trusting, humble, and dependent on the Father."],
["Servant","Slave","One who serves others; Jesus came as a servant to all "+F[1]+" "+F[2]+" "+F[8]+"","A person in bondage; Israel was enslaved in Egypt for 400 years "+F[2]+" "+F[0]+" "+F[12]+""],
["Free","Redeem","Released from bondage through Christ's sacrifice "+F[1]+" "+F[2]+" "+F[7]+"","To buy back; Jesus redeemed us from slavery to sin with His blood "+F[2]+" "+F[0]+" "+F[6]+""],
["Blood","Passover","The Bible says 'without the shedding of blood there is no forgiveness of sins' (Hebrews 9:22) — Jesus' blood was the ultimate and final sacrifice. Blood represents life in Scripture (Leviticus 17:11) — when Jesus shed His blood, He was pouring out His very life as a substitute for ours. The Passover lamb's blood on the doorposts in Egypt formed the shape of a cross — the top of the door and two side posts, centuries before crucifixion was invented.","The night God passed over Israelite homes marked with lamb's blood "+F[2]+" "+F[0]+" "+F[9]+""],
["Door","Exodus","Jesus said 'I am the door' — the only way to the Father "+F[16]+" "+F[15]+" Jesus said I am the door, whoever enters through me will be saved (John 10:9).","The departure of Israel from Egypt under Moses' leadership "+F[2]+" "+F[0]+" "+F[9]+""],
["Wander","Pillar","To roam without direction; Israel wandered 40 years in the wilderness "+F[1]+" "+F[2]+" "+F[9]+"","A column of cloud by day and fire by night that guided Israel "+F[29]+" "+F[16]+" "+F[15]+""],
["Cloud","Rock","God led Israel with a pillar of cloud during the day "+F[17]+" "+F[22]+" "+F[11]+"","Jesus told Peter that on 'this rock' (Peter's confession of faith) He would build His church — the foundation of Christianity is the truth that Jesus is the Messiah. In the Old Testament, God is called 'the Rock' at least 30 times — symbolising His unchanging nature, strength, and reliability as a foundation for life. Moses struck the rock at Meribah and water gushed out for two million people — Paul says 'that rock was Christ' (1 Cor 10:4), providing living water to His people."],
["Water","Quail","Jesus offered the Samaritan woman 'living water' that would become a spring welling up to eternal life — He is the source of spiritual refreshment that never runs dry. Water appears at key moments: creation (Spirit hovering over waters), the flood (judgment and renewal), the Red Sea (deliverance), and baptism (new life). When a Roman soldier pierced Jesus' side on the cross, blood and water flowed out (John 19:34) — medically indicating He died of a ruptured heart.","The birds God sent to feed Israel with meat in the desert "+F[0]+" "+F[1]+" "+F[13]+""],
["Commandment","Tabernacle","A divine instruction from God; the Ten Commandments "+F[2]+" "+F[0]+" "+F[7]+"","The portable tent of worship Israel carried through the wilderness "+F[28]+" "+F[16]+" "+F[15]+""],
["Tent","Priest","A temporary shelter; the tabernacle was God's tent among His people "+F[15]+" "+F[14]+" "+F[8]+"","A minister who offers sacrifices and intercedes between God and people "+F[28]+" "+F[0]+" "+F[1]+""],
["Levite","Offering","A member of the priestly tribe of Levi who served in the tabernacle "+F[3]+" "+F[4]+" "+F[9]+"","A gift presented to God in worship and dedication "+F[28]+" "+F[31]+" "+F[30]+""],
["Altar","Smoke","Altars were places where people met with God through sacrifice — from Abel's first offering to the heavenly altar described in Revelation. The altar of burnt offering in the tabernacle was made of acacia wood overlaid with bronze — wood represents humanity and bronze represents judgment. Abraham built altars wherever he went, marking his journey of faith — they served as memorials of encounters with God and acts of worship.","The rising vapour from burnt offerings ascending toward heaven "+F[1]+" "+F[2]+" "+F[7]+""],

["Ascend","Spirit","To go up; Jesus ascended to heaven before the disciples' eyes "+F[1]+" "+F[2]+" "+F[13]+"","The Holy Spirit is the third person of the Trinity — not an impersonal force but a divine person who speaks, guides, comforts, and can be grieved. The Hebrew word for Spirit is 'ruach' which also means 'wind' and 'breath' — the Spirit is as essential to spiritual life as breath is to physical life. The Holy Spirit appeared as a dove at Jesus' baptism, as tongues of fire at Pentecost, and as a mighty rushing wind — showing He works in diverse ways."],
["Wind","Flame","A rushing mighty wind filled the room at Pentecost "+F[23]+" "+F[17]+" "+F[22]+"","Tongues of fire that appeared over each believer at Pentecost "+F[23]+" "+F[1]+" "+F[2]+""],

["Apostle","Martyr","One sent out with authority; the twelve chosen by Jesus "+F[24]+" "+F[2]+" "+F[0]+"","A person who dies for their faith; Stephen was the first Christian martyr "+F[2]+" "+F[0]+" "+F[8]+""],
["Eternal","Amen","Eternal life is not just living forever — Jesus defined it as knowing God personally: 'This is eternal life, that they know You' (John 17:3). The Bible says God has 'set eternity in the human heart' (Eccl 3:11) — there is an innate longing in every person for something beyond this temporary world. The Hebrew word 'olam' (eternal/everlasting) comes from a root meaning 'hidden' — eternity is a reality hidden from full human comprehension.","Amen means 'so be it' or 'truly' and is used to affirm the truth of what has been said — Jesus often began statements with 'Truly, truly (Amen, amen).' Jesus is called 'The Amen' in Revelation 3:14 — He is the faithful and true witness, the ultimate confirmation of all God's promises. Amen is another Hebrew word used universally across languages and religions — it has been spoken in worship for over 3,000 years. "+F[32]+""]
