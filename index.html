["Ark of the Covenant","Tabernacle","Noah's ark was approximately 450 feet long, 75 feet wide, and 45 feet high — large enough to hold over 500 railroad cars worth of space. The ark is a picture of salvation — there was only one door to enter (Jesus said 'I am the door'), and God Himself shut it when the time of grace ended. The ark came to rest on the mountains of Ararat (modern Turkey), and explorers have searched for its remains for centuries, with several claimed sightings.","The portable tent of meeting that served as God's dwelling place among Israel during their wilderness journey This was an important part of Israel's worship system established by God. Archaeological finds have revealed what these items actually looked like in the ancient biblical world. This item held deep symbolic meaning in biblical culture, pointing to spiritual realities beyond its physical form."],
["Widow","Orphan","A woman whose husband has died; God commands special care for widows in both testaments This word carries deep significance in biblical theology and Christian practice. Church councils and creeds throughout history have carefully defined this teaching to preserve biblical truth. This concept is foundational to Christian theology and has been debated and refined by scholars for centuries.","A child who has lost both parents; God calls Himself a father to the fatherless and defender of orphans This word carries deep significance in biblical theology and Christian practice. Church councils and creeds throughout history have carefully defined this teaching to preserve biblical truth. This concept is foundational to Christian theology and has been debated and refined by scholars for centuries."],
["Sacrifice","Offering","In the Old Testament, animals were sacrificed to temporarily cover sins — Jesus' sacrifice on the cross permanently removed sins once and for all. The word 'sacrifice' comes from Latin 'sacri-facere' meaning 'to make sacred' — through Christ's sacrifice, believers are made holy and set apart for God. Abraham's near-sacrifice of Isaac on Mount Moriah happened on the same mountain ridge where Jesus would be crucified approximately 2,000 years later.","A gift voluntarily presented to God in worship, thanksgiving, or dedication as an act of faithful devotion This was an important part of Israel's worship system established by God. Early Christians practiced this as a central part of their faith, often at great personal risk and sacrifice. This element of worship has deep roots in both Old and New Testament practice."],
["Blessing","Curse","The most common Greek word for sin is 'hamartia' which literally means 'to miss the mark' — like an archer's arrow falling short of the target. Sin entered the world through one man (Adam) and death through sin — but grace overflowed through one man (Christ) to bring life to all who believe (Romans 5). The Bible identifies three categories of sin: the lust of the flesh, the lust of the eyes, and the pride of life (1 John 2:16) — the same three temptations Satan used on Eve and on Jesus.","A declaration of harm or misfortune; the opposite of blessing, often the consequence of disobedience This word carries deep significance in biblical theology and Christian practice. Understanding this doctrine deepens our grasp of God's character and His plan for humanity's redemption. Church councils and creeds throughout history have carefully defined this teaching to preserve biblical truth."],
["Victory","Defeat","Triumphant success through God's mighty power over sin, death, Satan, and all spiritual enemies Spiritual warfare is a reality for every believer, and God provides the resources to stand firm. Understanding this doctrine deepens our grasp of God's character and His plan for humanity's redemption. Church councils and creeds throughout history have carefully defined this teaching to preserve biblical truth.","Failure or loss in battle; Israel experienced crushing defeat whenever they turned away from God in disobedience This word carries deep significance in biblical theology and Christian practice. Church councils and creeds throughout history have carefully defined this teaching to preserve biblical truth. This concept is foundational to Christian theology and has been debated and refined by scholars for centuries."],
["Battle","Shout","A conflict or fight against enemies; Scripture declares that the Lord fights our battles on our behalf Spiritual warfare is a reality for every believer, and God provides the resources to stand firm. Understanding this doctrine deepens our grasp of God's character and His plan for humanity's redemption. Church councils and creeds throughout history have carefully defined this teaching to preserve biblical truth.","A loud triumphant cry of praise or war; when Israel shouted at Jericho the massive walls collapsed completely This word carries deep significance in biblical theology and Christian practice. Church councils and creeds throughout history have carefully defined this teaching to preserve biblical truth. This concept is foundational to Christian theology and has been debated and refined by scholars for centuries."],
["Spirit","Wind","The Holy Spirit is the third person of the Trinity — not an impersonal force but a divine person who speaks, guides, comforts, and can be grieved. The Hebrew word for Spirit is 'ruach' which also means 'wind' and 'breath' — the Spirit is as essential to spiritual life as breath is to physical life. The Holy Spirit appeared as a dove at Jesus' baptism, as tongues of fire at Pentecost, and as a mighty rushing wind — showing He works in diverse ways.","A powerful symbol of the Spirit's movement; a mighty rushing wind filled the room at the Pentecost outpouring The Holy Spirit plays a vital role in the life of every believer, providing guidance, comfort, and power. God frequently uses this element of nature throughout Scripture as a powerful symbol of spiritual truth. This appears at key turning points in the biblical narrative, marking moments of divine intervention."],
["Flame","Tongue","Fire symbolizing God's holy presence, purifying power, and the consuming nature of His divine glory The Holy Spirit plays a vital role in the life of every believer, providing guidance, comfort, and power. This concept is foundational to Christian theology and has been debated and refined by scholars for centuries. Understanding this doctrine deepens our grasp of God's character and His plan for humanity's redemption.","Languages and speech; at Pentecost the disciples miraculously spoke in many tongues understood by all nations The Holy Spirit plays a vital role in the life of every believer, providing guidance, comfort, and power. Understanding this doctrine deepens our grasp of God's character and His plan for humanity's redemption. Church councils and creeds throughout history have carefully defined this teaching to preserve biblical truth."],
["Gift","Church","A supernatural spiritual ability given by the Holy Spirit to each believer for building up the body of Christ The Holy Spirit plays a vital role in the life of every believer, providing guidance, comfort, and power. Church councils and creeds throughout history have carefully defined this teaching to preserve biblical truth. This concept is foundational to Christian theology and has been debated and refined by scholars for centuries.","The worldwide community of believers united in Christ for worship, fellowship, mission, and mutual encouragement The early church demonstrated this through their bold witness and sacrificial love. Church councils and creeds throughout history have carefully defined this teaching to preserve biblical truth. This concept is foundational to Christian theology and has been debated and refined by scholars for centuries."],
["Disciple","Apostle","A committed follower and student of Jesus who learns His teachings and applies them to daily life The early church demonstrated this through their bold witness and sacrificial love. Understanding this doctrine deepens our grasp of God's character and His plan for humanity's redemption. Church councils and creeds throughout history have carefully defined this teaching to preserve biblical truth.","One specifically chosen and sent out with Christ's authority to establish churches and spread the gospel worldwide The early church demonstrated this through their bold witness and sacrificial love. Understanding this doctrine deepens our grasp of God's character and His plan for humanity's redemption. Church councils and creeds throughout history have carefully defined this teaching to preserve biblical truth."],
["Martyr","Crown","A courageous person who suffers death rather than deny their faith; Stephen was the first Christian martyr This word carries deep significance in biblical theology and Christian practice. Understanding this doctrine deepens our grasp of God's character and His plan for humanity's redemption. Church councils and creeds throughout history have carefully defined this teaching to preserve biblical truth.","The Bible mentions five crowns believers can receive: the crown of life, crown of glory, crown of righteousness, crown incorruptible, and crown of rejoicing. Jesus wore a crown of thorns — thorns were part of the curse in Genesis 3, so by wearing them He was symbolically taking the curse of sin upon Himself. In Revelation 4:10, the 24 elders cast their crowns before God's throne — showing that every reward we receive ultimately belongs to and glorifies God."],
["Eternal Life","Amen","Eternal life is not just living forever — Jesus defined it as knowing God personally: 'This is eternal life, that they know You' (John 17:3). The Bible says God has 'set eternity in the human heart' (Eccl 3:11) — there is an innate longing in every person for something beyond this temporary world. The Hebrew word 'olam' (eternal/everlasting) comes from a root meaning 'hidden' — eternity is a reality hidden from full human comprehension.","Amen means 'so be it' or 'truly' and is used to affirm the truth of what has been said — Jesus often began statements with 'Truly, truly (Amen, amen).' Jesus is called 'The Amen' in Revelation 3:14 — He is the faithful and true witness, the ultimate confirmation of all God's promises. Amen is another Hebrew word used universally across languages and religions — it has been spoken in worship for over 3,000 years. Many great hymns and sermons throughout church history have been inspired by this truth."],

["Rosary Beads","Holy Water","A string of beads used to count prayers while meditating on mysteries from the life of Christ and Mary. The full Rosary consists of 20 decades, each with 10 Hail Marys and one Our Father. Pope John Paul II added the Luminous Mysteries in 2002, bringing the total to four sets of five mysteries.","Blessed water used for the sign of the cross when entering church and in various sacramental rites and blessings. Its use reminds Catholics of their baptismal promises and spiritual cleansing from sin. Holy water fonts are placed at every entrance of Catholic churches around the world."],
["Kneeling Prayer","Incense Swinging","Dropping to both knees on a kneeler during the most sacred moments of the Mass such as the Consecration. Kneeling expresses humility, adoration and submission before the real presence of Christ in the Eucharist. Catholic churches have padded kneelers built into every pew for this purpose.","A priest or deacon swinging a metal thurible (censer) containing burning incense during solemn liturgical celebrations. Psalm 141:2 says 'Let my prayer rise before you like incense.' The rising smoke symbolises prayers ascending to God and is used at Mass, Benediction and funerals."],
["Communion Line","Confession Booth","Walking forward in a line to receive the Body of Christ from the priest during Holy Communion at Mass. Catholics believe the bread and wine truly become the Body and Blood of Christ through transubstantiation. The communion procession is a solemn, reverent moment at the heart of every Catholic Mass.","Entering a small enclosed space in the church to confess sins privately to a priest in the Sacrament of Reconciliation. Jesus gave the apostles the power to forgive sins in John 20:23 — 'whose sins you forgive are forgiven.' The seal of confession means a priest can never reveal what is confessed under any circumstances."],
["Stations of Cross","Ash Wednesday","Walking from station to station around the church walls, stopping at 14 scenes depicting Jesus' journey to Calvary. Each station invites prayer and meditation on Christ's suffering, from His condemnation to His burial. Catholics traditionally pray the Stations of the Cross on Fridays during the season of Lent.","A priest marking a cross of ashes on each person's forehead saying 'Remember that you are dust and to dust you shall return.' The ashes come from burning the previous year's blessed Palm Sunday palm branches. Ash Wednesday marks the beginning of the 40-day season of Lent — prayer, fasting and preparation for Easter."],
["Lighting Candle","Sprinkling Rite","Placing a candle before a statue or icon of a saint and saying a prayer for a special intention or loved one. The burning flame represents the prayer continuing even after the person has left the church. Votive candles have been part of Catholic devotional practice for over a thousand years.","A priest walking through the congregation sprinkling holy water over the people as a blessing and baptismal reminder. This rite called the Asperges replaces the Penitential Act at the beginning of Mass during Easter season. The name comes from Psalm 51:7 — 'Sprinkle me with hyssop and I shall be clean.'"],
["Procession","Blessing","Walking in an organised line carrying a cross, candles and the Book of Gospels into the church at the start of Mass. Processions are also held on feast days like Corpus Christi when the Eucharist is carried through the streets. The entrance procession symbolises the pilgrim journey of God's people toward the heavenly kingdom.","A priest raising his hand and making the sign of the cross over people or objects to invoke God's grace and protection. The final blessing at Mass sends the congregation out with God's favour to serve the world. Parents also ask priests to bless their children, homes, vehicles and religious objects."],
["Altar Serving","Palm Waving","Young people assisting the priest during Mass by carrying the cross, holding the book, and preparing the altar. Altar servers have an important liturgical ministry that dates back to the earliest centuries of the Church. Both boys and girls can serve at the altar in most Catholic parishes today.","Holding and waving palm branches during the procession on Palm Sunday, remembering Jesus' triumphal entry into Jerusalem. John 12:13 says the crowd took palm branches and went out to meet Him shouting 'Hosanna.' The blessed palms are kept in homes as a sacramental and later burned to make ashes for Ash Wednesday."],
["Eucharistic Adoration","Fish Friday","Sitting or kneeling in silent prayer before the exposed Blessed Sacrament displayed in a monstrance on the altar. Catholics believe Christ is truly, really and substantially present in the consecrated Host. Some parishes have perpetual adoration chapels open 24 hours a day for continuous prayer and worship.","Choosing to eat fish instead of meat on Fridays as an act of penance remembering Christ's sacrifice on Good Friday. The practice of Friday abstinence from meat has been a Catholic discipline for centuries worldwide. The fish symbol (ichthys) is one of the earliest Christian symbols, representing Jesus Christ, Son of God, Saviour."],
["Choir Procession","Infant Baptism","Choir members in robes walking together in formation while singing a hymn to begin a solemn liturgical celebration. Sacred music has been central to Catholic worship since the earliest centuries of the Church. The choir leads the congregation in sung prayer, lifting hearts and voices together to God.","A priest pouring water over a baby's head while saying 'I baptize you in the name of the Father, Son and Holy Spirit.' Catholics baptize infants because they believe baptism removes original sin and makes the child a member of the Church. Parents and godparents make promises to raise the child in the Catholic faith until confirmation."]
];
const DENOM_CATHOLIC_EXPLAIN=[
["Transubstantiation","Papal Infallibility","The Catholic belief that during Mass the bread and wine truly become the Body and Blood of Jesus Christ. The appearance of bread and wine remains but the substance (inner reality) is completely changed. This teaching was formally defined at the Fourth Lateran Council in 1215 and is central to Catholic Eucharistic theology.","The teaching that when the Pope speaks officially (ex cathedra) on matters of faith or morals he is protected from error by God. This does not mean the Pope is perfect or sinless in his personal life or opinions. It has been formally invoked only twice in history — for the Immaculate Conception (1854) and the Assumption of Mary (1950)."],
["Purgatory","Immaculate Conception","A state of purification after death where souls are cleansed before entering heaven's perfect holiness. It is not a second chance for the wicked but a preparation for those already saved who died with imperfections. Catholics pray for souls in purgatory especially during November, the Month of the Holy Souls.","The Catholic dogma that Mary was conceived without the stain of original sin from the very first moment of her existence. This does not refer to Mary conceiving Jesus (a common confusion) but to Mary's own conception by her parents. It was proclaimed by Pope Pius IX in 1854 and Mary appeared at Lourdes in 1858 saying 'I am the Immaculate Conception.'"],
["Canon Law","Canonization","The complete system of laws and regulations that governs the Roman Catholic Church's organisation and discipline. The current Code of Canon Law contains 1,752 canons (rules) and was last revised in 1983. Canon law covers everything from the sacraments to church property to the rights and duties of clergy and laity.","The official process by which the Pope declares a deceased person to be a saint worthy of universal veneration and imitation. The process typically requires proof of two miracles attributed to the candidate's intercession after death. It can take decades or even centuries — Joan of Arc was canonized 489 years after her death."],
["Cardinal","Conclave","A senior member of the clergy appointed by the Pope, ranking just below the Pope in the Church hierarchy. Cardinals wear distinctive red robes symbolising their willingness to shed blood for the faith. Cardinals under age 80 form the electoral body that chooses a new Pope when the office becomes vacant.","The secret meeting of cardinals locked inside the Sistine Chapel to elect a new Pope after the previous Pope dies or resigns. The word comes from Latin 'cum clave' meaning 'with a key' because the cardinals are literally locked in. White smoke from the chapel chimney signals a successful election while black smoke means no decision yet."],
["Rosary","Tabernacle","A form of prayer using beads to meditate on 20 mysteries from the lives of Jesus and Mary while reciting prayers. Each mystery recalls a specific event like the Annunciation, Crucifixion or Resurrection. Pope John Paul II called the Rosary his favourite prayer and prayed all 20 mysteries every single day.","The ornate locked box on or near the altar where consecrated Hosts (the Body of Christ) are reserved after Mass. A sanctuary lamp burns continuously nearby to indicate that Christ is present in the tabernacle. The word comes from the Latin tabernaculum meaning tent, connecting to the Old Testament Tent of Meeting."],
["Lent","Advent","A 40-day season of prayer, fasting and almsgiving from Ash Wednesday to Easter preparing hearts for the Resurrection. The 40 days recall Jesus' 40 days of fasting and temptation in the wilderness (Matthew 4:1-2). Catholics over 14 abstain from meat on Ash Wednesday, Good Friday and all Fridays of Lent.","The four-week season of preparation before Christmas anticipating the coming of Christ at Bethlehem and His future return. Each Sunday an additional candle is lit on the Advent wreath — three purple and one pink (for joy). The word 'Advent' comes from the Latin 'adventus' meaning coming or arrival."],
["Sacrament","Diocese","An outward sign instituted by Christ that gives grace — Catholics recognise seven sacraments in total. The seven are Baptism, Confirmation, Eucharist, Penance, Anointing of the Sick, Holy Orders and Matrimony. The Catechism teaches that sacraments are necessary for salvation because they confer the grace they signify.","A geographical region of the Catholic Church under the authority and pastoral care of a bishop. The word comes from a Greek term for administration and the system dates to the earliest centuries of Christianity. There are approximately 3,000 dioceses worldwide, each with a cathedral as the bishop's official church."],
["Eucharist","Apostolic Succession","The Catholic term for Holy Communion — the central sacrament in which bread and wine become Christ's Body and Blood. Catholics believe the Eucharist is not merely a symbol but the real, true and substantial presence of Jesus Christ. The word comes from the Greek 'eucharistia' meaning thanksgiving, referring to Jesus giving thanks at the Last Supper.","The unbroken chain of ordination from the original twelve apostles through every bishop to the present day clergy. Catholics believe this continuous laying on of hands transmits the authority Christ gave His apostles. This is why Catholic priests must be ordained by a bishop who was ordained by another bishop going back to the apostles."],
["Marian Dogma","Beatification","An official teaching about Mary that Catholics are required to believe as part of the deposit of faith. The four Marian dogmas are: Mary as Mother of God, her perpetual virginity, the Immaculate Conception and her bodily Assumption into heaven. These beliefs developed over centuries and are considered infallibly defined by the Church.","The second-to-last step in the canonization process, where a deceased person is declared 'Blessed' by the Pope. Beatification requires proof of one miracle and allows public veneration in the candidate's home region. Mother Teresa was beatified in 2003 (just 6 years after her death) and canonized as a saint in 2016."],
["Holy Orders","Indulgence","The sacrament by which men are ordained as deacons, priests or bishops to serve the Church in sacred ministry. Only baptised men can receive this sacrament — a teaching the Catholic Church considers divinely established. The three degrees of Holy Orders each have specific roles: deacons serve, priests offer sacraments and bishops govern.","A remission of the temporal punishment due to sins that have already been forgiven through the Sacrament of Reconciliation. Indulgences can be partial or plenary (full) and can be applied to oneself or to souls in purgatory. The abuse of indulgences in the 16th century was one of the key triggers of Martin Luther's Protestant Reformation."]
];

const DENOM_BAPTIST_SING=[
["Amazing Grace","Just As I Am","A beloved hymn written by John Newton, a former slave trader who experienced God's transforming grace. The words describe being lost in sin but found and saved by grace alone through faith. It is the most recorded hymn in history and is sung at Baptist services, funerals and evangelistic crusades worldwide.","A hymn by Charlotte Elliott often sung during altar calls inviting people to come to Christ without waiting to improve themselves first. Billy Graham used this hymn at the close of nearly every one of his evangelistic crusades for over 60 years. Its message captures the Baptist conviction that salvation requires no human works — only simple faith in Jesus."],
["Blessed Assurance","Victory In Jesus","A joyful hymn by Fanny Crosby declaring the confident certainty of salvation through personal faith in Jesus Christ. The chorus proclaims 'This is my story, this is my song, praising my Saviour all the day long.' It reflects the Baptist emphasis on assurance of salvation — knowing you are saved and that nothing can change it.","A popular Southern Baptist hymn by Eugene Bartlett celebrating the complete triumph Christ won over sin, death and the grave. The chorus declares 'He sought me and bought me with His redeeming blood' echoing Ephesians 1:7. It is one of the most frequently sung hymns in Baptist churches across the American South and worldwide."],
["At the Cross","Standing on Promises","A hymn by Isaac Watts reflecting on the crucifixion — 'At the cross, at the cross where I first saw the light.' It describes the transformative moment of conversion when the burden of sin rolls away at Calvary. Baptist altar calls often feature this hymn as new believers come forward to profess their faith publicly.","A rousing hymn by Russell Kelso Carter declaring confident trust in every promise God has made in His Word. The lyrics proclaim 'Standing on the promises of Christ my King' with an energetic, faith-building melody. It reflects the Baptist commitment to biblical authority — building your entire life on the sure foundation of Scripture."],
["I Have Decided","Power In The Blood","A simple but powerful hymn of personal commitment to follow Jesus no matter what the cost or consequence. The lyrics declare 'I have decided to follow Jesus — no turning back, no turning back.' It comes from the testimony of an Indian convert who refused to deny Christ even facing death for his faith.","A lively Baptist hymn by Lewis Jones asking 'Would you be free from the burden of sin? There's power in the blood.' The blood of Jesus is central to Baptist theology — it cleanses, purifies, redeems and gives victory over sin. This hymn is frequently sung during Baptist revival meetings and baptismal services with great enthusiasm."],
["Shall We Gather","Leaning on Everlasting Arms","A beloved Baptist hymn about the future gathering of all believers at the river of life in the heavenly city. Revelation 22:1 describes the river of the water of life flowing from the throne of God and the Lamb. It is one of the most popular hymns sung at Baptist funerals, offering comfort and hope of reunion in heaven.","A hymn of trust and dependence on God's unfailing support through every circumstance and season of life. The lyrics 'What a fellowship, what a joy divine, leaning on the everlasting arms' come from Deuteronomy 33:27. It captures the Baptist experience of personal, intimate relationship with God as a loving, ever-present Father."]

const DENOM_BAPTIST_ACT=[
["Altar Call","Baptism Pool","The pastor inviting people to walk forward to the front of the church to make a decision for Christ publicly. This practice became widespread through the ministry of evangelist Charles Finney in the 1800s and Billy Graham in the 1900s. The altar call is one of the most distinctive features of Baptist worship services and evangelistic meetings.","A built-in pool of water behind or beneath the pulpit used for baptising new believers by full immersion underwater. Baptists insist on immersion because the Greek word 'baptizo' literally means to dip, plunge or submerge completely. Many Baptist churches have a large visible baptistry with steps leading down into the water."],
["Bible Raising","Handshake Line","The entire congregation holding their Bibles up high while the pastor reads or recites the Scripture passage for the sermon. This dramatic gesture symbolises the Baptist commitment to the Bible as the supreme authority for faith and practice. Some churches also have everyone stand and read the passage aloud together in unison.","The congregation lining up after the service to shake the pastor's hand and greet one another at the church door. This tradition of personal connection reflects the Baptist value of fellowship and community warmth. Many Baptist churches also pass a 'right hand of fellowship' to welcome new members into the congregation."],
["Testimony Sharing","Revival Preaching","A person standing before the congregation to tell their personal story of how they came to faith in Jesus Christ. Romans 10:9 says if you confess with your mouth that Jesus is Lord and believe in your heart you will be saved. Baptists greatly value personal testimony as evidence of genuine conversion and the power of God's grace.","A visiting evangelist preaching with passion and urgency during a week-long series of special nightly meetings. Baptist revivals aim to bring the lost to salvation and reignite the spiritual passion of existing church members. The tradition of protracted meetings and tent revivals has shaped Baptist culture for over two centuries."],
["Choir Robe","Sunday School Class","Choir members wearing matching coloured robes while singing special music during the worship service. Baptist church choirs are a major part of worship, often singing anthems, gospel songs and classic hymns. The robe symbolises unity and equality — everyone in the choir is equal before God regardless of social status.","A group divided by age sitting in a classroom studying a Bible lesson together before the main worship service begins. The modern Sunday School movement began in England in 1780 and Baptists adopted it enthusiastically. Baptist churches typically have classes for every age group from nursery through senior adults every Sunday morning."],
["Deacon Ordination","Mission Trip","Elders laying hands on a man's head and praying over him to set him apart as an ordained deacon of the church. Acts 6:1-6 describes the first deacons chosen to serve tables so the apostles could focus on prayer and the Word. Baptist deacons serve the practical needs of the church and assist the pastor in ministry and visitation.","A group travelling to another city, state or country to share the gospel, build churches or serve communities in need. Jesus commanded His followers to go into all the world and make disciples of every nation (Matthew 28:19-20). Baptist mission trips are a major part of church life, with thousands of members serving annually."],
["Prayer Meeting","Potluck Dinner","A midweek gathering, usually on Wednesday evening, where church members pray together for various needs and concerns. Acts 4:31 says after the early church prayed together the place was shaken and they were filled with the Holy Spirit. Wednesday night prayer meeting is one of the oldest and most cherished traditions in Baptist church life.","A communal meal where every family brings a dish to share after the Sunday worship service or at a church fellowship event. The early church in Acts 2:46 broke bread together with glad and generous hearts in their homes. Baptist potlucks (often called 'dinner on the grounds') are legendary for fried chicken and abundant homemade food."],
["Vacation Bible School","Church Van Pickup","A week-long summer programme for children with Bible stories, crafts, songs, games and snacks at the church building. VBS is one of the largest outreach events for Baptist churches, reaching thousands of unchurched children each summer. Many adults trace their first encounter with the gospel to attending Vacation Bible School as a child.","A church bus or van driving through neighbourhoods picking up children and families for Sunday services and programmes. Baptist churches pioneered the bus ministry in the 1960s and 1970s to bring people who had no transportation to church. Some large Baptist churches ran fleets of dozens of buses bringing hundreds of people to services each week."],
["Gospel Tract","Invitation Hymn","Handing a small printed pamphlet with a gospel message and prayer of salvation to a stranger in a public place. Romans 10:14 asks how can they hear without someone preaching, and gospel tracts extend that reach to the printed page. Baptists have been prolific producers and distributors of evangelistic literature for centuries.","The final hymn sung at the end of a Baptist worship service while the pastor extends an invitation for people to respond. The congregation sings softly while anyone feeling convicted can walk forward to accept Christ, join the church or rededicate their life. This moment is considered sacred in Baptist tradition — the climax of every worship service."],
["Covered Dish","Senior Banquet","Carrying a large covered casserole dish or pot of food into the church fellowship hall for a communal gathering. Baptist churches are famous for their fellowship meals where the long tables groan under the weight of home-cooked food. The covered dish supper builds community bonds and reflects the biblical value of sharing meals together.","A special formal dinner honouring the elderly members of the congregation for their years of faithful service to the church. Leviticus 19:32 says rise in the presence of the aged and show respect for the elderly. Baptist churches value their senior members and often host appreciation banquets with special music and tributes."],
["Sword Drill","Awana Club","A competition where children race to find a Bible verse as fast as possible when the reference is called out. Ephesians 6:17 calls the Word of God the sword of the Spirit, and children learn to 'draw their sword' quickly. Baptist sword drills teach children to navigate the Bible confidently and hide God's Word in their hearts.","A children's programme where kids earn awards by memorising Bible verses, completing handbook activities and wearing club uniforms. The name AWANA stands for 'Approved Workmen Are Not Ashamed' from 2 Timothy 2:15. Many Baptist churches use AWANA or similar programmes as their primary children's discipleship ministry."]
];
const DENOM_BAPTIST_EXPLAIN=[
["Believer's Baptism","Soul Competency","The conviction that only people who have personally professed faith in Christ should be baptized, never infants. Acts 2:41 says those who received Peter's message were baptized — belief came first, then baptism. This is the defining distinctive that gives Baptists their name and separates them from most other Christian traditions.","The belief that every individual person is competent and responsible before God alone for their own spiritual decisions. No priest, church, government or family member can make spiritual choices or stand in judgment for another person's soul. This Baptist distinctive is the theological foundation for religious liberty and separation of church and state."],
["Autonomy","Inerrancy","The principle that each local Baptist church is self-governing under Christ's lordship with no hierarchy above it. No bishop, convention, or denominational board can dictate what a local Baptist church believes, practices or decides. This means every Baptist church calls its own pastor, sets its own budget and determines its own direction.","The belief that the Bible is completely truthful and without error in everything it teaches and affirms as God's Word. 2 Timothy 3:16 says all Scripture is God-breathed and useful for teaching, rebuking, correcting and training. For Baptists, inerrancy means the Bible is the final authority that settles every question of faith and practice."],
["Eternal Security","Total Depravity","The teaching that once a person is truly saved by God's grace they can never lose their salvation or be unsaved. John 10:28-29 says Jesus gives eternal life and no one can snatch believers out of His hand. This is popularly expressed as 'once saved, always saved' and gives Baptists great assurance and confidence in their faith.","The doctrine that every part of human nature is corrupted by sin, making people totally unable to save themselves without God's help. This does not mean people are as evil as possible but that sin affects every area — mind, will, emotions and body. Romans 3:23 confirms that all have sinned and fall short of the glory of God."],
["Closed Communion","Congregational Polity","The practice of restricting the Lord's Supper to baptised members of that specific local church only. Some Baptist churches practice 'close' communion (open to any baptised believer) while others restrict it to members only. This reflects the Baptist conviction that the ordinances belong to the local church, not to individual Christians.","The system of church government where every member has an equal voice and vote in the decisions of the congregation. Major decisions like calling a pastor, approving a budget or purchasing property require a church-wide vote. This democratic approach reflects the Baptist belief that Christ alone is the head of the church, not any human leader."],
["Ordinance","Great Commission","A symbolic act commanded by Christ — Baptists recognise only two: baptism and the Lord's Supper. Unlike Catholics who call these sacraments (channels of grace), Baptists call them ordinances (acts of obedience). The Lord's Supper uses unleavened bread and grape juice (never wine) as memorials of Christ's broken body and shed blood.","Jesus' final command to His disciples to go and make disciples of all nations, baptising and teaching them (Matthew 28:19-20). This mandate is the driving mission of virtually every Baptist church, association and convention worldwide. Southern Baptists alone support over 3,500 missionaries in more than 100 countries around the globe."],
["Perseverance","Biblical Authority","The doctrine that all who are truly born again will persevere in faith to the end and not permanently fall away. Philippians 1:6 says God who began a good work in you will carry it on to completion. Baptists debate whether believers can temporarily backslide but agree that true saving faith will ultimately endure.","The conviction that the Bible alone is the supreme and final rule for everything a Baptist believes and practices. No creed, confession, tradition or human authority can override or stand equal to the clear teaching of Scripture. The Baptist rallying cry has always been 'No creed but the Bible, no authority but Christ.'"],
["Priesthood of Believers","Two Offices","The teaching that every born-again Christian has direct personal access to God without needing any human priest or mediator. 1 Peter 2:9 calls all believers a royal priesthood, a holy nation, God's own special people. This means every Baptist can pray directly to God, read and interpret Scripture, and minister to others.","The Baptist conviction that the New Testament establishes only two offices in the local church: pastor (also called elder or bishop) and deacon. Pastors are responsible for preaching, teaching, leading and shepherding the congregation. Deacons serve the practical needs of the church, following the pattern established in Acts chapter 6."],
["Separation","Landmarkism","The Baptist commitment to maintaining clear boundaries between the church and the state, and between believers and the world. Roger Williams founded the first Baptist church in America in 1638 largely over this issue of religious freedom. Baptists have historically been the strongest advocates for separation of church and state in American history.","A movement within Baptist life that teaches only Baptist churches constitute the true New Testament church with an unbroken lineage. Landmarkists traced Baptist origins not to the Reformation but all the way back to John the Baptist himself. While most modern Baptists reject this extreme view, it influenced Baptist identity and practice for over a century."],
["Revival","Convention","A sovereign work of God's Holy Spirit bringing spiritual awakening, conviction of sin and fresh commitment to Christ. Baptist history is marked by great revivals — the First and Second Great Awakenings transformed American religious life. The prayer for revival remains central to Baptist worship, with churches holding special revival meetings annually.","A cooperative organisation of autonomous Baptist churches working together voluntarily for missions, education and ministry. The Southern Baptist Convention (founded 1845) is the largest Protestant denomination in the United States. Conventions have no authority over local churches — they exist solely for cooperative mission work and fellowship."],
["Immersion","Regeneration","The only mode of baptism Baptists accept — complete submersion of the entire body under water and back up again. The English word 'baptize' comes from the Greek 'baptizo' which literally means to dip, plunge or immerse. When Jesus was baptized by John, Matthew 3:16 says He went up out of the water, implying He went fully under.","The supernatural act of God giving new spiritual life to a person who was dead in sin through the work of the Holy Spirit. Jesus told Nicodemus in John 3:3 that no one can see the kingdom of God unless they are born again. Baptists emphasise that regeneration is entirely God's work — humans cannot regenerate themselves by any effort or ritual."]
];

const DENOM_METHODIST_SING=[
["O For A Thousand Tongues","And Can It Be","Charles Wesley's greatest hymn celebrating the power of Jesus' name to set prisoners free and make the lame walk. He wrote over 6,000 hymns in his lifetime, more than almost any other hymn writer in Christian history. This hymn was written on the anniversary of his conversion and opens the United Methodist Hymnal.","Charles Wesley wrote this hymn of amazement that Christ would die for sinful humanity — 'Amazing love! How can it be?' It explores the mystery of the incarnation and atonement with theological depth unusual in congregational singing. The final verse, 'No condemnation now I dread,' captures Wesley's transformative experience of assurance of salvation."],
["Love Divine","Hark the Herald","A majestic hymn by Charles Wesley asking God to fill believers with perfect love and transform them into Christ's likeness. The words 'Love divine, all loves excelling, joy of heaven to earth come down' open one of Methodism's signature hymns. It reflects John Wesley's teaching on Christian perfection — the goal of growing in holiness until love is perfected.","Charles Wesley's beloved Christmas hymn originally beginning 'Hark how all the welkin rings' before George Whitefield changed the first line. The theology packed into this carol is extraordinary — incarnation, virgin birth, deity of Christ and redemption in just a few verses. Mendelssohn's tune, adapted from a cantata celebrating the printing press, is now inseparable from the words."],
["Blessed Assurance","It Is Well","Fanny Crosby's confident declaration that salvation is certain and present through personal relationship with Jesus Christ. Though blind from infancy, Crosby wrote over 8,000 hymns and was deeply connected to Methodist and holiness movements. 'This is my story, this is my song' has become one of the most universally sung phrases in all of Christian hymnody.","Written by Horatio Spafford after losing his four daughters in a shipwreck and his fortune in the Great Chicago Fire. As his ship passed near where his daughters drowned, he wrote 'When peace like a river attendeth my way, it is well with my soul.' This hymn of faith through unspeakable suffering is a favourite at Methodist funerals and memorial services."],
["A Charge to Keep","Be Thou My Vision","Charles Wesley's call to faithful service, based on Leviticus 8:35 where priests were charged to keep God's commands. Every Methodist pastor is reminded of this charge at their ordination to serve God and neighbour faithfully. The hymn reflects Wesley's conviction that every Christian has a calling from God that must be fulfilled with diligence.","An ancient Irish hymn dating to the 8th century, translated from Old Irish and beloved in Methodist and all Protestant worship. The prayer asks God to be our vision, wisdom, best thought, and great King of heaven above all else. Its Celtic origins remind us that Christianity has deep roots in the British Isles long before the Reformation."],
["How Great Thou Art","Guide Me O Thou Great","A Swedish hymn translated into English that became a worldwide phenomenon through Billy Graham's crusades. The original was written by Carl Boberg in 1885 after being caught in a thunderstorm that suddenly gave way to birdsong and sunshine. It was voted the UK's favourite hymn in multiple polls and is sung in Methodist churches with full-throated joy.","William Williams wrote this Welsh hymn about God guiding His pilgrim people through the wilderness of life to the promised land. The imagery draws directly from Israel's exodus — bread of heaven, fire and cloud, Jordan's crossing. It is traditionally sung at Welsh rugby matches and is one of the most powerful congregational hymns ever written."]
];
const DENOM_METHODIST_ACT=[
["Circuit Riding","Class Meeting","A pastor travelling on horseback from town to town preaching and visiting multiple small congregations spread across a region. John Wesley and his early preachers covered thousands of miles on horseback bringing the gospel to remote communities. This itinerant system became the backbone of early Methodism and is why Methodist pastors are still appointed, not called.","A small group of 6-12 people meeting weekly to give account of their spiritual lives and encourage one another in holiness. John Wesley required every Methodist to belong to a class meeting as the basic unit of discipleship and accountability. Members answered the question 'How is it with your soul?' honestly before the group each week."],
["Open Communion","Love Feast","Welcoming all baptised Christians to receive communion regardless of their denomination or church membership. This open table policy reflects the Methodist belief that communion is God's gift, not the church's to restrict. John Wesley practiced and promoted open communion as an expression of Christian unity and God's generous grace.","A fellowship gathering with simple food, water, singing and personal testimonies of God's work in people's lives. This practice comes from the early church's agape meals described in Jude 12 and 1 Corinthians 11. Wesley adopted it from the Moravians and love feasts remain a distinctive Methodist tradition especially during special seasons."],
["Covenant Renewal","Laying on of Hands","A congregation standing together on New Year's Eve or the first Sunday of the year to rededicate their lives to God's service. The Wesley Covenant Prayer includes the powerful words, 'I am no longer my own but yours — put me to what you will.' Watch Night services on New Year's Eve originated with the Moravians and were adopted by Wesley for Methodists.","A bishop or elder placing hands on a person's head during ordination, confirmation or prayer for healing. This ancient practice symbolises the passing of spiritual authority and the calling down of the Holy Spirit. In Methodist ordination, the bishop lays hands on the candidate while saying, 'Take authority to preach the Word of God.'"],
["Hymn Singing","Mission Collection","The entire congregation standing to sing multiple verses of a hymn with strong voices and sometimes harmony parts. Methodism was born in song — Charles Wesley's hymns taught theology, inspired faith and created identity for the movement. John Wesley published the first Methodist hymnal in 1737 and singing remains central to Methodist worship today.","Passing a special offering plate or container to collect money specifically designated for mission projects at home and abroad. Methodists have always been generous givers to missions, following Wesley's rule: 'Earn all you can, save all you can, give all you can.' United Methodist mission giving supports hospitals, schools and churches in over 130 countries."],
["Confirmation Class","Parsonage Visit","Young people meeting regularly with the pastor to study Methodist beliefs and prepare to publicly profess their faith. Confirmation follows infant baptism, fulfilling the promises made by parents and godparents at the child's baptism. The service includes the bishop or elder laying hands on each confirmand while the congregation prays for them.","Visiting the pastor and their family at the church-provided home (parsonage) for fellowship and pastoral care conversations. The parsonage system means Methodist pastors live in a home owned by the church, close to the congregation. This tradition of visiting the parsonage builds the relational bond between pastor and people that Wesley valued deeply."],
["Communion Rail","Bible Reading","Kneeling at a rail across the front of the church to receive communion bread and cup from the pastor and servers. The communion rail is a distinctive feature of Methodist church architecture, inviting people to come forward and kneel. It also serves as a place of prayer, where people can kneel during altar calls or times of personal commitment.","The pastor or lay reader standing at the lectern to read aloud from the Old Testament, Epistles or Gospels during worship. The Revised Common Lectionary provides a three-year cycle of readings used in most Methodist churches worldwide. Wesley believed Christians should read Scripture daily and systematically, not just randomly opening the Bible."],
["Wesley Prayer","Stewardship Pledge","Reciting a specific prayer written by John Wesley, especially the Covenant Prayer used in annual renewal services. Wesley's prayers reflect his deep spirituality and practical approach to the Christian life of devotion. 'I am no longer my own but yours' expresses the total surrender to God that Wesley considered essential.","Filling out a card committing to give a specific amount of money, time and talent to the church in the coming year. Methodist stewardship campaigns emphasise that everything belongs to God and we are managers, not owners. Wesley himself was remarkably generous — when his income increased, he kept his expenses the same and gave away the rest."],
["District Meeting","Choir Anthem","Representatives from multiple Methodist churches in a geographic area gathering for business, worship and fellowship together. The district is led by a District Superintendent appointed by the bishop to oversee the churches and pastors. These meetings embody the connectional principle — Methodists are never alone but always linked to the wider body of Christ.","The choir performing a special prepared piece of music during the worship service, often at the offertory or before the sermon. Methodist choral tradition is rich and varied, from classical anthems to gospel arrangements to contemporary praise. The choir serves as musical leaders who lift the congregation's worship through well-prepared, Spirit-filled singing."],
["Advent Wreath","Healing Prayer","Lighting candles on a circular wreath with four candles (three purple, one pink) plus a white Christ candle in the centre. Each candle represents a theme of Advent: hope, peace, joy, and love, lit on successive Sundays leading to Christmas. Methodist churches use the Advent wreath as a focal point for worship during the four weeks before Christmas.","A pastor or elder anointing a sick person with oil and laying hands on them while the congregation prays for healing. James 5:14-15 instructs the sick to call the elders for prayer and anointing, promising that the prayer of faith will save the sick. Methodist healing services combine faith, medical care and the understanding that God works in mysterious ways."],
["Camp Meeting","Social Action","An outdoor multi-day gathering of multiple Methodist congregations for preaching, singing, prayer and spiritual renewal. Camp meetings began in the early 1800s on the American frontier and became a defining feature of Methodist evangelism. Thousands would gather in tent cities for days of powerful preaching and dramatic conversions under the open sky.","Methodists working together on community projects like food banks, homeless shelters, tutoring programmes or advocacy for justice. Wesley himself opened medical clinics, schools for the poor, and lending programmes for struggling workers. The Methodist Social Principles state that the church must engage actively with the injustices and needs of the world."]

const DENOM_METHODIST_EXPLAIN=[
["Prevenient Grace","Quadrilateral","God's grace that goes before us and works in our lives even before we are aware of God or respond to Him. It is the grace that draws, convicts and enables every person to respond to God's invitation of salvation. Wesley taught that without prevenient grace, humans in their fallen state could not even begin to turn toward God.","Wesley's four sources of theological authority: Scripture (primary), tradition, reason and experience working together. Scripture always has the highest authority, but tradition shows how Christians have understood it across the centuries. Reason helps us think clearly about faith, and experience confirms God's truth in our personal walk with Him."],
["Christian Perfection","Connectionalism","Wesley's teaching that believers can experience a second work of grace where God's love fills the heart completely. This does not mean sinless perfection but rather a heart entirely devoted to loving God and loving others. Wesley considered this the goal of the Christian life and the distinctive teaching of Methodism above all else.","The foundational Methodist principle that all churches and leaders are interconnected in a web of mutual support and accountability. No Methodist church stands alone — each is connected through districts, conferences and the worldwide denomination. This system allows resources to flow from stronger churches to weaker ones and ensures accountability for all leaders."],
["Itinerancy","Sanctification","The system by which Methodist bishops appoint pastors to their churches rather than churches choosing their own pastors. Pastors agree to go wherever the bishop sends them, whether to a large city church or a small rural congregation. This system ensures that every church receives a pastor and prevents the strongest preachers from clustering in wealthy churches.","God's ongoing work of making believers more holy and more like Christ through the power of the Holy Spirit day by day. Wesley distinguished between initial sanctification (at conversion) and entire sanctification (a deeper work of grace). Methodists pursue holiness not through rigid rules but through the means of grace — prayer, Scripture, fasting and sacraments."],
["Book of Discipline","Social Principles","The official book containing all the laws, doctrine, history and organisational procedures of the United Methodist Church. It is revised every four years at General Conference and governs everything from local church structure to clergy ethics. The Discipline reflects Wesley's methodical approach to church organisation — the very thing that gave Methodism its name.","The UMC's official statements on pressing social issues including poverty, racism, war, environment, human rights and healthcare. These principles guide faithful Christian action on complex issues where the Bible may not give specific modern instructions. Wesley himself was passionate about social justice — he opposed slavery, championed education for the poor and visited prisoners."],
["Means of Grace","Works of Mercy","The practices through which God's grace flows into the believer's life: prayer, Scripture, fasting, communion and Christian fellowship. Wesley divided these into works of piety (prayer, Bible study, communion) and works of mercy (serving others). He insisted that using the means of grace regularly was essential for spiritual growth, not optional.","Acts of compassion and justice that flow from genuine faith — feeding the hungry, clothing the naked, visiting the sick and imprisoned. Wesley famously said, 'Do all the good you can, by all the means you can, in all the ways you can.' He lived this out by spending most of his considerable income on helping the poor rather than on personal comfort."],
["General Conference","Bishop","The highest legislative body of the United Methodist Church, meeting every four years with elected delegates worldwide. Only General Conference can officially speak for the denomination on matters of doctrine, organisation and social policy. It has approximately 860 delegates — half clergy, half laity — representing annual conferences from around the globe.","An ordained elder elected by a jurisdictional or central conference to lead, ordain clergy and appoint pastors across a defined area. Methodist bishops serve for life (or until retirement) and have authority to set pastoral appointments each year. Wesley himself was never a bishop, but the office developed as Methodism spread beyond England to America and the world."],
["Elder","Deacon","An ordained minister authorised to preach the Word, administer sacraments and provide spiritual leadership for the congregation. Elders are 'in full connection' with their annual conference and are guaranteed an appointment to serve a church. The ordination of elders involves the laying on of hands by the bishop and a lifetime commitment to itinerant ministry.","An ordained minister focused specifically on Word, Service and bridging the church and the world in acts of compassion. Unlike elders, deacons do not administer sacraments or have guaranteed appointments to local churches. The renewed order of deacons since 1996 reflects Methodism's deep commitment to serving the needs of the community beyond the church walls."],
["Watch Night","Love Feast","A special worship service held on New Year's Eve where Methodists gather to reflect on the year and renew their covenant with God. Wesley adapted this practice from the Moravians and it became one of early Methodism's most distinctive traditions. The service often includes communion, testimonies, hymn singing and the Wesley Covenant Prayer at midnight.","A fellowship meal featuring simple food (often bread and water), testimony sharing, singing and corporate prayer in a warm atmosphere. Wesley borrowed this from the Moravian Brethren and it became a regular Methodist practice for building community. The love feast is not communion but a celebration of Christian fellowship and shared experience of God's grace."],
["Class Leader","Local Pastor","A lay person appointed to lead a small group (class meeting) responsible for the spiritual care of its members. The class leader asked each member weekly, 'How is it with your soul?' and provided guidance and accountability. This role was essential to early Methodism's explosive growth — Wesley said the class meeting was the sinew of Methodism.","A licensed minister appointed to serve a congregation while continuing theological education but not yet fully ordained. Local pastors can baptize, marry, conduct funerals and lead communion under the supervision of a district superintendent. They serve an essential role in Methodism, particularly in smaller congregations that cannot support a full-time ordained elder."],
["Aldersgate","Circuit","The location in London where John Wesley felt his heart 'strangely warmed' on May 24, 1738, the pivotal moment of his spiritual awakening. Wesley wrote that he felt he did trust in Christ, Christ alone, for salvation and an assurance was given that Christ had taken away his sins. This experience became the model for Methodist conversion — a personal, heartfelt encounter with God's saving grace.","A group of churches served by one or more pastors who travel between them, preaching and providing pastoral care. Wesley organised his growing movement into circuits that itinerant preachers would ride on horseback, visiting each church in rotation. The circuit system allowed Methodism to spread rapidly across England and then America with remarkable efficiency."]

const VALID_CODES=['LOGOS2026','LIVINGWORD','FULLGAME50','ADVENT144','BLESSED777','PSALM2334','JOHN316GO','FAITHFULL','REDEEMED1','GRACE4ALL'];
function isPro(){return S.isPro}
function checkUnlock(){
  try{
    if(localStorage.getItem('ll_pro')==='1')S.isPro=true;
    // Load denomination packs — unlocked + active state
    DENOM_PACKS.forEach(p=>{
      p.unlocked=localStorage.getItem('ll_dp_'+p.id)==='1';
      // Active defaults to true when unlocked, but can be toggled off
      const activeKey='ll_dp_active_'+p.id;
      const stored=localStorage.getItem(activeKey);
      p.active=p.unlocked?(stored===null?true:stored==='1'):false;
    });
  }catch(e){}
}
function toggleDenomPack(id){
  const p=DENOM_PACKS.find(x=>x.id===id);
  if(!p||!p.unlocked)return;
  p.active=!p.active;
  try{localStorage.setItem('ll_dp_active_'+id,p.active?'1':'0')}catch(e){}
  render();
}
function unlockPro(code){
  const c=code.trim().toUpperCase();
  if(VALID_CODES.includes(c)){
    S.isPro=true;try{localStorage.setItem('ll_pro','1')}catch(e){}return true}
  for(const p of DENOM_PACKS){
    if(p.codes.includes(c)){p.unlocked=true;p.active=true;try{localStorage.setItem('ll_dp_'+p.id,'1');localStorage.setItem('ll_dp_active_'+p.id,'1')}catch(e){}return true}
  }
  return false;
}
function getWeekNumber(){const d=new Date(),j=new Date(d.getFullYear(),0,1);return Math.ceil(((d-j)/86400000+j.getDay()+1)/7)}
// Free tier limits per mode
function freeLimit(m){return m==='sing'?30:m==='act'?40:50}
function getWeeklyCards(full,mode){
  if(isPro())return full;
  const week=getWeekNumber(),n=full.length,count=Math.min(freeLimit(mode||'explain'),n),idx=[];
  let seed=week*7+13;
  for(let i=0;i<n;i++)idx.push(i);
  for(let i=n-1;i>0;i--){seed=(seed*1103515245+12345)&0x7fffffff;const j=seed%(i+1);[idx[i],idx[j]]=[idx[j],idx[i]]}
  return idx.slice(0,count).sort((a,b)=>a-b).map(i=>full[i]);
}
// Get cards for a mode, including active denomination cards (routed by mode)
function gc(m){
  const base=m==='sing'?SING:m==='act'?ACT:EXPLAIN;
  let full=[...base];
  DENOM_PACKS.forEach(p=>{
    if(p.active){
      // Route denomination cards to correct mode
      if(p.sing&&m==='sing')full=full.concat(p.sing);
      if(p.act&&m==='act')full=full.concat(p.act);
      if(p.explain&&(m==='explain'||m==='act'||m==='sing'))full=full.concat(p.explain);
      // Legacy: if pack still uses flat cards array
      if(p.cards&&!p.sing)full=full.concat(p.cards);
    }
  });
  return getWeeklyCards(full,m);
}

// ─── ALL WORDS for Faith Library ───
let _allWordsCache=null;
function getAllWords(){
  if(_allWordsCache)return _allWordsCache;
  const all=[];
  const addCards=(arr,mode)=>{arr.forEach(c=>{
    all.push({word:c[0],def:c[2],mode});all.push({word:c[1],def:c[3],mode});
  })};
  addCards(SING,'sing');addCards(ACT,'act');addCards(EXPLAIN,'explain');
  DENOM_PACKS.forEach(p=>{
    if(p.sing)addCards(p.sing,'sing');
    if(p.act)addCards(p.act,'act');
    if(p.explain)addCards(p.explain,'explain');
  });
  all.sort((a,b)=>a.word.localeCompare(b.word));
  const seen=new Set();
  _allWordsCache=all.filter(w=>{if(seen.has(w.word))return false;seen.add(w.word);return true});
  return _allWordsCache;
}

function vibrate(ms){try{if(!S.muted&&navigator.vibrate)navigator.vibrate(ms)}catch(e){}}
function ensureAudio(){try{if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();if(actx.state==='suspended')actx.resume()}catch(e){}}
function beep(t){
  if(S.muted)return;
  try{ensureAudio();const c=actx;if(!c)return;
    if(t==='correct'){
      // Warm major chord chime (C-E-G) with detuning for richness
      [523,659,784].forEach((f,i)=>{
        const o=c.createOscillator(),o2=c.createOscillator(),g=c.createGain();
        o.connect(g);o2.connect(g);g.connect(c.destination);
        g.gain.value=.04;o.frequency.value=f;o2.frequency.value=f*1.003;
        o.type='sine';o2.type='sine';
        o.start(c.currentTime+i*.04);o2.start(c.currentTime+i*.04);
        g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.4+i*.04);
        o.stop(c.currentTime+.45+i*.04);o2.stop(c.currentTime+.45+i*.04);
      });vibrate(50)
    }
    else if(t==='skip'){
      const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);
      g.gain.value=.04;o.frequency.value=400;o.type='triangle';o.start();
      o.frequency.linearRampToValueAtTime(200,c.currentTime+.2);
      g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.25);o.stop(c.currentTime+.3)
    }
    else if(t==='timesup'){
      // Deep dramatic gavel hits
      [180,170,160].forEach((f,i)=>{
        const o=c.createOscillator(),o2=c.createOscillator(),g=c.createGain();
        o.connect(g);o2.connect(g);g.connect(c.destination);
        g.gain.value=.06;o.frequency.value=f;o2.frequency.value=f*2;o2.type='sine';
        o.type='triangle';o.start(c.currentTime+i*.25);o2.start(c.currentTime+i*.25);
        g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.5+i*.25);
        o.stop(c.currentTime+.55+i*.25);o2.stop(c.currentTime+.55+i*.25);
      });vibrate([100,50,100,50,200])
    }
    else if(t==='penalty'){
      // Warbling buzzer
      const o=c.createOscillator(),o2=c.createOscillator(),g=c.createGain();
      o.connect(g);o2.connect(g);g.connect(c.destination);
      g.gain.value=.05;o.frequency.value=148;o2.frequency.value=152;
      o.type='square';o2.type='square';o.start();o2.start();
      g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.3);
      o.stop(c.currentTime+.35);o2.stop(c.currentTime+.35);vibrate([200,100,200])
    }
    else if(t==='countdown'||t==='tick'){
      // Woody tick with harmonic
      const o=c.createOscillator(),o2=c.createOscillator(),g=c.createGain();
      o.connect(g);o2.connect(g);g.connect(c.destination);
      g.gain.value=.035;o.frequency.value=440;o2.frequency.value=880;
      o.type='sine';o2.type='sine';
      g.gain.setValueAtTime(.035,c.currentTime);
      o.start();o2.start();
      g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.12);
      o.stop(c.currentTime+.15);o2.stop(c.currentTime+.15);vibrate(20)
    }
    else if(t==='go'){
      // Triumphant ascending fanfare with sweep
      [440,554,659,880].forEach((f,i)=>{
        const o=c.createOscillator(),o2=c.createOscillator(),g=c.createGain();
        o.connect(g);o2.connect(g);g.connect(c.destination);
        g.gain.value=.05;o.frequency.value=f;o2.frequency.value=f*1.005;
        o.type='sine';o2.type='sine';
        o.start(c.currentTime+i*.06);o2.start(c.currentTime+i*.06);
        g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.4+i*.06);
        o.stop(c.currentTime+.45+i*.06);o2.stop(c.currentTime+.45+i*.06);
      });vibrate(80)
    }
    else if(t==='victory'){
      // Victory fanfare — ascending C-D-E-G-C
      [523,587,659,784,1047].forEach((f,i)=>{
        const o=c.createOscillator(),o2=c.createOscillator(),g=c.createGain();
        o.connect(g);o2.connect(g);g.connect(c.destination);
        g.gain.value=.04;o.frequency.value=f;o2.frequency.value=f*1.002;
        o.type='sine';o2.type='sine';
        o.start(c.currentTime+i*.12);o2.start(c.currentTime+i*.12);
        g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.5+i*.12);
        o.stop(c.currentTime+.55+i*.12);o2.stop(c.currentTime+.55+i*.12);
      });vibrate([50,30,50,30,100])
    }
    else{const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);g.gain.value=.04;o.frequency.value=660;o.type='sine';o.start();g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.2);o.stop(c.currentTime+.25)}
  }catch(e){}
}

function nextC(){
  const used=getUsed();
  used.add(S.ci);
  const deck=S.cards;
  // Check if all cards in current deck have been used
  if(used.size>=deck.length&&!isPro()){
    // Free user has exhausted their weekly cards - show upgrade prompt
    clearAllTimers();releaseWake();
    S.screen='cards-exhausted';render();return;
  }
  let next=S.ci+1;
  let attempts=0;
  while(used.has(next)&&attempts<deck.length){next=(next+1)%deck.length;attempts++}
  if(attempts>=deck.length){used.clear();next=(S.ci+1)%deck.length}
  S.ci=next;S.cardDiff=S.diff;S.diffLocked=false;
}

    if(S.showSolo){

            </div>
            <div style="font-family:'Lora',serif;font-size:11px;color:var(--wood-light);font-style:italic;margin-top:6px">

            <div style="font-family:'Cinzel',serif;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:${mColHex(S.soloMode)};font-weight:700;opacity:.8">${S.cardDiff==='easy'?'Easy':'Challenge'}</div>

            ${S.soloRevealed?`<div class="gold-line" style="width:50px"></div>

    if(S.rules)h+=rulesModal();
    if(S.showAbout)h+=aboutModal();
    if(S.showExit)h+=exitModal();
    if(S.showTutorial)h+=tutorialModal();
    if(S.showLearning)h+=learningModal();
    if(S.showJoin)h+=joinModal();
    if(S.showUnlock)h+=unlockModal();
    if(S.showRequestFree)h+=requestFreeModal();
    if(S.defWord)h+=defCardHTML(S.defWord,S.defDef);

    app.innerHTML=h;
  }catch(e){

  }
}

function submitFreeRequest(){
  const name=document.getElementById('reqName')?.value?.trim()||'';

  const msg=`Fellowship Face-Off — Free Access Request\n\nName: ${name}\nContact: ${contact}\nChurch: ${church}\nPack: ${pack||'Not specified'}\nReason: ${reason}`;

let unlockAttempts=0;let unlockLockout=0;
function tryUnlock(){
  // Rate limit: max 5 attempts per 60 seconds
  const now=Date.now();
  if(now<unlockLockout){
    const secs=Math.ceil((unlockLockout-now)/1000);
    alert('Too many attempts. Please wait '+secs+' seconds.');return;
  }
  const input=document.getElementById('unlockCodeInput');
  const code=input?input.value.trim():'';
  if(!code)return;
  if(unlockPro(code)){
    unlockAttempts=0;
    S.showUnlock=false;render();
    setTimeout(()=>{alert('🎉 Unlocked successfully! Enjoy your new content.')},100);
  } else {
    unlockAttempts++;
    if(unlockAttempts>=5){unlockLockout=now+60000;unlockAttempts=0}
    const err=document.getElementById('unlockError');
    if(err)err.style.display='block';
  }
}

// Faith Library filter
function filterLibrary(letter){
  const search=document.getElementById('libSearch');
  const chips=document.querySelectorAll('#libWords .word-chip');
  const query=letter&&letter!=='ALL'?null:(search?search.value.trim().toLowerCase():'');
  chips.forEach(c=>{
    const word=c.getAttribute('data-word')||'';
    if(letter&&letter!=='ALL'){
      c.style.display=word[0].toUpperCase()===letter?'':'none';
    } else if(query){
      c.style.display=word.toLowerCase().includes(query)?'':'none';
    } else {
      c.style.display='';
    }
  });
  if(letter&&search)search.value='';
}

function startGame(){
  saveTeamNames();
  if(S.mode==='mix'){
    // Championship: build round sequence
    S.champPhase=0;S.champPhaseRound=0;
    S.champTotalA=0;S.champTotalB=0;S.champScores=[];
    const totalRounds=S.champSing+S.champAct+S.champExplain;
    S.rounds=totalRounds;S.round=1;
    // Build the sequence of modes
    S.mixModes=[];
    for(let i=0;i<S.champSing;i++)S.mixModes.push('sing');
    for(let i=0;i<S.champAct;i++)S.mixModes.push('act');
    for(let i=0;i<S.champExplain;i++)S.mixModes.push('explain');
    S.champPhase=0;
    const am=S.mixModes[0];
    S.cards=shuffle(gc(am));S.ci=0;
  } else {
    const am=S.mode;
    S.cards=shuffle(gc(am));S.ci=0;
  }
  S.sA=0;S.sB=0;S.team='A';S.round=1;
  S.cardDiff=S.diff;S.diffLocked=false;S.paused=false;
  S.gameStartTime=Date.now();usedByMode={sing:new Set(),act:new Set(),explain:new Set()};
  S.role='host';startHosting();goFullscreen();
  resetTurnStats();pushState();S.screen='card-front';render();
}

function animScore(txt,color,left){
  setTimeout(()=>{
    const el=document.getElementById('scoreAnim');
    if(el){
      el.style.display='block';el.style.left=left;el.style.transform='translateX(-50%)';
      el.textContent=txt;el.style.color=color;el.style.fontSize='32px';
      el.style.animation='none';el.offsetHeight;
      el.style.animation='scoreBurst .3s ease-out forwards, scoreFloat 1s ease-out .2s forwards';

    }

function spawnSparkles(left){
  const container=document.getElementById('scoreAnim');if(!container)return;
  const parent=container.parentElement;if(!parent)return;
  for(let i=0;i<6;i++){
    const s=document.createElement('div');
    const angle=(i/6)*360;const rad=angle*Math.PI/180;
    const x=Math.cos(rad)*30;const y=Math.sin(rad)*30;
    s.style.cssText=`position:absolute;top:40%;left:${left};width:6px;height:6px;background:var(--gold-light);border-radius:50%;z-index:6;pointer-events:none;transform:translate(-50%,-50%);animation:sparkle .5s ease-out ${i*0.05}s forwards`;
    s.style.setProperty('--tx',x+'px');s.style.setProperty('--ty',y+'px');
    parent.appendChild(s);
    setTimeout(()=>s.remove(),600);
  }
}

function endTurn(){
  clearAllTimers();releaseWake();
  if(S.team==='A'){S.team='B';resetTurnStats();S.screen='card-front'}
  else{
    if(S.round>=S.rounds){
      // Championship: accumulate scores
      if(S.mode==='mix'){
        S.champTotalA+=S.sA;S.champTotalB+=S.sB;
        S.champScores.push({phase:getActiveMode(),sA:S.sA,sB:S.sB});
      }
      logGame();beep('victory');S.screen='gameover';
      // Post-game share nudge after 3 seconds
      setTimeout(()=>{
        if(S.screen==='gameover'){
          const nudge=document.getElementById('shareNudge');
          if(nudge)nudge.style.display='flex';
        }
      },3000);
    }
    else{
      S.round++;S.team='A';resetTurnStats();
      if(S.mode==='mix'){
        // Championship: save current phase scores and move to next
        const prevMode=getActiveMode();
        S.champTotalA+=S.sA;S.champTotalB+=S.sB;
        S.champScores.push({phase:prevMode,sA:S.sA,sB:S.sB});
        // Check if moving to next mode phase
        const prevPhase=S.champPhase;
        S.champPhase=S.round-1; // 0-indexed position in mixModes
        if(S.mixModes[S.champPhase]!==prevMode){
          // New mode phase — reset round scores, load new cards
          S.sA=0;S.sB=0;
          S.cards=shuffle(gc(getActiveMode()));S.ci=0;
        }
      }
      S.screen='card-front';
    }
  }render();
}

// ─── v9: SCORE CARD IMAGE ───
function generateScoreCard(){
  try{
    const c=document.createElement('canvas');c.width=1080;c.height=1080;
    const x=c.getContext('2d');
    // Green felt background
    x.fillStyle='#1B4D2E';x.fillRect(0,0,1080,1080);
    // Parchment card
    x.fillStyle='#F5E6C8';x.beginPath();x.roundRect(60,60,960,960,24);x.fill();
    // Wood border
    x.strokeStyle='#5C3A1E';x.lineWidth=6;x.beginPath();x.roundRect(60,60,960,960,24);x.stroke();
    // Gold inner border
    x.strokeStyle='#C8963E';x.lineWidth=2;x.beginPath();x.roundRect(80,80,920,920,18);x.stroke();
    // Gold corner ornaments
    const corners=[[95,95],[985,95],[95,985],[985,985]];
    x.strokeStyle='#C8963E';x.lineWidth=3;
    corners.forEach(([cx,cy],i)=>{
      x.beginPath();
      if(i===0){x.moveTo(cx,cy+20);x.lineTo(cx,cy);x.lineTo(cx+20,cy)}
      if(i===1){x.moveTo(cx-20,cy);x.lineTo(cx,cy);x.lineTo(cx,cy+20)}
      if(i===2){x.moveTo(cx,cy-20);x.lineTo(cx,cy);x.lineTo(cx+20,cy)}
      if(i===3){x.moveTo(cx-20,cy);x.lineTo(cx,cy);x.lineTo(cx,cy-20)}
      x.stroke();
    });
    // Title
    x.fillStyle='#3B2210';x.font='bold 52px serif';x.textAlign='center';
    x.fillText('Fellowship Face-Off',540,160);
    // Gold divider
    const grd=x.createLinearGradient(240,180,840,180);
    grd.addColorStop(0,'transparent');grd.addColorStop(0.3,'#C8963E');grd.addColorStop(0.5,'#E8B84A');grd.addColorStop(0.7,'#C8963E');grd.addColorStop(1,'transparent');
    x.strokeStyle=grd;x.lineWidth=3;x.beginPath();x.moveTo(240,185);x.lineTo(840,185);x.stroke();
    // Subtitle
    x.font='italic 22px serif';x.fillStyle='#8B5E34';
    x.fillText('The Great Christian Multiplayer Game',540,220);
    // Scores
    const isChamp=S.mode==='mix';
    const tA=isChamp?S.champTotalA:S.sA;const tB=isChamp?S.champTotalB:S.sB;
    const w=tA>tB?'A':tB>tA?'B':null;
    // Team A panel
    x.fillStyle='rgba(43,108,176,.1)';x.beginPath();x.roundRect(120,270,380,280,16);x.fill();
    x.strokeStyle='#2B6CB0';x.lineWidth=3;x.beginPath();x.roundRect(120,270,380,280,16);x.stroke();
    x.fillStyle='#2B6CB0';x.font='bold 28px serif';x.fillText(sanitize(S.nameA),310,320);
    x.font='bold 120px serif';x.fillText(String(tA),310,440);
    // Team B panel
    x.fillStyle='rgba(197,48,48,.1)';x.beginPath();x.roundRect(580,270,380,280,16);x.fill();
    x.strokeStyle='#C53030';x.lineWidth=3;x.beginPath();x.roundRect(580,270,380,280,16);x.stroke();
    x.fillStyle='#C53030';x.font='bold 28px serif';x.fillText(sanitize(S.nameB),770,320);
    x.font='bold 120px serif';x.fillText(String(tB),770,440);
    // VS circle
    x.fillStyle='#3B2210';x.beginPath();x.arc(540,400,36,0,Math.PI*2);x.fill();
    x.fillStyle='#C8963E';x.font='bold 28px serif';x.fillText('VS',540,410);
    // Winner banner
    x.fillStyle='#C8963E';x.beginPath();x.roundRect(200,590,680,70,12);x.fill();
    x.fillStyle='#3B2210';x.font='bold 32px serif';
    x.fillText(w?('🏆 '+sanitize(w==='A'?S.nameA:S.nameB)+' Wins!'):"It's a Tie!",540,638);
    // Mode + rounds
    x.font='italic 22px serif';x.fillStyle='#5C3A1E';
    x.fillText(mL(S.mode)+' · '+S.rounds+' rounds',540,710);
    // Championship breakdown
    if(isChamp&&S.champScores.length){
      let cy=760;
      S.champScores.forEach(sc=>{
        const icon=sc.phase==='sing'?'Sing-Off':sc.phase==='act'?'Act It Out':'Explain';
        x.font='18px serif';x.fillStyle='#5C3A1E';x.textAlign='left';
        x.fillText(icon,200,cy);
        x.textAlign='right';x.fillText(sc.sA+' — '+sc.sB,880,cy);
        cy+=35;
      });
      x.textAlign='center';
    }
    // Footer with CTA
    x.font='bold 20px serif';x.fillStyle='#1B4D2E';
    x.fillText('Can you beat this score? Download Fellowship Face-Off!',540,980);
    x.font='16px serif';x.fillStyle='#8B5E34';
    x.fillText(location.href,540,1010);
    return c.toDataURL('image/png');
  }catch(e){return null}
}

}

    const el=document.documentElement;
    if(el.requestFullscreen)el.requestFullscreen();
    else if(el.webkitRequestFullscreen)el.webkitRequestFullscreen();
    // Lock to current orientation if possible
    if(screen.orientation&&screen.orientation.lock){screen.orientation.lock(isLandscape?'landscape':'portrait').catch(()=>{})}
  }catch(e){}
}
function exitFullscreen(){
  try{if(document.fullscreenElement){document.exitFullscreen()}else if(document.webkitFullscreenElement){document.webkitExitFullscreen()}}catch(e){}
}

render();

if('serviceWorker'in navigator){
  navigator.serviceWorker.register('sw.js').then(reg=>{
    reg.addEventListener('updatefound',()=>{
      const nw=reg.installing;
      nw.addEventListener('statechange',()=>{
        if(nw.state==='installed'&&navigator.serviceWorker.controller){
          const b=document.createElement('div');b.className='install-banner';b.onclick=()=>location.reload();
          b.innerHTML='<div class="install-inner"><div style="flex:1;color:var(--parchment);font-family:Cinzel,serif;font-size:13px">🆕 Update available</div><button class="btn-gold" style="padding:8px 14px;font-size:12px">Refresh</button></div>';
          document.body.appendChild(b);
        }
      });
    });
    // Request push notification permission after 3rd open
    const opens=parseInt(localStorage.getItem('ll_opens')||'0');
    if(opens>=3&&'Notification'in window&&Notification.permission==='default'){
      setTimeout(()=>{Notification.requestPermission().then(p=>{
        if(p==='granted'&&reg.active){
          // Schedule weekly reminder via SW
          try{reg.showNotification('Fellowship Face-Off',{body:'New cards are ready! Come play this weeks words.',icon:'icon-192.png',badge:'icon-192.png',tag:'weekly'})}catch(e){}
        }
      })},5000);
    }
  }).catch(()=>{});
}

</script>
</body>
</html>
