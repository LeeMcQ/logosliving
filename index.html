<style>
:root{
--parchment:#F5E6C8;--parchment-dark:#E8D5A8;--parchment-deep:#D4BC8B;
--wood:#5C3A1E;--wood-light:#8B5E34;--wood-dark:#3B2210;
--felt-green:#1B4D2E;--felt-dark:#0F2E1A;
--gold:#C8963E;--gold-light:#E8B84A;--gold-dark:#8B6914;
--red-card:#B83232;--red-deep:#8B1A1A;
--blue-card:#2B5C8B;--blue-deep:#1A3A5C;
--yellow-card:#C89632;--yellow-deep:#8B6A14;
--team-a:#2B6CB0;--team-b:#C53030;
--ink:#2C1810;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow-x:hidden}
body{font-family:'Lora',Georgia,serif;background:var(--felt-green);color:var(--ink);
background-image:radial-gradient(ellipse at 30% 20%,rgba(27,77,46,.9),transparent 60%),radial-gradient(ellipse at 70% 80%,rgba(15,46,26,.9),transparent 60%)}
button{font-family:inherit;outline:none;border:none;background:none;cursor:pointer;-webkit-tap-highlight-color:transparent;min-height:44px}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
@keyframes cardFlip{from{transform:perspective(800px) rotateY(90deg);opacity:0}to{transform:perspective(800px) rotateY(0);opacity:1}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
@keyframes confetti{0%{transform:translateY(0) rotate(0);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
@keyframes glow{0%,100%{text-shadow:0 0 8px rgba(200,150,62,.4)}50%{text-shadow:0 0 20px rgba(200,150,62,.8),0 0 40px rgba(200,150,62,.3)}}
@keyframes breathe{0%,100%{opacity:.4}50%{opacity:.9}}
@keyframes countPulse{0%{transform:scale(1)}50%{transform:scale(1.15)}100%{transform:scale(1)}}
@keyframes scoreFloat{from{opacity:1;transform:translateY(0) scale(1)}to{opacity:0;transform:translateY(-40px) scale(1.5)}}
@keyframes stampIn{from{transform:scale(2) rotate(-12deg);opacity:0}to{transform:scale(1) rotate(0);opacity:1}}
@keyframes cdPop{0%{transform:scale(2.5);opacity:0}40%{transform:scale(.9);opacity:1}100%{transform:scale(1);opacity:1}}
@keyframes singPulse{0%,100%{box-shadow:0 0 0 0 rgba(200,150,62,.4)}50%{box-shadow:0 0 0 12px rgba(200,150,62,0)}}
@keyframes correctStamp{0%{transform:scale(0) rotate(-20deg);opacity:0}60%{transform:scale(1.15) rotate(3deg);opacity:1}100%{transform:scale(1) rotate(0);opacity:1}}

.screen{min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 10px;position:relative}
.content{z-index:1;display:flex;flex-direction:column;align-items:center;width:100%;max-width:400px}
.panel{background:var(--parchment);border-radius:6px;position:relative;box-shadow:0 2px 8px rgba(0,0,0,.3),inset 0 0 20px rgba(139,94,52,.12);border:2px solid var(--parchment-deep);contain:content}
.wood-frame{background:linear-gradient(145deg,var(--wood-light),var(--wood),var(--wood-dark));border-radius:8px;padding:5px;box-shadow:0 4px 16px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.1)}
.gold-line{height:2px;background:linear-gradient(90deg,transparent,var(--gold),var(--gold-light),var(--gold),transparent);margin:6px auto;opacity:.7}
.scores{display:flex;gap:10px;justify-content:center;width:100%}
.score-box{flex:1;border-radius:4px;text-align:center;padding:10px 6px;transition:all .3s;contain:content}
.score-label{font-family:'Cinzel',serif;font-size:11px;letter-spacing:2px;text-transform:uppercase;margin-bottom:2px;font-weight:700}
.score-val{font-family:'Cinzel',serif;font-size:38px;font-weight:900;line-height:1}
/* Compact scores for gameplay */
.scores-compact{display:flex;gap:6px;align-items:center;justify-content:center;width:100%}
.scores-compact .sc-team{display:flex;align-items:center;gap:4px;padding:6px 10px;border-radius:4px;font-family:'Cinzel',serif;font-weight:700}
.scores-compact .sc-label{font-size:10px;letter-spacing:1px;opacity:.8}
.scores-compact .sc-num{font-size:22px}
.scores-compact .sc-div{font-family:'Almendra',serif;font-size:12px;color:var(--gold);opacity:.5}
/* Big card for gameplay */
.big-card{width:100%;padding:30px 16px 24px;border-radius:12px;text-align:center;position:relative;border-left-width:8px;border-left-style:solid;box-shadow:0 8px 24px rgba(0,0,0,.45)}
.big-word{font-family:'Almendra',serif;font-weight:700;padding:18px 4px;line-height:1.05;color:var(--ink);text-shadow:0 2px 0 rgba(200,150,62,.18);word-wrap:break-word;overflow-wrap:break-word}
@media(max-width:340px){.sc-num{font-size:18px!important}}

/* ─── LANDSCAPE MODE ─── */
@media(orientation:landscape) and (max-height:500px){
  .screen{padding:8px 10px;min-height:100dvh}
  .content{max-width:100%;flex-direction:row;flex-wrap:wrap;gap:4px}
  /* Top bar spans full width */
  .top-bar{width:100%;min-height:32px}
  .top-bar-btn{min-width:36px;min-height:36px;font-size:14px}
  /* Landscape gameplay layout: card left, controls right */
  .ls-card-area{flex:3;min-width:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px}
  .ls-ctrl-area{flex:2;min-width:140px;max-width:220px;display:flex;flex-direction:column;gap:4px;align-items:stretch;justify-content:center}
  .big-card{padding:14px 10px 10px;min-height:auto!important;border-radius:8px}
  .big-word{font-size:clamp(28px,8vw,56px)!important;padding:8px 2px}
  .btn-correct{padding:10px!important;font-size:14px!important;min-height:42px!important}
  .btn-wood{padding:8px 12px;font-size:12px;min-height:38px}
  .btn-gold{padding:8px 12px;font-size:12px;min-height:38px}
  .sing-team-box{padding:6px}
  .gold-line{margin:3px auto}
  /* Score bar compact in landscape */
  .ls-score-bar{width:100%}
  .panel{border-radius:4px}
  /* Home screen in landscape */
  .ls-home-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;width:100%}
}
.game-card{border-radius:8px;position:relative;overflow:hidden;box-shadow:0 4px 12px rgba(0,0,0,.35);contain:content}
.card-border{position:absolute;inset:4px;border:1px solid rgba(200,150,62,.3);border-radius:4px;pointer-events:none;z-index:1}
.btn-wood{padding:14px 20px;border-radius:6px;font-family:'Cinzel',serif;font-weight:700;font-size:14px;background:linear-gradient(180deg,var(--wood-light),var(--wood));color:var(--parchment);letter-spacing:1px;box-shadow:0 3px 8px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.15),inset 0 -2px 0 rgba(0,0,0,.2);text-shadow:0 1px 2px rgba(0,0,0,.4);transition:all .12s;border:1px solid var(--wood-dark);min-height:48px}
.btn-wood:active{transform:translateY(2px);box-shadow:0 1px 3px rgba(0,0,0,.3)}
.btn-gold{padding:14px 20px;border-radius:6px;font-family:'Cinzel',serif;font-weight:700;font-size:14px;background:linear-gradient(180deg,var(--gold-light),var(--gold),var(--gold-dark));color:var(--wood-dark);letter-spacing:1px;box-shadow:0 3px 8px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.3);text-shadow:0 1px 0 rgba(255,255,255,.2);transition:all .12s;border:1px solid var(--gold-dark);min-height:48px}
.btn-gold:active{transform:translateY(2px)}
.btn-correct{width:100%;padding:18px;font-size:18px;background:linear-gradient(180deg,#2D7B2D,#1B5D1B);border-color:#0F3E0F;text-align:center;letter-spacing:2px;min-height:60px}
.modal-overlay{position:fixed;inset:0;background:rgba(15,10,5,.88);z-index:100;display:flex;align-items:center;justify-content:center;padding:14px;animation:fadeIn .3s}
.modal{border-radius:8px;max-width:400px;width:100%;max-height:85vh;overflow-y:auto}
.confetti-piece{position:fixed;z-index:2;will-change:transform;animation:confetti var(--dur) linear var(--delay) both}
.sing-team-box{padding:12px;border-radius:6px;text-align:center;transition:all .3s;flex:1}
.sing-team-box.active{animation:singPulse 1.5s ease-in-out infinite}
.sing-word{font-family:'Almendra',serif;font-weight:700;padding:8px 0}
.countdown-overlay{position:fixed;inset:0;z-index:90;display:flex;align-items:center;justify-content:center;background:rgba(15,10,5,.75)}
.summary-stat{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--parchment-deep)}.summary-stat:last-child{border:none}
.pause-overlay{position:fixed;inset:0;z-index:80;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(15,10,5,.92);gap:16px;animation:fadeIn .2s}
.top-bar{display:flex;justify-content:space-between;width:100%;align-items:center;min-height:44px}
.top-bar-btns{display:flex;gap:4px;align-items:center}
.top-bar-btn{min-width:44px;min-height:44px;display:flex;align-items:center;justify-content:center;border:1px solid var(--gold);border-radius:6px;color:var(--gold-light);font-size:16px}
.correct-stamp{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:10;pointer-events:none}
.correct-stamp svg{animation:correctStamp .4s ease-out both}
.install-banner{position:fixed;bottom:0;left:0;right:0;z-index:50;padding:14px;background:linear-gradient(180deg,transparent,rgba(15,10,5,.95) 20%);animation:slideUp .5s}
.install-inner{background:linear-gradient(135deg,var(--wood),var(--wood-dark));border:1px solid var(--gold);border-radius:8px;padding:12px;display:flex;align-items:center;gap:10px;max-width:400px;margin:0 auto}
.timer-display{text-align:center;padding:4px 0}
.timer-num{font-family:'Cinzel',serif;font-weight:900;line-height:1;transition:color .3s}
.timer-sub{font-family:'Lora',serif;font-size:8px;color:var(--wood-light);letter-spacing:1px;text-transform:uppercase}
.tut-step{text-align:center;padding:20px 16px}
.tut-dots{display:flex;gap:8px;justify-content:center;margin:12px 0}
.tut-dot{width:10px;height:10px;border-radius:50%;border:2px solid var(--gold);transition:all .3s}
.tut-dot.active{background:var(--gold)}

/* Word definition card */
.def-overlay{position:fixed;inset:0;z-index:110;display:flex;align-items:center;justify-content:center;background:rgba(15,10,5,.85);padding:14px;animation:fadeIn .2s}
.def-card{width:100%;max-width:340px;animation:cardFlip .4s ease-out}
.def-close{position:absolute;top:8px;right:8px;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--wood);color:var(--parchment);font-size:16px;font-weight:700;box-shadow:0 2px 6px rgba(0,0,0,.3);z-index:2}

/* Word list for Faith Library */
.word-grid{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;padding:8px 0}
.word-chip{display:inline-flex;align-items:center;gap:4px;padding:6px 10px;border-radius:4px;font-family:'Lora',serif;font-size:12px;border:1px solid var(--parchment-deep);background:var(--parchment);cursor:pointer;transition:all .15s;min-height:36px}
.word-chip:active{transform:scale(.95);background:var(--parchment-dark)}
.word-chip .q{width:18px;height:18px;border-radius:50%;background:var(--gold);color:var(--wood-dark);font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* Summary word list */
.sum-word{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(200,150,62,.15)}
.sum-word:last-child{border:none}
.sum-word-btn{width:28px;height:28px;border-radius:50%;background:var(--gold);color:var(--wood-dark);font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;min-height:28px;flex-shrink:0;cursor:pointer}

/* Scrollable content */
.scroll-content{max-height:60vh;overflow-y:auto;padding:0 4px}
.scroll-content::-webkit-scrollbar{width:4px}
.scroll-content::-webkit-scrollbar-thumb{background:var(--gold);border-radius:2px}
</style>
</head>

function getWeekNumber(){const d=new Date(),j=new Date(d.getFullYear(),0,1);return Math.ceil(((d-j)/86400000+j.getDay()+1)/7)}
function getWeeklyCards(full){
  if(isPro())return full;
  const week=getWeekNumber(),n=full.length,count=Math.min(20,n),idx=[];
  let seed=week*7+13;
  for(let i=0;i<n;i++)idx.push(i);
  for(let i=n-1;i>0;i--){seed=(seed*1103515245+12345)&0x7fffffff;const j=seed%(i+1);[idx[i],idx[j]]=[idx[j],idx[i]]}
  return idx.slice(0,count).sort((a,b)=>a-b).map(i=>full[i]);
}
// Get cards for a mode, including unlocked denomination cards
function gc(m){
  const base=m==='sing'?SING:m==='act'?ACT:EXPLAIN;
  let full=[...base];

  DENOM_PACKS.forEach(p=>{if(p.unlocked){full=full.concat(p.cards)}});
  return getWeeklyCards(full);
}

let _allWordsCache=null;
function getAllWords(){
  if(_allWordsCache)return _allWordsCache;
  const all=[];
  [SING,ACT,EXPLAIN].forEach((deck,di)=>{
    const mode=['sing','act','explain'][di];
    deck.forEach(c=>{
      all.push({word:c[0],def:c[2],mode,diff:'easy'});
      all.push({word:c[1],def:c[3],mode,diff:'challenge'});
    });
  });
  all.sort((a,b)=>a.word.localeCompare(b.word));
  // Remove duplicates by word
  const seen=new Set();
  _allWordsCache=all.filter(w=>{if(seen.has(w.word))return false;seen.add(w.word);return true});
  return _allWordsCache;
}

function ensureAudio(){try{if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();if(actx.state==='suspended')actx.resume()}catch(e){}}
function beep(t){
  if(S.muted)return;
  try{ensureAudio();const c=actx;if(!c)return;
    if(t==='correct'){[660,880].forEach((f,i)=>{const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);g.gain.value=.05;o.frequency.value=f;o.type='sine';o.start(c.currentTime+i*.08);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.3+i*.08);o.stop(c.currentTime+.35+i*.08)});vibrate(50)}
    else if(t==='skip'){const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);g.gain.value=.05;o.frequency.value=350;o.type='triangle';o.start();o.frequency.linearRampToValueAtTime(200,c.currentTime+.2);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.25);o.stop(c.currentTime+.3)}
    else if(t==='timesup'){[200,180,160].forEach((f,i)=>{const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);g.gain.value=.08;o.frequency.value=f;o.type='sawtooth';o.start(c.currentTime+i*.2);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.5+i*.2);o.stop(c.currentTime+.55+i*.2)});vibrate([100,50,100,50,200])}
    else if(t==='penalty'){const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);g.gain.value=.07;o.frequency.value=150;o.type='square';o.start();g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.5);o.stop(c.currentTime+.55);vibrate([200,100,200])}
    else if(t==='countdown'||t==='tick'){const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);g.gain.value=.04;o.frequency.value=550;o.type='sine';o.start();g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.15);o.stop(c.currentTime+.2);vibrate(30)}
    else if(t==='go'){[440,660,880].forEach((f,i)=>{const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);g.gain.value=.05;o.frequency.value=f;o.type='sine';o.start(c.currentTime+i*.06);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.3+i*.06);o.stop(c.currentTime+.35+i*.06)});vibrate(80)}
    else{const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);g.gain.value=.04;o.frequency.value=660;o.type='sine';o.start();g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.2);o.stop(c.currentTime+.25)}
  }catch(e){}
}

function advanceSingCard(){
  nextC();S.cardDiff=S.diff;S.diffLocked=true;
  if(S.singRoundTime>0){S.singTeam=S.ci%2===0?'A':'B';S.singScoreA=0;S.singScoreB=0;startSingCardTimer();S.screen='sing-play'}
  else{S.screen='summary'}render()
}
function singSkipCard(){debounced(()=>{clearInterval(singTid);S.turnSkip++;trackWord('skip');nextC();S.cardDiff=S.diff;
  if(S.singRoundTime>0){S.singTeam=S.ci%2===0?'A':'B';S.singScoreA=0;S.singScoreB=0;startSingCardTimer();S.screen='sing-play'}else{S.screen='summary'}render()})}

function togglePause(){S.paused=!S.paused;render()}

function nextC(){
  const used=getUsed();
  used.add(S.ci);
  let next=S.ci+1;
  const deck=gc(getActiveMode());
  let attempts=0;
  while(used.has(next)&&attempts<deck.length){next=(next+1)%deck.length;attempts++}
  if(attempts>=deck.length){used.clear();next=(S.ci+1)%deck.length}
  S.ci=next;S.cardDiff=S.diff;S.diffLocked=false;
}

function scores(t){
  const tm=t||S.team;
  return `<div class="scores">${[{l:S.nameA,s:S.sA,c:'--team-a',a:tm==='A'},{l:S.nameB,s:S.sB,c:'--team-b',a:tm==='B'}].map(x=>{
    const bg=x.a?`background:${x.c==='--team-a'?'linear-gradient(135deg,#D5E0F5,#C0D0E8)':'linear-gradient(135deg,#F5D5D5,#E8C0C0)'}`:'background:var(--parchment)';
    return `<div class="score-box panel" style="${bg};border:2px solid ${x.a?'var('+x.c+')':'var(--parchment-deep)'};${x.a?'box-shadow:0 3px 10px rgba(0,0,0,.2)':''}">
      <div class="score-label" style="color:var(${x.c})">${x.l}</div>
      <div class="score-val" style="color:${x.a?'var(--ink)':'var(--parchment-deep)'}">${x.s}</div>
    </div>`}).join('')}</div>`;
}

  return `<div style="display:flex;align-items:stretch;gap:3px;width:100%">
    <div class="panel" style="flex:1;display:flex;align-items:center;justify-content:center;gap:4px;padding:4px 6px;background:${aActive||isSing?'linear-gradient(135deg,#D5E0F5,#C0D0E8)':'var(--parchment)'};border:2px solid ${aActive||isSing?'var(--team-a)':'var(--parchment-deep)'}">

    </div>
    <div class="panel" style="flex:1;display:flex;align-items:center;justify-content:center;gap:4px;padding:4px 6px;background:${!aActive||isSing?'linear-gradient(135deg,#F5D5D5,#E8C0C0)':'var(--parchment)'};border:2px solid ${!aActive||isSing?'var(--team-b)':'var(--parchment-deep)'}">

function shareResult(){
  const w=S.sA>S.sB?'A':S.sB>S.sA?'B':'Tie';
  const t=w==='Tie'?`It's a tie! ${S.sA}-${S.sB}`:`Team ${w} won ${Math.max(S.sA,S.sB)}-${Math.min(S.sA,S.sB)}!`;
  const msg=`🏆 Fellowship Face-Off — ${mL(S.mode)}\n${t}\n${S.rounds} rounds\nPlay: ${location.href}`;
  if(navigator.share)navigator.share({title:"Fellowship Face-Off",text:msg}).catch(()=>{});
  else if(navigator.clipboard)navigator.clipboard.writeText(msg).then(()=>alert('Copied!'));
}

function submitFreeRequest(){
  const name=document.getElementById('reqName')?.value?.trim()||'';
  const contact=document.getElementById('reqContact')?.value?.trim()||'';
  const church=document.getElementById('reqChurch')?.value?.trim()||'';
  const pack=document.getElementById('reqPack')?.value||'';
  const reason=document.getElementById('reqReason')?.value?.trim()||'';
  if(!name||!contact){alert('Please enter your name and contact details.');return}
  if(!reason){alert('Please explain why you need free access.');return}
  // Compose message for sharing via native share or clipboard
  const msg=`Fellowship Face-Off — Free Access Request\n\nName: ${name}\nContact: ${contact}\nChurch: ${church}\nPack: ${pack||'Not specified'}\nReason: ${reason}`;
  if(navigator.share){
    navigator.share({title:"Fellowship Face-Off — Free Access Request",text:msg}).then(()=>{
      S.showRequestFree=false;render();
      alert('Request sent! We\'ll review and get back to you with an unlock code.');
    }).catch(()=>{
      copyAndConfirm(msg);
    });
  } else {
    copyAndConfirm(msg);
  }
}
function copyAndConfirm(msg){
  if(navigator.clipboard){
    navigator.clipboard.writeText(msg).then(()=>{
      S.showRequestFree=false;render();
      alert('Request copied to clipboard! Please paste it in an email or message to the developer.');
    }).catch(()=>{alert('Please screenshot this form and send to the developer.')});
  } else {
    alert('Please screenshot this form and send to the developer.');
  }
}

function tryUnlock(){
  const input=document.getElementById('unlockCodeInput');
  const code=input?input.value.trim():'';
  if(!code)return;
  if(unlockPro(code)){

    setTimeout(()=>{alert('🎉 Unlocked successfully! Enjoy your new content.')},100);
  } else {
    const err=document.getElementById('unlockError');

  }
}

  const a=document.getElementById('nameAInput');const b=document.getElementById('nameBInput');
  if(a&&a.value.trim())S.nameA=a.value.trim();
  if(b&&b.value.trim())S.nameB=b.value.trim();
}

function startGame(){
  saveTeamNames();
  if(S.mode==='mix'){
    // Championship: build round sequence
    S.champPhase=0;S.champPhaseRound=0;
    S.champTotalA=0;S.champTotalB=0;S.champScores=[];
    const totalRounds=S.champSing+S.champAct+S.champExplain;
    S.rounds=totalRounds;S.round=1;
    // Build the sequence of modes
    S.mixModes=[];
    for(let i=0;i<S.champSing;i++)S.mixModes.push('sing');
    for(let i=0;i<S.champAct;i++)S.mixModes.push('act');
    for(let i=0;i<S.champExplain;i++)S.mixModes.push('explain');
    S.champPhase=0;
    const am=S.mixModes[0];
    S.cards=shuffle(gc(am));S.ci=0;
  } else {
    const am=S.mode;
    S.cards=shuffle(gc(am));S.ci=0;
  }
  S.sA=0;S.sB=0;S.team='A';S.round=1;
  S.cardDiff=S.diff;S.diffLocked=false;S.paused=false;
  S.gameStartTime=Date.now();usedByMode={sing:new Set(),act:new Set(),explain:new Set()};
  S.role='host';startHosting();goFullscreen();
  resetTurnStats();pushState();S.screen='card-front';render();
}

function revealCard(){
  ensureAudio();beep('reveal');S.cardDiff=S.diff;S.diffLocked=false;
  const am=getActiveMode();
  if(am==='sing'){startCountdown(()=>{startSingRound()})}
  else{startCountdown(()=>{S.diffLocked=true;S.screen='card-reveal';startGameTimer()})}
}

function correctCard(){
  beep('correct');const p=S.cardDiff==='challenge'?2:1;
  if(S.team==='A')S.sA+=p;else S.sB+=p;
  S.turnCorrect++;trackWord('correct');S.showStamp=true;render();
  animScore('+'+p,'var(--felt-green)',S.team==='A'?'25%':'75%');
  setTimeout(()=>{S.showStamp=false;nextC();S.diffLocked=true;render()},350);
}
function skipCard(){if(S.skipsLeft<=0)return;beep('skip');S.skipsLeft--;S.turnSkip++;trackWord('skip');nextC();S.diffLocked=true;render()}
function penaltyCard(){
  beep('penalty');const p=S.cardDiff==='challenge'?2:1;
  const opp=S.team==='A'?'B':'A';
  if(opp==='A')S.sA+=p;else S.sB+=p;
  S.turnPenalty++;trackWord('penalty');nextC();S.diffLocked=true;render();
  animScore('+'+p,opp==='A'?'var(--team-a)':'var(--team-b)',opp==='A'?'25%':'75%');
}

function animScore(txt,color,left){
  setTimeout(()=>{const el=document.getElementById('scoreAnim');if(el){el.style.display='block';el.style.left=left;el.style.transform='translateX(-50%)';el.textContent=txt;el.style.color=color;el.style.animation='none';el.offsetHeight;el.style.animation='scoreFloat .8s ease-out forwards';setTimeout(()=>{if(el)el.style.display='none'},800)}},50);
}

function endTurn(){
  clearAllTimers();releaseWake();
  if(S.team==='A'){S.team='B';resetTurnStats();S.screen='card-front'}
  else{
    if(S.round>=S.rounds){
      // Championship: accumulate scores
      if(S.mode==='mix'){
        S.champTotalA+=S.sA;S.champTotalB+=S.sB;
        S.champScores.push({phase:getActiveMode(),sA:S.sA,sB:S.sB});
      }
      logGame();S.screen='gameover';
    }
    else{
      S.round++;S.team='A';resetTurnStats();
      if(S.mode==='mix'){
        // Championship: save current phase scores and move to next
        const prevMode=getActiveMode();
        S.champTotalA+=S.sA;S.champTotalB+=S.sB;
        S.champScores.push({phase:prevMode,sA:S.sA,sB:S.sB});
        // Check if moving to next mode phase
        const prevPhase=S.champPhase;
        S.champPhase=S.round-1; // 0-indexed position in mixModes
        if(S.mixModes[S.champPhase]!==prevMode){
          // New mode phase — reset round scores, load new cards
          S.sA=0;S.sB=0;
          S.cards=shuffle(gc(getActiveMode()));S.ci=0;
        }
      }
      S.screen='card-front';
    }
  }render();
}
function resetTurnStats(){S.turnCorrect=0;S.turnSkip=0;S.turnPenalty=0;S.turnWon=0;S.skipsLeft=2;S.cardDiff=S.diff;S.diffLocked=false;S.paused=false;S.showStamp=false;S.turnWords=[]}

function playAgain(){S.cardDiff=S.diff;S.diffLocked=false;startGame()}
function confirmExit(){S.showExit=true;render()}
function cancelExit(){S.showExit=false;render()}
function forceExit(){clearAllTimers();releaseWake();disconnectSync();S.showExit=false;S.paused=false;S.screen='home';S.mode=null;render()}
function resetGame(){clearAllTimers();releaseWake();disconnectSync();S.paused=false;S.screen='home';S.mode=null;render()}
async function installApp(){if(deferP){deferP.prompt();await deferP.userChoice;deferP=null;render()}}
function dismissInstall(){deferP=null;render()}

// ─── INIT ───
checkUnlock();
localStorage.setItem('ll_opens',String((parseInt(localStorage.getItem('ll_opens')||'0'))+1));
if(!localStorage.getItem('ll_seen')){localStorage.setItem('ll_seen','1');S.showTutorial=true;S.tutStep=0}

// Orientation detection
let isLandscape=false;
function checkOrientation(){
  const was=isLandscape;
  isLandscape=window.innerWidth>window.innerHeight&&window.innerHeight<500;
  document.body.classList.toggle('landscape',isLandscape);
  if(was!==isLandscape)render();
}
window.addEventListener('resize',checkOrientation);
window.addEventListener('orientationchange',()=>setTimeout(checkOrientation,100));
checkOrientation();

// Fullscreen API — enter fullscreen when game starts for max screen space
function goFullscreen(){
  try{
    const el=document.documentElement;
    if(el.requestFullscreen)el.requestFullscreen();
    else if(el.webkitRequestFullscreen)el.webkitRequestFullscreen();
    // Lock to current orientation if possible
    if(screen.orientation&&screen.orientation.lock){screen.orientation.lock(isLandscape?'landscape':'portrait').catch(()=>{})}
  }catch(e){}
}
function exitFullscreen(){
  try{if(document.fullscreenElement){document.exitFullscreen()}else if(document.webkitFullscreenElement){document.webkitExitFullscreen()}}catch(e){}
}

render();

if('serviceWorker'in navigator){
  navigator.serviceWorker.register('sw.js').then(reg=>{
    reg.addEventListener('updatefound',()=>{
      const nw=reg.installing;
      nw.addEventListener('statechange',()=>{
        if(nw.state==='installed'&&navigator.serviceWorker.controller){
          const b=document.createElement('div');b.className='install-banner';b.onclick=()=>location.reload();
          b.innerHTML='<div class="install-inner"><div style="flex:1;color:var(--parchment);font-family:Cinzel,serif;font-size:13px">🆕 Update available</div><button class="btn-gold" style="padding:8px 14px;font-size:12px">Refresh</button></div>';
          document.body.appendChild(b);
        }
      });
    });
  }).catch(()=>{});
}

</script>
