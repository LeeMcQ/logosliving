["Precious","Calvary","Something of extreme value and worth — the blood of Jesus is called precious in 1 Peter 1:19. God considers every human soul precious enough to send His only Son to die for them. Baptist hymns like 'Precious Lord Take My Hand' use this word to describe Christ's tender love.","The hill outside Jerusalem where Jesus was crucified, also called Golgotha meaning Place of the Skull. Luke 23:33 says when they came to the place called Calvary they crucified Him there. Baptist preaching and singing centres on what happened at Calvary — the cross is everything."],
["Surrender","Revival","Giving up control of your life completely to God, holding nothing back from His lordship. Romans 12:1 calls believers to present their bodies as living sacrifices holy and acceptable to God. The word surrender appears in many Baptist invitation hymns sung during altar calls.","A fresh outpouring of God's Spirit bringing spiritual awakening, conviction of sin and renewed commitment. Psalm 85:6 asks 'Will you not revive us again that your people may rejoice in you?' Baptist churches hold annual revival meetings praying for God to move powerfully among His people."],
["Cleansing","Reigning","Being purified from sin and made spiritually clean through the blood of Christ shed on the cross. 1 John 1:7 says the blood of Jesus His Son cleanses us from all sin completely. Baptist hymns about cleansing connect to the experience of believers being washed in the blood of the Lamb.","Ruling and exercising authority — believers will reign with Christ for eternity in His coming kingdom. Revelation 5:10 says Christ made us kings and priests and we shall reign on the earth. Baptist worship songs celebrate the truth that Jesus reigns now and His people will reign with Him forever."],
["Standing","Dwelling","Remaining firm and unmoved in your faith despite opposition, trials and spiritual attacks. Ephesians 6:13 says put on the full armour of God so that you may stand your ground. Baptist hymns about standing firm reflect the denomination's emphasis on perseverance and unshakeable faith.","Living and remaining continuously in God's presence, making your home in His love and protection. Psalm 91:1 says whoever dwells in the shelter of the Most High will rest in the shadow of the Almighty. Baptist worship songs about dwelling with God express the desire for intimate, ongoing relationship with Christ."]
];
const DENOM_BAPTIST_ACT=[
["Altar Call","Baptism Pool","The pastor inviting people to walk forward to the front of the church to make a decision for Christ publicly. This practice became widespread through the ministry of evangelist Charles Finney in the 1800s and Billy Graham in the 1900s. The altar call is one of the most distinctive features of Baptist worship services and evangelistic meetings.","A built-in pool of water behind or beneath the pulpit used for baptising new believers by full immersion underwater. Baptists insist on immersion because the Greek word 'baptizo' literally means to dip, plunge or submerge completely. Many Baptist churches have a large visible baptistry with steps leading down into the water."],
["Bible Raising","Handshake Line","The entire congregation holding their Bibles up high while the pastor reads or recites the Scripture passage for the sermon. This dramatic gesture symbolises the Baptist commitment to the Bible as the supreme authority for faith and practice. Some churches also have everyone stand and read the passage aloud together in unison.","The congregation lining up after the service to shake the pastor's hand and greet one another at the church door. This tradition of personal connection reflects the Baptist value of fellowship and community warmth. Many Baptist churches also pass a 'right hand of fellowship' to welcome new members into the congregation."],
["Testimony Sharing","Revival Preaching","A person standing before the congregation to tell their personal story of how they came to faith in Jesus Christ. Romans 10:9 says if you confess with your mouth that Jesus is Lord and believe in your heart you will be saved. Baptists greatly value personal testimony as evidence of genuine conversion and the power of God's grace.","A visiting evangelist preaching with passion and urgency during a week-long series of special nightly meetings. Baptist revivals aim to bring the lost to salvation and reignite the spiritual passion of existing church members. The tradition of protracted meetings and tent revivals has shaped Baptist culture for over two centuries."],
["Choir Robe","Sunday School Class","Choir members wearing matching coloured robes while singing special music during the worship service. Baptist church choirs are a major part of worship, often singing anthems, gospel songs and classic hymns. The robe symbolises unity and equality — everyone in the choir is equal before God regardless of social status.","A group divided by age sitting in a classroom studying a Bible lesson together before the main worship service begins. The modern Sunday School movement began in England in 1780 and Baptists adopted it enthusiastically. Baptist churches typically have classes for every age group from nursery through senior adults every Sunday morning."],
["Deacon Ordination","Mission Trip","Elders laying hands on a man's head and praying over him to set him apart as an ordained deacon of the church. Acts 6:1-6 describes the first deacons chosen to serve tables so the apostles could focus on prayer and the Word. Baptist deacons serve the practical needs of the church and assist the pastor in ministry and visitation.","A group travelling to another city, state or country to share the gospel, build churches or serve communities in need. Jesus commanded His followers to go into all the world and make disciples of every nation (Matthew 28:19-20). Baptist mission trips are a major part of church life, with thousands of members serving annually."],
["Prayer Meeting","Potluck Dinner","A midweek gathering, usually on Wednesday evening, where church members pray together for various needs and concerns. Acts 4:31 says after the early church prayed together the place was shaken and they were filled with the Holy Spirit. Wednesday night prayer meeting is one of the oldest and most cherished traditions in Baptist church life.","A communal meal where every family brings a dish to share after the Sunday worship service or at a church fellowship event. The early church in Acts 2:46 broke bread together with glad and generous hearts in their homes. Baptist potlucks (often called 'dinner on the grounds') are legendary for fried chicken and abundant homemade food."],
["Vacation Bible School","Church Van Pickup","A week-long summer programme for children with Bible stories, crafts, songs, games and snacks at the church building. VBS is one of the largest outreach events for Baptist churches, reaching thousands of unchurched children each summer. Many adults trace their first encounter with the gospel to attending Vacation Bible School as a child.","A church bus or van driving through neighbourhoods picking up children and families for Sunday services and programmes. Baptist churches pioneered the bus ministry in the 1960s and 1970s to bring people who had no transportation to church. Some large Baptist churches ran fleets of dozens of buses bringing hundreds of people to services each week."],
["Gospel Tract","Invitation Hymn","Handing a small printed pamphlet with a gospel message and prayer of salvation to a stranger in a public place. Romans 10:14 asks how can they hear without someone preaching, and gospel tracts extend that reach to the printed page. Baptists have been prolific producers and distributors of evangelistic literature for centuries.","The final hymn sung at the end of a Baptist worship service while the pastor extends an invitation for people to respond. The congregation sings softly while anyone feeling convicted can walk forward to accept Christ, join the church or rededicate their life. This moment is considered sacred in Baptist tradition — the climax of every worship service."],
["Covered Dish","Senior Banquet","Carrying a large covered casserole dish or pot of food into the church fellowship hall for a communal gathering. Baptist churches are famous for their fellowship meals where the long tables groan under the weight of home-cooked food. The covered dish supper builds community bonds and reflects the biblical value of sharing meals together.","A special formal dinner honouring the elderly members of the congregation for their years of faithful service to the church. Leviticus 19:32 says rise in the presence of the aged and show respect for the elderly. Baptist churches value their senior members and often host appreciation banquets with special music and tributes."],
["Sword Drill","Awana Club","A competition where children race to find a Bible verse as fast as possible when the reference is called out. Ephesians 6:17 calls the Word of God the sword of the Spirit, and children learn to 'draw their sword' quickly. Baptist sword drills teach children to navigate the Bible confidently and hide God's Word in their hearts.","A children's programme where kids earn awards by memorising Bible verses, completing handbook activities and wearing club uniforms. The name AWANA stands for 'Approved Workmen Are Not Ashamed' from 2 Timothy 2:15. Many Baptist churches use AWANA or similar programmes as their primary children's discipleship ministry."]
];
const DENOM_BAPTIST_EXPLAIN=[
["Believer's Baptism","Soul Competency","The conviction that only people who have personally professed faith in Christ should be baptized, never infants. Acts 2:41 says those who received Peter's message were baptized — belief came first, then baptism. This is the defining distinctive that gives Baptists their name and separates them from most other Christian traditions.","The belief that every individual person is competent and responsible before God alone for their own spiritual decisions. No priest, church, government or family member can make spiritual choices or stand in judgment for another person's soul. This Baptist distinctive is the theological foundation for religious liberty and separation of church and state."],
["Autonomy","Inerrancy","The principle that each local Baptist church is self-governing under Christ's lordship with no hierarchy above it. No bishop, convention, or denominational board can dictate what a local Baptist church believes, practices or decides. This means every Baptist church calls its own pastor, sets its own budget and determines its own direction.","The belief that the Bible is completely truthful and without error in everything it teaches and affirms as God's Word. 2 Timothy 3:16 says all Scripture is God-breathed and useful for teaching, rebuking, correcting and training. For Baptists, inerrancy means the Bible is the final authority that settles every question of faith and practice."],
["Eternal Security","Total Depravity","The teaching that once a person is truly saved by God's grace they can never lose their salvation or be unsaved. John 10:28-29 says Jesus gives eternal life and no one can snatch believers out of His hand. This is popularly expressed as 'once saved, always saved' and gives Baptists great assurance and confidence in their faith.","The doctrine that every part of human nature is corrupted by sin, making people totally unable to save themselves without God's help. This does not mean people are as evil as possible but that sin affects every area — mind, will, emotions and body. Romans 3:23 confirms that all have sinned and fall short of the glory of God."],
["Closed Communion","Congregational Polity","The practice of restricting the Lord's Supper to baptised members of that specific local church only. Some Baptist churches practice 'close' communion (open to any baptised believer) while others restrict it to members only. This reflects the Baptist conviction that the ordinances belong to the local church, not to individual Christians.","The system of church government where every member has an equal voice and vote in the decisions of the congregation. Major decisions like calling a pastor, approving a budget or purchasing property require a church-wide vote. This democratic approach reflects the Baptist belief that Christ alone is the head of the church, not any human leader."],
["Ordinance","Great Commission","A symbolic act commanded by Christ — Baptists recognise only two: baptism and the Lord's Supper. Unlike Catholics who call these sacraments (channels of grace), Baptists call them ordinances (acts of obedience). The Lord's Supper uses unleavened bread and grape juice (never wine) as memorials of Christ's broken body and shed blood.","Jesus' final command to His disciples to go and make disciples of all nations, baptising and teaching them (Matthew 28:19-20). This mandate is the driving mission of virtually every Baptist church, association and convention worldwide. Southern Baptists alone support over 3,500 missionaries in more than 100 countries around the globe."],
["Perseverance","Biblical Authority","The doctrine that all who are truly born again will persevere in faith to the end and not permanently fall away. Philippians 1:6 says God who began a good work in you will carry it on to completion. Baptists debate whether believers can temporarily backslide but agree that true saving faith will ultimately endure.","The conviction that the Bible alone is the supreme and final rule for everything a Baptist believes and practices. No creed, confession, tradition or human authority can override or stand equal to the clear teaching of Scripture. The Baptist rallying cry has always been 'No creed but the Bible, no authority but Christ.'"],
["Priesthood of Believers","Two Offices","The teaching that every born-again Christian has direct personal access to God without needing any human priest or mediator. 1 Peter 2:9 calls all believers a royal priesthood, a holy nation, God's own special people. This means every Baptist can pray directly to God, read and interpret Scripture, and minister to others.","The Baptist conviction that the New Testament establishes only two offices in the local church: pastor (also called elder or bishop) and deacon. Pastors are responsible for preaching, teaching, leading and shepherding the congregation. Deacons serve the practical needs of the church, following the pattern established in Acts chapter 6."],
["Separation","Landmarkism","The Baptist commitment to maintaining clear boundaries between the church and the state, and between believers and the world. Roger Williams founded the first Baptist church in America in 1638 largely over this issue of religious freedom. Baptists have historically been the strongest advocates for separation of church and state in American history.","A movement within Baptist life that teaches only Baptist churches constitute the true New Testament church with an unbroken lineage. Landmarkists traced Baptist origins not to the Reformation but all the way back to John the Baptist himself. While most modern Baptists reject this extreme view, it influenced Baptist identity and practice for over a century."],
["Revival","Convention","A sovereign work of God's Holy Spirit bringing spiritual awakening, conviction of sin and fresh commitment to Christ. Baptist history is marked by great revivals — the First and Second Great Awakenings transformed American religious life. The prayer for revival remains central to Baptist worship, with churches holding special revival meetings annually.","A cooperative organisation of autonomous Baptist churches working together voluntarily for missions, education and ministry. The Southern Baptist Convention (founded 1845) is the largest Protestant denomination in the United States. Conventions have no authority over local churches — they exist solely for cooperative mission work and fellowship."],
["Immersion","Regeneration","The only mode of baptism Baptists accept — complete submersion of the entire body under water and back up again. The English word 'baptize' comes from the Greek 'baptizo' which literally means to dip, plunge or immerse. When Jesus was baptized by John, Matthew 3:16 says He went up out of the water, implying He went fully under.","The supernatural act of God giving new spiritual life to a person who was dead in sin through the work of the Holy Spirit. Jesus told Nicodemus in John 3:3 that no one can see the kingdom of God unless they are born again. Baptists emphasise that regeneration is entirely God's work — humans cannot regenerate themselves by any effort or ritual."]
];
const DENOM_METHODIST_SING=[
["Thousand","Charge","A number representing vastness and abundance — if we had a thousand tongues we still could not praise God enough. Charles Wesley's greatest hymn begins 'O for a thousand tongues to sing my great Redeemer's praise.' The word captures the Methodist conviction that our praise can never match the greatness of God's love.","A solemn responsibility or duty given by God to His servants to fulfil faithfully until Christ returns. Leviticus 8:35 instructs the priests to keep the Lord's charge so that they would not die. Wesley's hymn 'A Charge to Keep I Have' reminds every Methodist that God has given them a mission to complete."],
["Divine","Pilgrim","Of or relating to God — heavenly, sacred, supremely excellent and beyond human comprehension. Charles Wesley wrote 'Love divine, all loves excelling, joy of heaven to earth come down' in praise of God's love. Methodist hymns use this word to describe God's love, grace, power and the mystery of Christ's incarnation.","A traveller on a spiritual journey through this temporary world toward an eternal heavenly home with God. Hebrews 11:13-16 says the heroes of faith were strangers and pilgrims seeking a better heavenly country. Methodist hymns about pilgrimage reflect Wesley's teaching that the Christian life is a journey of growing in holiness."],
["Assurance","Wellspring","The confident certainty that you are truly saved and that your salvation is secure in God's faithful hands. John Wesley's heart was strangely warmed at Aldersgate when he received assurance of his own salvation. Methodist hymns celebrating assurance include Fanny Crosby's beloved 'Blessed Assurance, Jesus Is Mine.'","A source that flows continuously and never runs dry — God's love and grace are an eternal wellspring of life. Proverbs 4:23 says guard your heart for everything you do flows from it like water from a spring. Methodist hymns describe God's grace as a wellspring that refreshes, renews and sustains believers through every season."],
["Herald","Steadfast","A messenger who announces important news — the angels were heralds proclaiming Christ's birth to the world. Luke 2:10 records the angel saying 'I bring you good news of great joy that will be for all people.' Charles Wesley's 'Hark the Herald Angels Sing' is one of the most beloved Christmas hymns ever written.","Firm, unwavering and immovable in faith, purpose and commitment to God no matter what circumstances arise. 1 Corinthians 15:58 says be steadfast, immovable, always abounding in the work of the Lord. Methodist hymns about steadfastness reflect Wesley's call to persevere in faith and holiness until the very end."],
["Ransomed","Boundless","Freed from captivity by the payment of a price — Jesus paid the ransom for our souls with His own blood. Mark 10:45 says the Son of Man came to give His life as a ransom for many who were enslaved to sin. Methodist hymns celebrate being ransomed from sin's slavery and set free to live for God's glory.","Without any limits or boundaries — God's love, grace, mercy and power extend infinitely in every direction forever. Ephesians 3:18-19 speaks of the width, length, height and depth of Christ's love that surpasses knowledge. Methodist hymns about God's boundless love reflect Wesley's conviction that God's grace is available to every single person."]
];
const DENOM_METHODIST_ACT=[
["Circuit Riding","Class Meeting","A pastor travelling on horseback from town to town preaching and visiting multiple small congregations spread across a region. John Wesley and his early preachers covered thousands of miles on horseback bringing the gospel to remote communities. This itinerant system became the backbone of early Methodism and is why Methodist pastors are still appointed, not called.","A small group of 6-12 people meeting weekly to give account of their spiritual lives and encourage one another in holiness. John Wesley required every Methodist to belong to a class meeting as the basic unit of discipleship and accountability. Members answered the question 'How is it with your soul?' honestly before the group each week."],
["Open Communion","Love Feast","Welcoming all baptised Christians to receive communion regardless of their denomination or church membership. This open table policy reflects the Methodist belief that communion is God's gift, not the church's to restrict. John Wesley practiced and promoted open communion as an expression of Christian unity and God's generous grace.","A fellowship gathering with simple food, water, singing and personal testimonies of God's work in people's lives. This practice comes from the early church's agape meals described in Jude 12 and 1 Corinthians 11. Wesley adopted it from the Moravians and love feasts remain a distinctive Methodist tradition especially during special seasons."],
["Covenant Renewal","Laying on of Hands","A congregation standing together on New Year's Eve or the first Sunday of the year to rededicate their lives to God's service. The Wesley Covenant Prayer includes the powerful words, 'I am no longer my own but yours — put me to what you will.' Watch Night services on New Year's Eve originated with the Moravians and were adopted by Wesley for Methodists.","A bishop or elder placing hands on a person's head during ordination, confirmation or prayer for healing. This ancient practice symbolises the passing of spiritual authority and the calling down of the Holy Spirit. In Methodist ordination, the bishop lays hands on the candidate while saying, 'Take authority to preach the Word of God.'"],
["Hymn Singing","Mission Collection","The entire congregation standing to sing multiple verses of a hymn with strong voices and sometimes harmony parts. Methodism was born in song — Charles Wesley's hymns taught theology, inspired faith and created identity for the movement. John Wesley published the first Methodist hymnal in 1737 and singing remains central to Methodist worship today.","Passing a special offering plate or container to collect money specifically designated for mission projects at home and abroad. Methodists have always been generous givers to missions, following Wesley's rule: 'Earn all you can, save all you can, give all you can.' United Methodist mission giving supports hospitals, schools and churches in over 130 countries."],
["Confirmation Class","Parsonage Visit","Young people meeting regularly with the pastor to study Methodist beliefs and prepare to publicly profess their faith. Confirmation follows infant baptism, fulfilling the promises made by parents and godparents at the child's baptism. The service includes the bishop or elder laying hands on each confirmand while the congregation prays for them.","Visiting the pastor and their family at the church-provided home (parsonage) for fellowship and pastoral care conversations. The parsonage system means Methodist pastors live in a home owned by the church, close to the congregation. This tradition of visiting the parsonage builds the relational bond between pastor and people that Wesley valued deeply."],
["Communion Rail","Bible Reading","Kneeling at a rail across the front of the church to receive communion bread and cup from the pastor and servers. The communion rail is a distinctive feature of Methodist church architecture, inviting people to come forward and kneel. It also serves as a place of prayer, where people can kneel during altar calls or times of personal commitment.","The pastor or lay reader standing at the lectern to read aloud from the Old Testament, Epistles or Gospels during worship. The Revised Common Lectionary provides a three-year cycle of readings used in most Methodist churches worldwide. Wesley believed Christians should read Scripture daily and systematically, not just randomly opening the Bible."],
["Wesley Prayer","Stewardship Pledge","Reciting a specific prayer written by John Wesley, especially the Covenant Prayer used in annual renewal services. Wesley's prayers reflect his deep spirituality and practical approach to the Christian life of devotion. 'I am no longer my own but yours' expresses the total surrender to God that Wesley considered essential.","Filling out a card committing to give a specific amount of money, time and talent to the church in the coming year. Methodist stewardship campaigns emphasise that everything belongs to God and we are managers, not owners. Wesley himself was remarkably generous — when his income increased, he kept his expenses the same and gave away the rest."],
["District Meeting","Choir Anthem","Representatives from multiple Methodist churches in a geographic area gathering for business, worship and fellowship together. The district is led by a District Superintendent appointed by the bishop to oversee the churches and pastors. These meetings embody the connectional principle — Methodists are never alone but always linked to the wider body of Christ.","The choir performing a special prepared piece of music during the worship service, often at the offertory or before the sermon. Methodist choral tradition is rich and varied, from classical anthems to gospel arrangements to contemporary praise. The choir serves as musical leaders who lift the congregation's worship through well-prepared, Spirit-filled singing."],
["Advent Wreath","Healing Prayer","Lighting candles on a circular wreath with four candles (three purple, one pink) plus a white Christ candle in the centre. Each candle represents a theme of Advent: hope, peace, joy, and love, lit on successive Sundays leading to Christmas. Methodist churches use the Advent wreath as a focal point for worship during the four weeks before Christmas.","A pastor or elder anointing a sick person with oil and laying hands on them while the congregation prays for healing. James 5:14-15 instructs the sick to call the elders for prayer and anointing, promising that the prayer of faith will save the sick. Methodist healing services combine faith, medical care and the understanding that God works in mysterious ways."],
["Camp Meeting","Social Action","An outdoor multi-day gathering of multiple Methodist congregations for preaching, singing, prayer and spiritual renewal. Camp meetings began in the early 1800s on the American frontier and became a defining feature of Methodist evangelism. Thousands would gather in tent cities for days of powerful preaching and dramatic conversions under the open sky.","Methodists working together on community projects like food banks, homeless shelters, tutoring programmes or advocacy for justice. Wesley himself opened medical clinics, schools for the poor, and lending programmes for struggling workers. The Methodist Social Principles state that the church must engage actively with the injustices and needs of the world."]
];
const DENOM_METHODIST_EXPLAIN=[
["Prevenient Grace","Quadrilateral","God's grace that goes before us and works in our lives even before we are aware of God or respond to Him. It is the grace that draws, convicts and enables every person to respond to God's invitation of salvation. Wesley taught that without prevenient grace, humans in their fallen state could not even begin to turn toward God.","Wesley's four sources of theological authority: Scripture (primary), tradition, reason and experience working together. Scripture always has the highest authority, but tradition shows how Christians have understood it across the centuries. Reason helps us think clearly about faith, and experience confirms God's truth in our personal walk with Him."],
["Christian Perfection","Connectionalism","Wesley's teaching that believers can experience a second work of grace where God's love fills the heart completely. This does not mean sinless perfection but rather a heart entirely devoted to loving God and loving others. Wesley considered this the goal of the Christian life and the distinctive teaching of Methodism above all else.","The foundational Methodist principle that all churches and leaders are interconnected in a web of mutual support and accountability. No Methodist church stands alone — each is connected through districts, conferences and the worldwide denomination. This system allows resources to flow from stronger churches to weaker ones and ensures accountability for all leaders."],
["Itinerancy","Sanctification","The system by which Methodist bishops appoint pastors to their churches rather than churches choosing their own pastors. Pastors agree to go wherever the bishop sends them, whether to a large city church or a small rural congregation. This system ensures that every church receives a pastor and prevents the strongest preachers from clustering in wealthy churches.","God's ongoing work of making believers more holy and more like Christ through the power of the Holy Spirit day by day. Wesley distinguished between initial sanctification (at conversion) and entire sanctification (a deeper work of grace). Methodists pursue holiness not through rigid rules but through the means of grace — prayer, Scripture, fasting and sacraments."],
["Book of Discipline","Social Principles","The official book containing all the laws, doctrine, history and organisational procedures of the United Methodist Church. It is revised every four years at General Conference and governs everything from local church structure to clergy ethics. The Discipline reflects Wesley's methodical approach to church organisation — the very thing that gave Methodism its name.","The UMC's official statements on pressing social issues including poverty, racism, war, environment, human rights and healthcare. These principles guide faithful Christian action on complex issues where the Bible may not give specific modern instructions. Wesley himself was passionate about social justice — he opposed slavery, championed education for the poor and visited prisoners."],
["Means of Grace","Works of Mercy","The practices through which God's grace flows into the believer's life: prayer, Scripture, fasting, communion and Christian fellowship. Wesley divided these into works of piety (prayer, Bible study, communion) and works of mercy (serving others). He insisted that using the means of grace regularly was essential for spiritual growth, not optional.","Acts of compassion and justice that flow from genuine faith — feeding the hungry, clothing the naked, visiting the sick and imprisoned. Wesley famously said, 'Do all the good you can, by all the means you can, in all the ways you can.' He lived this out by spending most of his considerable income on helping the poor rather than on personal comfort."],
["General Conference","Bishop","The highest legislative body of the United Methodist Church, meeting every four years with elected delegates worldwide. Only General Conference can officially speak for the denomination on matters of doctrine, organisation and social policy. It has approximately 860 delegates — half clergy, half laity — representing annual conferences from around the globe.","An ordained elder elected by a jurisdictional or central conference to lead, ordain clergy and appoint pastors across a defined area. Methodist bishops serve for life (or until retirement) and have authority to set pastoral appointments each year. Wesley himself was never a bishop, but the office developed as Methodism spread beyond England to America and the world."],
["Elder","Deacon","An ordained minister authorised to preach the Word, administer sacraments and provide spiritual leadership for the congregation. Elders are 'in full connection' with their annual conference and are guaranteed an appointment to serve a church. The ordination of elders involves the laying on of hands by the bishop and a lifetime commitment to itinerant ministry.","An ordained minister focused specifically on Word, Service and bridging the church and the world in acts of compassion. Unlike elders, deacons do not administer sacraments or have guaranteed appointments to local churches. The renewed order of deacons since 1996 reflects Methodism's deep commitment to serving the needs of the community beyond the church walls."],
["Watch Night","Love Feast","A special worship service held on New Year's Eve where Methodists gather to reflect on the year and renew their covenant with God. Wesley adapted this practice from the Moravians and it became one of early Methodism's most distinctive traditions. The service often includes communion, testimonies, hymn singing and the Wesley Covenant Prayer at midnight.","A fellowship meal featuring simple food (often bread and water), testimony sharing, singing and corporate prayer in a warm atmosphere. Wesley borrowed this from the Moravian Brethren and it became a regular Methodist practice for building community. The love feast is not communion but a celebration of Christian fellowship and shared experience of God's grace."],
["Class Leader","Local Pastor","A lay person appointed to lead a small group (class meeting) responsible for the spiritual care of its members. The class leader asked each member weekly, 'How is it with your soul?' and provided guidance and accountability. This role was essential to early Methodism's explosive growth — Wesley said the class meeting was the sinew of Methodism.","A licensed minister appointed to serve a congregation while continuing theological education but not yet fully ordained. Local pastors can baptize, marry, conduct funerals and lead communion under the supervision of a district superintendent. They serve an essential role in Methodism, particularly in smaller congregations that cannot support a full-time ordained elder."],
["Aldersgate","Circuit","The location in London where John Wesley felt his heart 'strangely warmed' on May 24, 1738, the pivotal moment of his spiritual awakening. Wesley wrote that he felt he did trust in Christ, Christ alone, for salvation and an assurance was given that Christ had taken away his sins. This experience became the model for Methodist conversion — a personal, heartfelt encounter with God's saving grace.","A group of churches served by one or more pastors who travel between them, preaching and providing pastoral care. Wesley organised his growing movement into circuits that itinerant preachers would ride on horseback, visiting each church in rotation. The circuit system allowed Methodism to spread rapidly across England and then America with remarkable efficiency."]
];
const DENOM_PENTECOSTAL_SING=[
["Spirit Move","Fire Fall","A cry of worship asking the Holy Spirit to move powerfully in the service with signs, wonders and transformation. Acts 2:2 says suddenly a sound like a violent rushing wind came from heaven and filled the entire house. Pentecostal worship songs frequently invite the Spirit's manifest presence with expectant, passionate faith.","A prayer calling for the Holy Spirit to descend like fire as He did on the Day of Pentecost upon the 120 believers. Acts 2:3 says tongues of fire appeared and rested on each person in the upper room. Pentecostal services often feature intense prayer for God's fire to fall with power, healing and spiritual gifts."],
["Hallelujah Praise","Mighty Warrior","An explosive shout of praise declaring 'Praise the Lord' with voices, clapping, dancing and sometimes instruments. The word comes directly from Hebrew — hallelu (praise) and Yah (God) — and appears frequently throughout the Psalms. Pentecostal worship is known for its exuberant, loud, passionate expressions of praise to God.","A worship declaration that God is a powerful fighter who goes to battle on behalf of His people against all spiritual enemies. Exodus 15:3 says the Lord is a warrior — the Lord is His name, after He destroyed Pharaoh's army at the Red Sea. Pentecostal songs about God as warrior reflect the movement's emphasis on spiritual warfare and divine victory."],
["Break Every Chain","Pour It Out","A powerful worship declaration that the name and blood of Jesus have the authority to destroy every bondage and oppression. Isaiah 58:6 says God's chosen fast is to loose the chains of injustice and set the oppressed free. This song captures the Pentecostal emphasis on deliverance ministry and freedom through the power of the Holy Spirit.","A plea for God to pour out His Spirit abundantly on His people as Joel 2:28 promised for the last days. The prophet Joel said God would pour out His Spirit on all flesh — sons, daughters, old and young would prophesy. Pentecostals believe this promise was partially fulfilled at Pentecost and will reach its fullness before Christ returns."],
["Victory Shout","In The Spirit","A loud corporate cry of triumph declaring that Jesus has already won the battle over sin, death and every enemy. 1 Corinthians 15:57 says thanks be to God who gives us the victory through our Lord Jesus Christ. Pentecostal services sometimes erupt in spontaneous shouting when the congregation senses a breakthrough in the spiritual atmosphere.","A worship experience where believers sing or pray under the direct influence and empowerment of the Holy Spirit. Ephesians 5:18-19 says be filled with the Spirit, speaking to one another with psalms, hymns and spiritual songs. Pentecostals value Spirit-led worship that goes beyond rehearsed programmes into spontaneous, divinely directed encounters."],
["Holy Ground","Anointing Song","A reverent worship song declaring that the place of worship has become sacred because God's presence is tangibly here. Exodus 3:5 records God telling Moses to remove his sandals because the ground where he stood was holy. Pentecostal worship aims to create an atmosphere where God's presence is so real that people are transformed.","A song specifically sung while praying for the Holy Spirit's anointing to empower someone for ministry, healing or service. 1 John 2:20 says believers have an anointing from the Holy One that teaches them about all things. Pentecostal churches often sing anointing songs during altar ministry when leaders lay hands on people for prayer."]
];
const DENOM_PENTECOSTAL_ACT=[
["Speaking in Tongues","Laying on of Hands","Believers uttering words in an unknown heavenly language as the Holy Spirit gives them the ability to speak. Acts 2:4 says they were all filled with the Holy Spirit and began to speak in other tongues. Pentecostals consider speaking in tongues the initial physical evidence that a person has been baptized in the Holy Spirit.","Church leaders placing their hands on a person's head or shoulders while praying for healing, empowerment or blessing. Acts 8:17 says the apostles laid hands on the Samaritan believers and they received the Holy Spirit. This practice is central to Pentecostal ministry — pastors lay hands on people during every altar call and prayer service."],
["Falling Under Power","Anointing Oil","A person overcome by God's presence falling backward (often caught by catchers) as a physical response to the Spirit. Critics call this 'slain in the Spirit' but Pentecostals point to biblical examples like the priests who could not stand in the temple (2 Chronicles 5:14). Designated catchers often stand behind people during prayer lines to safely lower anyone who falls.","A pastor dabbing olive oil on a person's forehead while praying for healing, consecration or spiritual empowerment. James 5:14 instructs the sick to call for the church elders who should pray and anoint them with oil. Pentecostal churches use anointing oil regularly, believing it symbolises the Holy Spirit's healing and empowering presence."],
["Dancing in Worship","Prophetic Word","Believers spontaneously dancing during worship as an expression of joy and surrender to the Holy Spirit's leading. 2 Samuel 6:14 says David danced before the Lord with all his might when the Ark was brought to Jerusalem. Pentecostal services often include dancing in the aisles, near the altar, or wherever the Spirit moves.","A person standing to deliver a message they believe God has given them specifically for the congregation at that moment. 1 Corinthians 14:3 says the one who prophesies speaks to people for their strengthening, encouragement and comfort. Prophetic words in Pentecostal churches are tested against Scripture and confirmed by church leadership before being accepted."],
["Tarrying Prayer","Altar Rush","Kneeling or prostrating for extended periods of intense prayer, seeking the infilling of the Holy Spirit with tongues. Acts 1:14 says the disciples were all joined together constantly in prayer before the Spirit fell at Pentecost. The word 'tarrying' means waiting — Pentecostals believe the Holy Spirit fills those who persistently seek Him.","Multiple people rushing forward to the altar area at the front of the church during an impassioned call to prayer. The altar is not a physical altar for sacrifices but the open space at the front where people kneel, weep and pray. Pentecostal altar services can last for hours as people encounter God, receive healing and surrender their lives."],
["Clapping in Praise","Tambourine Playing","The entire congregation clapping their hands rhythmically during worship as an act of praise and celebration before God. Psalm 47:1 commands all peoples to clap their hands and shout to God with cries of joy and triumph. Pentecostal services are marked by exuberant, full-bodied worship that engages the whole person — voice, hands and body.","A woman or man playing a handheld drum (tambourine) during worship songs, adding rhythm and percussive celebration to the music. Psalm 150:4 says praise God with the tambourine and dancing — with strings and flute. The tambourine is one of the most iconic instruments in Pentecostal and Charismatic worship around the world."],
["Prayer Walk","Deliverance Session","A group of believers walking through a neighbourhood or around a building while praying aloud for God's blessing and protection. Joshua marched around Jericho for seven days before God brought the walls down (Joshua 6). Pentecostals practice prayer walks around churches, cities and nations as acts of spiritual warfare and intercession.","A focused prayer ministry session where leaders pray for a person to be set free from demonic oppression or spiritual bondage. Mark 16:17 says in Jesus' name believers will cast out demons — a promise Pentecostals take very seriously. Deliverance sessions typically involve anointing, Scripture reading, authoritative prayer and sometimes manifestations as people are set free."],
["Worship Flag Waving","Prayer Line","Waving colourful silk flags or banners during worship as a visual expression of praise, warfare and celebration before God. Psalm 20:5 says we will shout for joy when you are victorious and lift up our banners in the name of our God. Pentecostal churches often have worship teams with flag wavers who add colour and movement to the service.","People forming a line to walk past the pastor or visiting minister who prays individually for each person with laying on of hands. Mark 16:18 says believers will place their hands on sick people and they will get well. Prayer lines are a signature feature of Pentecostal revival services and conferences around the world."],
["Testimony Time","Fire Tunnel","A person standing before the congregation to share what God has recently done in their life — healing, provision or breakthrough. Revelation 12:11 says believers overcome the enemy by the blood of the Lamb and the word of their testimony. Pentecostal services regularly set aside time for testimonies because they build faith and glorify God.","Two lines of people facing each other with hands raised, creating a corridor that others walk through while being prayed for. This practice became popular in Charismatic renewal movements as a way to minister to many people simultaneously. Those walking through the tunnel often experience the power of the Spirit through prayer, anointing and prophetic words."],
["Praise Break","Holy Ghost Dance","A spontaneous eruption of joyful, free-form celebration during a service when the music and Spirit reach a peak intensity. 2 Chronicles 5:13-14 says when the musicians praised God, the glory of the Lord filled the temple so powerfully the priests could not stand. Praise breaks are common in African-American Pentecostal churches and involve shouting, running and ecstatic worship.","An unplanned, Spirit-led dance that erupts during worship — different from choreographed worship dance or liturgical movement. Like David who danced before the Lord with all his might (2 Samuel 6:14), the dancer is overcome with joy. In Pentecostal tradition, this is considered a genuine manifestation of the Holy Spirit's joy, not mere emotionalism."],
["Running the Aisles","Baptism in Jesus Name","Believers running up and down the church aisles during an especially powerful moment of worship or preaching. Habakkuk 3:19 says the Lord makes my feet like the feet of a deer, enabling me to tread on the heights. Running in the Spirit is seen as a physical expression of spiritual freedom, joy and the power of God.","A Oneness Pentecostal practice of baptizing using only the phrase 'in the name of Jesus' rather than Father, Son and Holy Spirit. They base this on Acts 2:38 where Peter said to be baptized in the name of Jesus Christ for the forgiveness of sins. This practice distinguishes Oneness Pentecostals from Trinitarian Pentecostals and remains a significant theological division."]
];
const DENOM_PENTECOSTAL_EXPLAIN=[
["Baptism in the Spirit","Initial Evidence","A distinct experience after salvation where the Holy Spirit fills and empowers a believer for supernatural ministry and witness. Acts 1:8 says you will receive power when the Holy Spirit comes upon you and you will be my witnesses. Pentecostals distinguish this baptism from salvation — you can be saved but not yet Spirit-baptized.","The Pentecostal doctrine that speaking in tongues is the required physical sign proving a person has received the baptism of the Holy Spirit. Acts 2:4, 10:46 and 19:6 all record tongue-speaking accompanying Spirit baptism in the early church. This teaching is the single most distinctive and debated doctrine in the entire Pentecostal movement worldwide."],
["Gifts of the Spirit","Charismatic Renewal","The nine supernatural abilities listed in 1 Corinthians 12:8-10 that the Holy Spirit distributes to believers for ministry. They include wisdom, knowledge, faith, healing, miracles, prophecy, discernment, tongues and interpretation of tongues. Pentecostals believe all nine gifts are active today and should be eagerly sought and practiced in every church.","A movement beginning in the 1960s where mainline denomination members (Catholic, Anglican, Lutheran) began experiencing Pentecostal gifts. The Holy Spirit's power was not limited to Pentecostal denominations but flowed into historic churches around the world. The Charismatic Renewal brought millions of Christians into the experience of tongues, prophecy and healing."],
["Azusa Street","Prosperity Gospel","The 1906 revival at 312 Azusa Street in Los Angeles that is considered the birthplace of modern Pentecostalism worldwide. Led by African-American pastor William Seymour, the racially integrated services featured tongues, healings and miracles for three years. The revival sent missionaries across the globe and is one of the most significant events in 20th-century Christianity.","The controversial teaching that God rewards faith with financial wealth and physical health as signs of His blessing and approval. Proponents cite 3 John 1:2 — 'I pray that you may prosper and be in good health' — as a divine promise of material success. Critics argue this distorts the gospel and ignores Jesus' teachings about suffering and the blessedness of the poor."],
["Spiritual Warfare","Latter Rain Movement","The belief that Christians are engaged in an active, ongoing battle against demonic forces that requires prayer and spiritual authority. Ephesians 6:12 says our struggle is not against flesh and blood but against spiritual forces of evil in heavenly realms. Pentecostals take this battle seriously, practicing binding and loosing, intercessory prayer and deliverance ministry.","A post-World War II Pentecostal revival movement emphasising the restoration of apostles, prophets and supernatural gifts to the church. The movement drew from Joel 2:23 about the former and latter rain — believing God was pouring out His Spirit freshly. Though controversial, it influenced modern apostolic and prophetic networks that continue shaping Pentecostalism today."],
["Continuationism","Full Gospel","The theological position that all the miraculous gifts of the Holy Spirit described in the New Testament continue operating today. This stands opposed to cessationism, which teaches that miraculous gifts ended with the apostolic age. Pentecostals and Charismatics are the largest group of continuationists in the world, numbering over 600 million believers.","The conviction that the complete gospel includes not only salvation but also Spirit baptism, divine healing and Christ's return. The fourfold gospel (Jesus as Saviour, Baptizer in the Spirit, Healer and Coming King) defines Pentecostal preaching. Pentecostals believe any gospel that leaves out the supernatural power of the Holy Spirit is an incomplete gospel."],
["Assemblies of God","Church of God in Christ","The largest classical Pentecostal denomination in the world, founded in Hot Springs, Arkansas in 1914 with over 69 million members. It operates in over 190 countries with 370,000 churches and is known for strong missions, education and media ministry. The AG requires all ministers to have experienced Spirit baptism with the evidence of speaking in tongues.","The largest African-American Pentecostal denomination, founded by Charles Harrison Mason in Memphis, Tennessee in 1897. COGIC has over 6 million members in the United States and a strong international presence in many countries. Its rich tradition of gospel music, fiery preaching and Holy Ghost worship has profoundly influenced American religious culture."],
["Word of Knowledge","Discerning of Spirits","A supernatural revelation from the Holy Spirit giving a believer specific information they could not have known naturally. In 1 Samuel 9:20, the prophet Samuel told Saul details about his lost donkeys that only God could have revealed. Pentecostal services often feature moments where a leader speaks out specific details — illnesses, situations or names — that prove to be accurate.","The spiritual ability to distinguish between divine, human and demonic influences in a situation or person's life. 1 John 4:1 warns believers to test the spirits to see whether they are from God, because many false prophets have gone out. This gift is considered essential in Pentecostal churches where the supernatural is actively invited and expected."],
["Restorationism","Third Wave","The belief that God is restoring the church to the full power and authority it had in the book of Acts before Christ returns. Acts 3:21 speaks of the restoration of all things which God promised through His holy prophets long ago. Pentecostals see their movement as part of this divine restoration of apostolic power, gifts and mission to the end-time church.","A term coined by C. Peter Wagner for the 1980s movement of signs and wonders within evangelical churches that were not Pentecostal. Unlike classical Pentecostals, Third Wave believers did not necessarily speak in tongues but emphasised healing and prophecy. This movement brought supernatural ministry into many conservative evangelical congregations for the first time."],
["Soaking Prayer","Impartation","An extended period of restful, meditative prayer where a believer simply rests in God's presence without speaking or asking for anything. Psalm 46:10 says be still and know that I am God — soaking prayer puts this into practice by being quietly present. This practice became popular through Charismatic renewal movements and emphasises receiving rather than requesting.","The belief that spiritual gifts and anointing can be transferred from one believer to another through laying on of hands and prayer. In 2 Timothy 1:6, Paul reminded Timothy to fan into flame the gift of God which is in you through the laying on of my hands. Pentecostal conferences often feature impartation services where well-known ministers pray for attendees to receive gifts."],
["Power Encounter","Tongues of Fire","A dramatic confrontation between the power of God and demonic forces, resulting in visible demonstrations of God's superior authority. Elijah's showdown with the prophets of Baal on Mount Carmel in 1 Kings 18 is the classic biblical power encounter. Pentecostal missionaries report power encounters in the mission field where healings and deliverances validate the gospel message.","The visible flames that appeared above each believer's head on the Day of Pentecost as described in Acts 2:3. The fire symbolised the Holy Spirit's purifying presence and the power to speak God's message in every language. Pentecostals see the tongues of fire as the defining image of their movement — God's supernatural fire empowering ordinary believers for extraordinary mission."]
];

function getWeekNumber(){const d=new Date(),j=new Date(d.getFullYear(),0,1);return Math.ceil(((d-j)/86400000+j.getDay()+1)/7)}
function freeLimit(m){return m==='sing'?30:m==='act'?40:50}
function getWeeklyCards(full,mode){
  if(isPro())return full;
  const week=getWeekNumber(),n=full.length,count=Math.min(freeLimit(mode||'explain'),n),idx=[];
  let seed=week*7+13;
  for(let i=0;i<n;i++)idx.push(i);
  for(let i=n-1;i>0;i--){seed=(seed*1103515245+12345)&0x7fffffff;const j=seed%(i+1);[idx[i],idx[j]]=[idx[j],idx[i]]}
  return idx.slice(0,count).sort((a,b)=>a-b).map(i=>full[i]);
}
function gc(m){
  const base=m==='sing'?SING:m==='act'?ACT:EXPLAIN;
  let full=[...base];
  DENOM_PACKS.forEach(p=>{
    if(p.active){
      if(p.sing&&m==='sing')full=full.concat(p.sing);
      if(p.act&&m==='act')full=full.concat(p.act);
      if(p.explain&&(m==='explain'||m==='act'||m==='sing'))full=full.concat(p.explain);
      if(p.cards&&!p.sing)full=full.concat(p.cards);
    }
  });
  return getWeeklyCards(full,m);
}

    alert('Too many attempts. Please wait '+secs+' seconds.');return;
  }
  const input=document.getElementById('unlockCodeInput');
  const code=input?input.value.trim():'';
  if(!code)return;
  if(unlockPro(code)){
    unlockAttempts=0;
    S.showUnlock=false;render();

  }

function filterLibrary(letter){
  const search=document.getElementById('libSearch');
  const chips=document.querySelectorAll('#libWords .word-chip');
  const query=letter&&letter!=='ALL'?null:(search?search.value.trim().toLowerCase():'');
  chips.forEach(c=>{
    const word=c.getAttribute('data-word')||'';
    if(letter&&letter!=='ALL'){
      c.style.display=word[0].toUpperCase()===letter?'':'none';
    } else if(query){
      c.style.display=word.toLowerCase().includes(query)?'':'none';
    } else {
      c.style.display='';
    }
  });
  if(letter&&search)search.value='';
}

function spawnSparkles(left){
  const container=document.getElementById('scoreAnim');if(!container)return;
  const parent=container.parentElement;if(!parent)return;
  for(let i=0;i<6;i++){
    const s=document.createElement('div');
    const angle=(i/6)*360;const rad=angle*Math.PI/180;
    const x=Math.cos(rad)*30;const y=Math.sin(rad)*30;
    s.style.cssText=`position:absolute;top:40%;left:${left};width:6px;height:6px;background:var(--gold-light);border-radius:50%;z-index:6;pointer-events:none;transform:translate(-50%,-50%);animation:sparkle .5s ease-out ${i*0.05}s forwards`;
    s.style.setProperty('--tx',x+'px');s.style.setProperty('--ty',y+'px');
    parent.appendChild(s);
    setTimeout(()=>s.remove(),600);
  }
}

    const used=getUsed();
    const avail=[];for(let i=0;i<S.cards.length;i++){if(!used.has(i))avail.push(i)}
    S.ci=avail.length>0?avail[Math.floor(Math.random()*avail.length)]:Math.floor(Math.random()*S.cards.length);
    S.screen='card-front';
  }
  else{
    if(S.round>=S.rounds){
      if(S.mode==='mix'){
        S.champTotalA+=S.sA;S.champTotalB+=S.sB;
        S.champScores.push({phase:getActiveMode(),sA:S.sA,sB:S.sB});
      }
      logGame();beep('victory');S.screen='gameover';
    }
    else{
      S.round++;S.team='A';resetTurnStats();
      if(S.mode==='mix'){
        const prevMode=getActiveMode();
        S.champTotalA+=S.sA;S.champTotalB+=S.sB;
        S.champScores.push({phase:prevMode,sA:S.sA,sB:S.sB});
        const prevPhase=S.champPhase;
        S.champPhase=S.round-1;
        if(S.mixModes[S.champPhase]!==prevMode){
          S.sA=0;S.sB=0;
          S.cards=shuffle(gc(getActiveMode()));
          S.ci=Math.floor(Math.random()*S.cards.length);
        }
      }
      S.cards=shuffle(S.cards);
      const used=getUsed();
      const avail=[];for(let i=0;i<S.cards.length;i++){if(!used.has(i))avail.push(i)}
      S.ci=avail.length>0?avail[Math.floor(Math.random()*avail.length)]:Math.floor(Math.random()*S.cards.length);
      S.screen='card-front';
    }
  }render();
}
function resetTurnStats(){S.turnCorrect=0;S.turnSkip=0;S.turnPenalty=0;S.turnWon=0;S.skipsLeft=2;S.cardDiff=S.diff;S.diffLocked=false;S.paused=false;S.showStamp=false;S.turnWords=[];S.penaltyConfirm=false;S.cardsLow=false;S.streak=0;S.bestStreak=0;S.singSkipsLeft=3}

function startSolo(mode){

}
function soloNext(){
  if(S.soloCi+1>=S.cards.length&&!isPro()){

  S.soloCi=next;S.soloRevealed=false;render();
}

if(typeof CanvasRenderingContext2D!=='undefined'&&!CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
    r=Math.min(r,Math.min(w,h)/2);
    this.moveTo(x+r,y);this.arcTo(x+w,y,x+w,y+h,r);this.arcTo(x+w,y+h,x,y+h,r);
    this.arcTo(x,y+h,x,y,r);this.arcTo(x,y,x+w,y,r);this.closePath();return this;
  };
}
function generateScoreCard(){
  try{
    const c=document.createElement('canvas');c.width=1080;c.height=1080;
    const x=c.getContext('2d');
    x.fillStyle='#1B4D2E';x.fillRect(0,0,1080,1080);
    x.fillStyle='#F5E6C8';x.beginPath();x.roundRect(60,60,960,960,24);x.fill();
    x.strokeStyle='#5C3A1E';x.lineWidth=6;x.beginPath();x.roundRect(60,60,960,960,24);x.stroke();
    x.strokeStyle='#C8963E';x.lineWidth=2;x.beginPath();x.roundRect(80,80,920,920,18);x.stroke();
    const corners=[[95,95],[985,95],[95,985],[985,985]];
    x.strokeStyle='#C8963E';x.lineWidth=3;
    corners.forEach(([cx,cy],i)=>{
      x.beginPath();
      if(i===0){x.moveTo(cx,cy+20);x.lineTo(cx,cy);x.lineTo(cx+20,cy)}
      if(i===1){x.moveTo(cx-20,cy);x.lineTo(cx,cy);x.lineTo(cx,cy+20)}
      if(i===2){x.moveTo(cx,cy-20);x.lineTo(cx,cy);x.lineTo(cx+20,cy)}
      if(i===3){x.moveTo(cx-20,cy);x.lineTo(cx,cy);x.lineTo(cx,cy-20)}
      x.stroke();
    });
    x.fillStyle='#3B2210';x.font='bold 52px serif';x.textAlign='center';
    x.fillText('Fellowship Face-Off',540,160);
    const grd=x.createLinearGradient(240,180,840,180);
    grd.addColorStop(0,'transparent');grd.addColorStop(0.3,'#C8963E');grd.addColorStop(0.5,'#E8B84A');grd.addColorStop(0.7,'#C8963E');grd.addColorStop(1,'transparent');
    x.strokeStyle=grd;x.lineWidth=3;x.beginPath();x.moveTo(240,185);x.lineTo(840,185);x.stroke();
    x.font='italic 22px serif';x.fillStyle='#8B5E34';
    x.fillText('The Great Christian Multiplayer Game',540,220);
    const isChamp=S.mode==='mix';
    const tA=isChamp?S.champTotalA:S.sA;const tB=isChamp?S.champTotalB:S.sB;
    const w=tA>tB?'A':tB>tA?'B':null;
    x.fillStyle='rgba(43,108,176,.1)';x.beginPath();x.roundRect(120,270,380,280,16);x.fill();
    x.strokeStyle='#2B6CB0';x.lineWidth=3;x.beginPath();x.roundRect(120,270,380,280,16);x.stroke();
    x.fillStyle='#2B6CB0';x.font='bold 28px serif';x.fillText(sanitize(S.nameA),310,320);
    x.font='bold 120px serif';x.fillText(String(tA),310,440);
    x.fillStyle='rgba(197,48,48,.1)';x.beginPath();x.roundRect(580,270,380,280,16);x.fill();
    x.strokeStyle='#C53030';x.lineWidth=3;x.beginPath();x.roundRect(580,270,380,280,16);x.stroke();
    x.fillStyle='#C53030';x.font='bold 28px serif';x.fillText(sanitize(S.nameB),770,320);
    x.font='bold 120px serif';x.fillText(String(tB),770,440);
    x.fillStyle='#3B2210';x.beginPath();x.arc(540,400,36,0,Math.PI*2);x.fill();
    x.fillStyle='#C8963E';x.font='bold 28px serif';x.fillText('VS',540,410);
    x.fillStyle='#C8963E';x.beginPath();x.roundRect(200,590,680,70,12);x.fill();
    x.fillStyle='#3B2210';x.font='bold 32px serif';
    x.fillText(w?('🏆 '+sanitize(w==='A'?S.nameA:S.nameB)+' Wins!'):"It's a Tie!",540,638);
    x.font='italic 22px serif';x.fillStyle='#5C3A1E';
    x.fillText(mL(S.mode)+' · '+S.rounds+' rounds',540,710);
    if(isChamp&&S.champScores.length){
      let cy=760;
      S.champScores.forEach(sc=>{
        const icon=sc.phase==='sing'?'Sing-Off':sc.phase==='act'?'Act It Out':'Explain';
        x.font='18px serif';x.fillStyle='#5C3A1E';x.textAlign='left';
        x.fillText(icon,200,cy);
        x.textAlign='right';x.fillText(sc.sA+' — '+sc.sB,880,cy);
        cy+=35;
      });
      x.textAlign='center';
    }
    x.font='bold 20px serif';x.fillStyle='#1B4D2E';
    x.fillText('Can you beat this score? Download Fellowship Face-Off!',540,980);
    x.font='16px serif';x.fillStyle='#8B5E34';
    x.fillText(location.href,540,1010);
    return c.toDataURL('image/png');
  }catch(e){return null}
}

        navigator.share({files:[file],title:'Fellowship Face-Off',text:'Check out our game results! 🏆'}).catch(()=>shareResult());
      } else { shareResult() }

}

let isLandscape=false;
let _orientTimer=null;
function checkOrientation(){
  const was=isLandscape;

  document.body.classList.toggle('landscape',isLandscape);
  if(was!==isLandscape)render();
}

},{passive:true});
