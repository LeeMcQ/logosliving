<script>
'use strict';
const APP_VERSION='9.0';

// ─── CARDS WITH DEFINITIONS ───
// Format: [easy_word, challenge_word, easy_def, challenge_def]
const SING=[
["Jesus","Yahweh","Jesus performed over 37 recorded miracles including turning water into wine, walking on water, and raising the dead. The name Jesus (Yeshua in Hebrew) literally means 'God saves' — His very name declares His mission to rescue humanity from sin. Jesus was likely a carpenter who worked with stone as well as wood, since the Greek word 'tekton' means craftsman of hard materials.","The personal name of God revealed to Moses, meaning 'I AM WHO I AM' This word carries deep significance in biblical theology and Christian practice. Church councils and creeds throughout history have carefully defined this teaching to preserve biblical truth. This concept is foundational to Christian theology and has been debated and refined by scholars for centuries."],
["Lord","Messiah","In the Old Testament, 'LORD' in all capitals represents God's personal name Yahweh, used over 6,800 times. Calling Jesus 'Lord' (Greek: Kyrios) was a radical claim of deity, since Kyrios was used in Greek translations for Yahweh. Roman emperors demanded to be called 'Lord' — early Christians were martyred for refusing, saying only Jesus is Lord.","The anointed one; the promised deliverer of Israel, fulfilled in Jesus Christ This word carries deep significance in biblical theology and Christian practice. This concept is foundational to Christian theology and has been debated and refined by scholars for centuries. Understanding this doctrine deepens our grasp of God's character and His plan for humanity's redemption."],
["God","Immanuel","The Bible uses over 900 different names and titles for God, each revealing a different aspect of His character. God exists as a Trinity — three persons (Father, Son, Holy Spirit) sharing one divine nature, a mystery beyond full human comprehension. The Hebrew word 'Elohim' used for God in Genesis 1 is actually a plural noun, hinting at the Trinity from the very first verse.","'God with us' — the prophetic name given to Jesus (Isaiah 7:14) This word carries deep significance in biblical theology and Christian practice. Church councils and creeds throughout history have carefully defined this teaching to preserve biblical truth. This concept is foundational to Christian theology and has been debated and refined by scholars for centuries."],
["Love","Exalt","The Bible says 'God is love' (1 John 4:8) — love is not just something God does, it is the very essence of who He is. The Greek New Testament uses four different words for love: agape (unconditional), phileo (friendship), storge (family), and eros (romantic). The 'love chapter' (1 Corinthians 13) was written to a church full of conflict — Paul was teaching that spiritual gifts mean nothing without genuine love.","To raise in rank, power, or character; to lift God high in worship and praise This word carries deep significance in biblical theology and Christian practice. Understanding this doctrine deepens our grasp of God's character and His plan for humanity's redemption. Church councils and creeds throughout history have carefully defined this teaching to preserve biblical truth."],
["Praise","Magnify","The book of Psalms contains 150 songs of praise, and the word 'hallelujah' (praise the Lord) appears throughout as the ultimate expression of worship. Seven Hebrew words are translated as 'praise' in English, each with a different meaning — from loud shouting (halal) to quiet reflection (yadah) to physical dancing (machol). The walls of Jericho fell not by military force but by praise — the priests blew trumpets and the people shouted, and God brought the walls down flat.","To declare the greatness of God; to make His name larger in our hearts and lives This word carries deep significance in biblical theology and Christian practice. Understanding this doctrine deepens our grasp of God's character and His plan for humanity's redemption. Church councils and creeds throughout history have carefully defined this teaching to preserve biblical truth."],
["Worship","Rejoice","The English word 'worship' comes from 'worth-ship' — declaring the worth and value of the one being praised. True worship is not about music style or location — Jesus told the Samaritan woman that God seeks worshippers who worship 'in spirit and in truth' (John 4:24). The first recorded act of worship in the Bible is Abel's offering in Genesis 4 — and it cost him his life when his brother Cain became jealous.","To feel or show great joy and delight, especially in God's goodness and salvation This word carries deep significance in biblical theology and Christian practice. Understanding this doctrine deepens our grasp of God's character and His plan for humanity's redemption. Church councils and creeds throughout history have carefully defined this teaching to preserve biblical truth."],
["Holy","Celebrate","The word 'holy' means set apart, pure, and dedicated to God — it is God's most essential attribute, repeated as 'holy, holy, holy' in Isaiah 6 and Revelation 4. God is the only being whose attribute is repeated three times (holy, holy, holy) — this 'trisagion' emphasises that holiness is the foundation of all God's other attributes. In the original Hebrew, 'holy' (qadosh) was a commercial term meaning 'to cut off' or 'separate' — like cutting a piece of cloth to be reserved for a special purpose.","To honour a special occasion with festivities; to mark God's faithfulness with joy This word carries deep significance in biblical theology and Christian practice. This concept is foundational to Christian theology and has been debated and refined by scholars for centuries. Understanding this doctrine deepens our grasp of God's character and His plan for humanity's redemption."],
["Glory","Dance","God's glory is the visible manifestation of His presence — it appeared as fire on Sinai, a cloud in the tabernacle, and a star over Bethlehem. The Hebrew word for glory (kavod) literally means 'weight' or 'heaviness' — God's glory is the weighty, overwhelming reality of His magnificent presence. When Moses asked to see God's glory, God said no one can see His face and live — He placed Moses in a rock cleft and let only His 'back' pass by (Exodus 33).","Expressing praise through joyful bodily movement, as David danced before the Lord This word carries deep significance in biblical theology and Christian practice. This concept is foundational to Christian theology and has been debated and refined by scholars for centuries. Understanding this doctrine deepens our grasp of God's character and His plan for humanity's redemption."],
["Grace","Bow","Grace means God's undeserved favour — getting good things we don't deserve, while mercy means not getting the punishment we do deserve. The Greek word 'charis' (grace) appears 156 times in the New Testament and is the root of 'charisma' (spiritual gifts) and 'eucharist' (thanksgiving). In the ancient world, 'grace' was a patron-client term — a wealthy benefactor would show 'grace' to those who couldn't repay, which is exactly what God does for us.","To bend in reverence and submission before God, acknowledging His sovereignty This word carries deep significance in biblical theology and Christian practice. Understanding this doctrine deepens our grasp of God's character and His plan for humanity's redemption. Church councils and creeds throughout history have carefully defined this teaching to preserve biblical truth."],
["King","Adore","Jesus spoke about the Kingdom of God more than any other topic — it was the central theme of His teaching and appears over 100 times in the Gospels. The Kingdom of God is both 'already' and 'not yet' — it began with Jesus' first coming and will be fully established at His second coming. Jesus said the kingdom belongs to those who become like little children (Matthew 18:3) — not childish, but trusting, humble, and dependent on the Father.","To worship with profound reverence and deep, passionate love for God This word carries deep significance in biblical theology and Christian practice. Understanding this doctrine deepens our grasp of God's character and His plan for humanity's redemption. Church councils and creeds throughout history have carefully defined this teaching to preserve biblical truth."],
["Savior","Seek","One who saves; Jesus Christ who rescues humanity from sin and death This word carries deep significance in biblical theology and Christian practice. This concept is foundational to Christian theology and has been debated and refined by scholars for centuries. Understanding this doctrine deepens our grasp of God's character and His plan for humanity's redemption.","To earnestly look for God's presence, will, and truth with a whole heart This word carries deep significance in biblical theology and Christian practice. This concept is foundational to Christian theology and has been debated and refined by scholars for centuries. Understanding this doctrine deepens our grasp of God's character and His plan for humanity's redemption."],
["Name","Abide","The name of Jesus through which salvation and authority come This word carries deep significance in biblical theology and Christian practice. This concept is foundational to Christian theology and has been debated and refined by scholars for centuries. Understanding this doctrine deepens our grasp of God's character and His plan for humanity's redemption.","To remain, stay, or dwell continuously in God's presence and His Word This word carries deep significance in biblical theology and Christian practice. This concept is foundational to Christian theology and has been debated and refined by scholars for centuries. Understanding this doctrine deepens our grasp of God's character and His plan for humanity's redemption."],
["Light","Dwell","Jesus declared 'I am the light of the world' (John 8:12) — whoever follows Him will never walk in darkness but will have the light of life. God's first creative act was to speak light into existence (Genesis 1:3) — light existed before the sun was created on day four, meaning God Himself was the source. In the New Jerusalem, there will be no need for sun or moon because the glory of God gives it light and the Lamb is its lamp (Revelation 21:23).","To live and remain in God's presence; to make one's home in His love This word carries deep significance in biblical theology and Christian practice. Church councils and creeds throughout history have carefully defined this teaching to preserve biblical truth. This concept is foundational to Christian theology and has been debated and refined by scholars for centuries."],
["Heart","Draw","The Bible mentions the heart over 800 times — not the physical organ but the centre of a person's thoughts, will, emotions, and spiritual life. God told Samuel 'people look at the outward appearance, but the Lord looks at the heart' (1 Samuel 16:7) — God values inner character over external religion. Jeremiah 17:9 says the heart is 'deceitful above all things' while Ezekiel 36:26 promises God will give believers 'a new heart' — the gospel transforms us from the inside out.","To come closer to God; to be pulled toward His presence by the Holy Spirit This word carries deep significance in biblical theology and Christian practice. Church councils and creeds throughout history have carefully defined this teaching to preserve biblical truth. This concept is foundational to Christian theology and has been debated and refined by scholars for centuries."],
["Spirit","Communion","The Holy Spirit is the third person of the Trinity — not an impersonal force but a divine person who speaks, guides, comforts, and can be grieved. The Hebrew word for Spirit is 'ruach' which also means 'wind' and 'breath' — the Spirit is as essential to spiritual life as breath is to physical life. The Holy Spirit appeared as a dove at Jesus' baptism, as tongues of fire at Pentecost, and as a mighty rushing wind — showing He works in diverse ways.","Intimate sharing and fellowship with God and with fellow believers This word carries deep significance in biblical theology and Christian practice. The original Hebrew or Greek word carries rich layers of meaning that English translations cannot fully capture. Early Christians practiced this as a central part of their faith, often at great personal risk and sacrifice."],
["Cross","Fellowship","The cross was the most shameful form of execution in the Roman world — reserved for slaves and the worst criminals, designed to maximise pain and humiliation. What appeared to be Satan's greatest victory (killing God's Son) was actually God's master plan all along — the cross defeated sin, death, and the devil simultaneously. Crucifixion victims typically died from asphyxiation as their body weight made it impossible to breathe — they had to push up on the nails to take each breath.","Deep companionship and unity among believers, sharing life together in Christ This word carries deep significance in biblical theology and Christian practice. God often used ordinary physical objects to teach extraordinary spiritual truths to His people. Archaeological finds have revealed what these items actually looked like in the ancient biblical world."],
["Blood","Redeemed","The Bible says 'without the shedding of blood there is no forgiveness of sins' (Hebrews 9:22) — Jesus' blood was the ultimate and final sacrifice. Blood represents life in Scripture (Leviticus 17:11) — when Jesus shed His blood, He was pouring out His very life as a substitute for ours. The Passover lamb's blood on the doorposts in Egypt formed the shape of a cross — the top of the door and two side posts, centuries before crucifixion was invented.","Bought back from slavery to sin by the precious blood of Jesus Christ This word carries deep significance in biblical theology and Christian practice. Understanding this doctrine deepens our grasp of God's character and His plan for humanity's redemption. Church councils and creeds throughout history have carefully defined this teaching to preserve biblical truth."],
["Mercy","Forgiven","God showed mercy to David after his sin with Bathsheba, to Peter after his denial, and to Paul after he persecuted Christians — no one is beyond mercy. The Hebrew word for mercy is 'chesed' which combines love, loyalty, and compassion — it describes God's covenant faithfulness even when we are unfaithful. The Mercy Seat on the Ark of the Covenant was where God's presence dwelt — it sat directly above the Ten Commandments, symbolising mercy covering the law.","Jesus taught His followers to forgive 'seventy times seven' times (490 times), meaning forgiveness should have no limit — just as God's forgiveness has no limit. The Greek word for forgiveness (aphesis) means 'to release' or 'to let go' — when God forgives, He releases us completely from the debt of sin. On the cross, Jesus prayed 'Father, forgive them, for they do not know what they are doing' — offering forgiveness even to those who were killing Him."],
["Joy","Restored","Paul wrote his most joy-filled letter (Philippians, mentioning joy 16 times) while chained in a Roman prison — proving joy is not dependent on circumstances. The 'joy of the Lord is your strength' (Nehemiah 8:10) — in Hebrew theology, joy was not an emotion but a supernatural force that gave power to endure. There are over 400 references to joy and rejoicing in the Bible, making it one of the most commanded emotions — God wants His people to be joyful.","Brought back to original condition; renewed and made whole by God's power This word carries deep significance in biblical theology and Christian practice. Understanding this doctrine deepens our grasp of God's character and His plan for humanity's redemption. Church councils and creeds throughout history have carefully defined this teaching to preserve biblical truth."],
["Peace","Healed","Jesus is called the Prince of Peace (Isaiah 9:6), and He promised His followers a peace 'the world cannot give' — inner calm regardless of circumstances. The Hebrew word 'shalom' means far more than absence of conflict — it means completeness, wholeness, health, prosperity, and total well-being. When Jesus said 'Peace be with you' after His resurrection, He was not just greeting the disciples — He was pronouncing the cosmic peace achieved through the cross.","Made whole in body, mind, or spirit through God's healing touch This word carries deep significance in biblical theology and Christian practice. Understanding this doctrine deepens our grasp of God's character and His plan for humanity's redemption. Church councils and creeds throughout history have carefully defined this teaching to preserve biblical truth."],
["Hope","Delivered","Biblical hope is not wishful thinking but confident certainty based on God's unbreakable promises and proven faithfulness throughout history. Paul lists hope alongside faith and love as the three things that last forever (1 Cor 13:13) — it is an eternal quality, not a temporary feeling. The anchor was the earliest Christian symbol (before the cross), based on Hebrews 6:19 which calls hope 'an anchor for the soul, firm and secure.'","Set free from bondage, oppression, or evil by God's mighty hand This word carries deep significance in biblical theology and Christian practice. Their faith journey reveals important lessons about trusting God even in difficult circumstances. Ancient Jewish tradition preserves additional details about this figure beyond what Scripture records."],
["Faith","Sacrifice","Hebrews 11:1 defines faith as 'the substance of things hoped for, the evidence of things not seen' — it is confident trust based on God's character. Jesus said faith the size of a mustard seed (the smallest seed known in Israel) could move mountains — it's not the quantity of faith that matters but its object. The word 'faith' (pistis in Greek) appears 243 times in the New Testament but only twice in the Old Testament, reflecting the shift from law to grace.","In the Old Testament, animals were sacrificed to temporarily cover sins — Jesus' sacrifice on the cross permanently removed sins once and for all. The word 'sacrifice' comes from Latin 'sacri-facere' meaning 'to make sacred' — through Christ's sacrifice, believers are made holy and set apart for God. Abraham's near-sacrifice of Isaac on Mount Moriah happened on the same mountain ridge where Jesus would be crucified approximately 2,000 years later."],
["Heaven","Atonement","Jesus said in His Father's house are many rooms and He was going to prepare a place for His followers (John 14:2-3). The Bible describes three heavens: the sky (atmosphere), space (cosmos), and the dwelling place of God — Paul said he was caught up to the 'third heaven.' Revelation describes the New Jerusalem as a perfect cube, 1,400 miles on each side, with streets of gold and gates made of single pearls. Many great hymns and sermons throughout church history have been inspired by this truth.","The reconciliation of God and humanity through Christ's substitutionary death This points to the heart of the gospel — God's plan of salvation through Jesus Christ. Church councils and creeds throughout history have carefully defined this teaching to preserve biblical truth. This concept is foundational to Christian theology and has been debated and refined by scholars for centuries."],
["Earth","Resurrection","The world God created and sustains; the stage of human history This word carries deep significance in biblical theology and Christian practice. The original Hebrew or Greek words used for this carry deeper meaning than the English translation suggests. God frequently uses this element of nature throughout Scripture as a powerful symbol of spiritual truth.","Jesus rose from the dead on the third day, appearing to over 500 people over 40 days — the most attested miracle in ancient history. Paul said if Christ has not been raised, our faith is futile (1 Cor 15:17) — the resurrection is not a side doctrine but the foundation of all Christianity. The first witnesses of the resurrection were women — in first-century culture, women's testimony was not accepted in court, making this an unlikely detail to invent."],
["Sing","Eternal","The most common Greek word for sin is 'hamartia' which literally means 'to miss the mark' — like an archer's arrow falling short of the target. Sin entered the world through one man (Adam) and death through sin — but grace overflowed through one man (Christ) to bring life to all who believe (Romans 5). The Bible identifies three categories of sin: the lust of the flesh, the lust of the eyes, and the pride of life (1 John 2:16) — the same three temptations Satan used on Eve and on Jesus.","Eternal life is not just living forever — Jesus defined it as knowing God personally: 'This is eternal life, that they know You' (John 17:3). The Bible says God has 'set eternity in the human heart' (Eccl 3:11) — there is an innate longing in every person for something beyond this temporary world. The Hebrew word 'olam' (eternal/everlasting) comes from a root meaning 'hidden' — eternity is a reality hidden from full human comprehension."],
["Bless","Crown","To speak well of or to bestow God's favour upon someone This word carries deep significance in biblical theology and Christian practice. Church councils and creeds throughout history have carefully defined this teaching to preserve biblical truth. This concept is foundational to Christian theology and has been debated and refined by scholars for centuries.","The Bible mentions five crowns believers can receive: the crown of life, crown of glory, crown of righteousness, crown incorruptible, and crown of rejoicing. Jesus wore a crown of thorns — thorns were part of the curse in Genesis 3, so by wearing them He was symbolically taking the curse of sin upon Himself. In Revelation 4:10, the 24 elders cast their crowns before God's throne — showing that every reward we receive ultimately belongs to and glorifies God."],
["Mighty","Triumph","Having great power and strength; describing God's awesome abilities This word carries deep significance in biblical theology and Christian practice. This concept is foundational to Christian theology and has been debated and refined by scholars for centuries. Understanding this doctrine deepens our grasp of God's character and His plan for humanity's redemption.","Decisive victory over enemies; Christ's triumph over sin, death, and the grave This word carries deep significance in biblical theology and Christian practice. Church councils and creeds throughout history have carefully defined this teaching to preserve biblical truth. This concept is foundational to Christian theology and has been debated and refined by scholars for centuries."],
["Worthy","Darkness","Deserving of honour, respect, and devotion; Jesus alone is worthy This word carries deep significance in biblical theology and Christian practice. Understanding this doctrine deepens our grasp of God's character and His plan for humanity's redemption. Church councils and creeds throughout history have carefully defined this teaching to preserve biblical truth.","Noah's ark was approximately 450 feet long, 75 feet wide, and 45 feet high — large enough to hold over 500 railroad cars worth of space. The ark is a picture of salvation — there was only one door to enter (Jesus said 'I am the door'), and God Himself shut it when the time of grace ended. The ark came to rest on the mountains of Ararat (modern Turkey), and explorers have searched for its remains for centuries, with several claimed sightings."],
["Rock","Fortress","Jesus told Peter that on 'this rock' (Peter's confession of faith) He would build His church — the foundation of Christianity is the truth that Jesus is the Messiah. In the Old Testament, God is called 'the Rock' at least 30 times — symbolising His unchanging nature, strength, and reliability as a foundation for life. Moses struck the rock at Meribah and water gushed out for two million people — Paul says 'that rock was Christ' (1 Cor 10:4), providing living water to His people.","A place of strong defence and protection; God is our mighty fortress (Psalm 18:2) Mountains and rocks in Scripture symbolise God's strength, permanence, and faithfulness. This concept is foundational to Christian theology and has been debated and refined by scholars for centuries. Understanding this doctrine deepens our grasp of God's character and His plan for humanity's redemption."],
["Refuge","Stronghold","A safe place of shelter and protection found in God alone This word carries deep significance in biblical theology and Christian practice. This concept is foundational to Christian theology and has been debated and refined by scholars for centuries. Understanding this doctrine deepens our grasp of God's character and His plan for humanity's redemption.","A fortified place of safety; God as our secure hiding place in times of trouble This word carries deep significance in biblical theology and Christian practice. Church councils and creeds throughout history have carefully defined this teaching to preserve biblical truth. This concept is foundational to Christian theology and has been debated and refined by scholars for centuries."],
["Life","Shield","Eternal life offered through Jesus Christ; 'I am the life' (John 14:6) This word carries deep significance in biblical theology and Christian practice. This concept is foundational to Christian theology and has been debated and refined by scholars for centuries. Understanding this doctrine deepens our grasp of God's character and His plan for humanity's redemption.","The shield of faith that extinguishes the devil's fiery darts (Ephesians 6:16) Spiritual warfare is a reality for every believer, and God provides the resources to stand firm. This item held deep symbolic meaning in biblical culture, pointing to spiritual realities beyond its physical form. God often used ordinary physical objects to teach extraordinary spiritual truths to His people."],
["Power","Pure","God's ability to accomplish all things according to His will This word carries deep significance in biblical theology and Christian practice. Church councils and creeds throughout history have carefully defined this teaching to preserve biblical truth. This concept is foundational to Christian theology and has been debated and refined by scholars for centuries.","Free from contamination; clean in heart, mind, and motive before God This word carries deep significance in biblical theology and Christian practice. Understanding this doctrine deepens our grasp of God's character and His plan for humanity's redemption. Church councils and creeds throughout history have carefully defined this teaching to preserve biblical truth."],

["Forever","Broken","Eve was the first woman, created from Adam's rib to be his equal partner and companion in the Garden of Eden. Eve's creation from Adam's side symbolises equality — not from his head to rule over him, nor from his feet to be trampled, but from his side to be his equal. The name Eve (Chavah in Hebrew) means 'life-giver' or 'mother of all living' — given to her by Adam after the Fall.","Shattered by sin and suffering; made whole by Christ's broken body for us This word carries deep significance in biblical theology and Christian practice. This concept is foundational to Christian theology and has been debated and refined by scholars for centuries. Understanding this doctrine deepens our grasp of God's character and His plan for humanity's redemption."],

["Lamb","Judah","Jesus is called the 'Lamb of God who takes away the sin of the world' (John 1:29) — connecting Him to the Passover lamb whose blood saved Israel in Egypt. A sacrificial lamb had to be without blemish or defect — Jesus lived a sinless life so He could be the perfect, unblemished sacrifice for all humanity. In Revelation, Jesus appears as both a Lion (power) and a Lamb (sacrifice) — the only time in literature where the hero conquers by being slain.","The tribe of Israel from which Jesus descended; associated with kingship and praise This word carries deep significance in biblical theology and Christian practice. This person's story is recorded in the Old Testament and has been studied by scholars for thousands of years. Their faith journey reveals important lessons about trusting God even in difficult circumstances."],
["Blessed","Everlasting","Enjoying God's favour; happy and fortunate in a spiritual sense This word carries deep significance in biblical theology and Christian practice. Church councils and creeds throughout history have carefully defined this teaching to preserve biblical truth. This concept is foundational to Christian theology and has been debated and refined by scholars for centuries.","Eve was the first woman, created from Adam's rib to be his equal partner and companion in the Garden of Eden. Eve's creation from Adam's side symbolises equality — not from his head to rule over him, nor from his feet to be trampled, but from his side to be his equal. The name Eve (Chavah in Hebrew) means 'life-giver' or 'mother of all living' — given to her by Adam after the Fall."],
["Sin","Infinite","The most common Greek word for sin is 'hamartia' which literally means 'to miss the mark' — like an archer's arrow falling short of the target. Sin entered the world through one man (Adam) and death through sin — but grace overflowed through one man (Christ) to bring life to all who believe (Romans 5). The Bible identifies three categories of sin: the lust of the flesh, the lust of the eyes, and the pride of life (1 John 2:16) — the same three temptations Satan used on Eve and on Jesus.","Without limits or bounds; describing God's wisdom, power, love, and presence This word carries deep significance in biblical theology and Christian practice. Church councils and creeds throughout history have carefully defined this teaching to preserve biblical truth. This concept is foundational to Christian theology and has been debated and refined by scholars for centuries."],

["Trust","Valley","Firm reliance on God's character, promises, and faithfulness This word carries deep significance in biblical theology and Christian practice. This concept is foundational to Christian theology and has been debated and refined by scholars for centuries. Understanding this doctrine deepens our grasp of God's character and His plan for humanity's redemption.","A low place between mountains; the valley of the shadow of death (Psalm 23) This word carries deep significance in biblical theology and Christian practice. This appears at key turning points in the biblical narrative, marking moments of divine intervention. The original Hebrew or Greek words used for this carry deeper meaning than the English translation suggests."],
["Redeemer","Shadow","One who pays a price to set another free; Jesus Christ our Redeemer This word carries deep significance in biblical theology and Christian practice. This concept is foundational to Christian theology and has been debated and refined by scholars for centuries. Understanding this doctrine deepens our grasp of God's character and His plan for humanity's redemption.","A dark area; the shadow of death; also God's protective shadow (Psalm 91:1) This word carries deep significance in biblical theology and Christian practice. Church councils and creeds throughout history have carefully defined this teaching to preserve biblical truth. This concept is foundational to Christian theology and has been debated and refined by scholars for centuries."],
["Creator","Covenant","The God who made heaven and earth and everything in them This word carries deep significance in biblical theology and Christian practice. This concept is foundational to Christian theology and has been debated and refined by scholars for centuries. Understanding this doctrine deepens our grasp of God's character and His plan for humanity's redemption.","A covenant in the Bible is far stronger than a contract — it is a solemn, unbreakable bond sealed with blood, like a marriage vow before God. God made covenants with Noah (rainbow), Abraham (circumcision), Moses (law), David (eternal throne), and the New Covenant through Jesus' blood. In ancient covenant ceremonies, animals were cut in half and both parties walked between the pieces — when God made covenant with Abraham, only God walked through (Gen 15), meaning He took all the responsibility."],
["Healer","Zion","God who restores health in body, mind, and spirit This word carries deep significance in biblical theology and Christian practice. This concept is foundational to Christian theology and has been debated and refined by scholars for centuries. Understanding this doctrine deepens our grasp of God's character and His plan for humanity's redemption.","A name for Jerusalem and God's holy mountain; symbol of God's eternal kingdom This word carries deep significance in biblical theology and Christian practice. This concept is foundational to Christian theology and has been debated and refined by scholars for centuries. Understanding this doctrine deepens our grasp of God's character and His plan for humanity's redemption."],
["Provider","David","God who supplies every need according to His riches in glory This word carries deep significance in biblical theology and Christian practice. Church councils and creeds throughout history have carefully defined this teaching to preserve biblical truth. This concept is foundational to Christian theology and has been debated and refined by scholars for centuries.","David defeated the giant Goliath with just a sling and a stone, then became Israel's greatest king and established Jerusalem as the capital. God called David 'a man after My own heart' (Acts 13:22) — not because he was sinless, but because he always returned to God in genuine repentance. David was likely a redhead — the Hebrew word used to describe him ('admoni') means ruddy or red-haired, unusual in the ancient Near East."],
["Shepherd","Avenger","Jesus called Himself the Good Shepherd who lays down His life for His sheep — in ancient Israel, shepherds literally slept across the door of the sheepfold to protect the flock. The shepherd metaphor reveals Jesus' intimate care — He calls each sheep by name, leads them to green pastures, and searches tirelessly for even one that is lost. Shepherds were considered the lowest social class in Israel, yet God chose shepherds to be the first to hear the announcement of Jesus' birth.","God who vindicates His people and executes justice against wickedness This word carries deep significance in biblical theology and Christian practice. This concept is foundational to Christian theology and has been debated and refined by scholars for centuries. Understanding this doctrine deepens our grasp of God's character and His plan for humanity's redemption."],
["Deliverer","Upholder","God who rescues His people from danger, oppression, and bondage This word carries deep significance in biblical theology and Christian practice. Their faith journey reveals important lessons about trusting God even in difficult circumstances. Ancient Jewish tradition preserves additional details about this figure beyond what Scripture records.","God who sustains and maintains all things by the word of His power This word carries deep significance in biblical theology and Christian practice. Understanding this doctrine deepens our grasp of God's character and His plan for humanity's redemption. Church councils and creeds throughout history have carefully defined this teaching to preserve biblical truth."],
["Almighty","Ruler","All-powerful; one of God's attributes meaning unlimited in power This word carries deep significance in biblical theology and Christian practice. This concept is foundational to Christian theology and has been debated and refined by scholars for centuries. Understanding this doctrine deepens our grasp of God's character and His plan for humanity's redemption.","Supreme authority; God as sovereign ruler over all nations and all creation This word carries deep significance in biblical theology and Christian practice. Understanding this doctrine deepens our grasp of God's character and His plan for humanity's redemption. Church councils and creeds throughout history have carefully defined this teaching to preserve biblical truth."],
["Righteous","Pillar","Morally right and just; God's perfect standard of holiness This word carries deep significance in biblical theology and Christian practice. This concept is foundational to Christian theology and has been debated and refined by scholars for centuries. Understanding this doctrine deepens our grasp of God's character and His plan for humanity's redemption.","A strong column of support; believers as pillars in God's temple (Rev 3:12) Mountains and rocks in Scripture symbolise God's strength, permanence, and faithfulness. Archaeological finds have revealed what these items actually looked like in the ancient biblical world. This item held deep symbolic meaning in biblical culture, pointing to spiritual realities beyond its physical form."],
["Sovereign","Thunder","Supreme in power and authority; God rules over all This word carries deep significance in biblical theology and Christian practice. Church councils and creeds throughout history have carefully defined this teaching to preserve biblical truth. This concept is foundational to Christian theology and has been debated and refined by scholars for centuries.","The voice of God; His power displayed in nature and His mighty declarations This word carries deep significance in biblical theology and Christian practice. This appears at key turning points in the biblical narrative, marking moments of divine intervention. The original Hebrew or Greek words used for this carry deeper meaning than the English translation suggests."],
["Faithful","Sanctified","Hebrews 11:1 defines faith as 'the substance of things hoped for, the evidence of things not seen' — it is confident trust based on God's character. Jesus said faith the size of a mustard seed (the smallest seed known in Israel) could move mountains — it's not the quantity of faith that matters but its object. The word 'faith' (pistis in Greek) appears 243 times in the New Testament but only twice in the Old Testament, reflecting the shift from law to grace.","Set apart and made holy by God; dedicated to His purposes and purified This word carries deep significance in biblical theology and Christian practice. Understanding this doctrine deepens our grasp of God's character and His plan for humanity's redemption. Church councils and creeds throughout history have carefully defined this teaching to preserve biblical truth."],
["Glorious","Consecrated","Full of glory; resplendent with God's majesty and splendour This word carries deep significance in biblical theology and Christian practice. Church councils and creeds throughout history have carefully defined this teaching to preserve biblical truth. This concept is foundational to Christian theology and has been debated and refined by scholars for centuries.","Formally dedicated to God's service; set apart as sacred and holy This word carries deep significance in biblical theology and Christian practice. Church councils and creeds throughout history have carefully defined this teaching to preserve biblical truth. This concept is foundational to Christian theology and has been debated and refined by scholars for centuries."],
["Merciful","Hallowed","Showing compassion and forgiveness even when punishment is deserved This word carries deep significance in biblical theology and Christian practice. Understanding this doctrine deepens our grasp of God's character and His plan for humanity's redemption. Church councils and creeds throughout history have carefully defined this teaching to preserve biblical truth.","Made holy and sacred; revered and honoured as deeply holy — 'hallowed be Thy name' This word carries deep significance in biblical theology and Christian practice. This concept is foundational to Christian theology and has been debated and refined by scholars for centuries. Understanding this doctrine deepens our grasp of God's character and His plan for humanity's redemption."],
["Throne","Overcome","God's throne is described in Revelation as surrounded by a rainbow, 24 elders, four living creatures, and a sea of glass — a scene of overwhelming majesty. The throne represents God's sovereign rule over all creation — every earthly throne is temporary, but God's throne endures forever and ever. Jesus promised that overcomers would sit with Him on His throne, just as He overcame and sat down with His Father on His throne (Revelation 3:21).","To conquer and prevail; 'He who overcomes will inherit all things' (Rev 21:7) This word carries deep significance in biblical theology and Christian practice. This concept is foundational to Christian theology and has been debated and refined by scholars for centuries. Understanding this doctrine deepens our grasp of God's character and His plan for humanity's redemption."],
["Kingdom","Conquer","Jesus spoke about the Kingdom of God more than any other topic — it was the central theme of His teaching and appears over 100 times in the Gospels. The Kingdom of God is both 'already' and 'not yet' — it began with Jesus' first coming and will be fully established at His second coming. Jesus said the kingdom belongs to those who become like little children (Matthew 18:3) — not childish, but trusting, humble, and dependent on the Father.","To defeat and gain control over enemies; Christ conquered sin and death for us This word carries deep significance in biblical theology and Christian practice. This concept is foundational to Christian theology and has been debated and refined by scholars for centuries. Understanding this doctrine deepens our grasp of God's character and His plan for humanity's redemption."],
["Soul","Victorious","The Hebrew word for soul is 'nephesh' which means the whole living being — in Genesis 2:7, God breathed into Adam and he 'became a living soul.' Jesus asked 'What does it profit a man to gain the whole world and lose his own soul?' (Mark 8:36) — the soul's value exceeds all earthly wealth combined. In Hebrew thought, the soul is not a separate ghostly entity trapped in a body — it is the whole person, the complete integrated life that God created and sustains. Many great hymns and sermons throughout church history have been inspired by this truth.","Having won a victory; triumphant through Christ who gives us the victory This word carries deep significance in biblical theology and Christian practice. Understanding this doctrine deepens our grasp of God's character and His plan for humanity's redemption. Church councils and creeds throughout history have carefully defined this teaching to preserve biblical truth."],
["Breath","Triumphant","The life force given by God; every breath is a gift from the Creator This word carries deep significance in biblical theology and Christian practice. Church councils and creeds throughout history have carefully defined this teaching to preserve biblical truth. This concept is foundational to Christian theology and has been debated and refined by scholars for centuries.","Celebrating a great victory; rejoicing in Christ's total defeat of evil This word carries deep significance in biblical theology and Christian practice. Church councils and creeds throughout history have carefully defined this teaching to preserve biblical truth. This concept is foundational to Christian theology and has been debated and refined by scholars for centuries."],
["Fire","Radiant","God appeared to Moses in a burning bush that was not consumed, and led Israel as a pillar of fire by night during their wilderness journey. Fire in Scripture represents God's presence, purification, and judgment — it refines gold, consumes sacrifice, and will ultimately purify the earth. On the Day of Pentecost, tongues of fire rested on each believer — fire that empowers rather than destroys, marking the birth of the Spirit-filled church.","Shining brightly; glowing with light; reflecting the glory of God's presence This word carries deep significance in biblical theology and Christian practice. Understanding this doctrine deepens our grasp of God's character and His plan for humanity's redemption. Church councils and creeds throughout history have carefully defined this teaching to preserve biblical truth."],
["River","Splendor","A flowing stream; the river of life in God's eternal kingdom (Rev 22) Water imagery appears throughout Scripture as a symbol of both judgment and renewal. The original Hebrew or Greek words used for this carry deeper meaning than the English translation suggests. God frequently uses this element of nature throughout Scripture as a powerful symbol of spiritual truth.","Magnificent and impressive beauty; the splendour of God's holiness and majesty This word carries deep significance in biblical theology and Christian practice. This concept is foundational to Christian theology and has been debated and refined by scholars for centuries. Understanding this doctrine deepens our grasp of God's character and His plan for humanity's redemption."],
["Wind","Majesty","Symbol of the Holy Spirit's powerful, unseen movement The Holy Spirit plays a vital role in the life of every believer, providing guidance, comfort, and power. God frequently uses this element of nature throughout Scripture as a powerful symbol of spiritual truth. This appears at key turning points in the biblical narrative, marking moments of divine intervention.","The greatness and dignity of God as supreme ruler of all creation This word carries deep significance in biblical theology and Christian practice. Church councils and creeds throughout history have carefully defined this teaching to preserve biblical truth. This concept is foundational to Christian theology and has been debated and refined by scholars for centuries."],
["Ocean","Divine","The vast sea; symbolising God's immeasurable depth and power Water imagery appears throughout Scripture as a symbol of both judgment and renewal. This appears at key turning points in the biblical narrative, marking moments of divine intervention. The original Hebrew or Greek words used for this carry deeper meaning than the English translation suggests.","Of, from, or like God; heavenly, sacred, and supremely excellent This word carries deep significance in biblical theology and Christian practice. This appears at key turning points in the biblical narrative, marking moments of divine intervention. The original Hebrew or Greek words used for this carry deeper meaning than the English translation suggests."],
["Mountain","Salvation","Major events in the Bible happened on mountains: the Law on Sinai, Elijah's contest on Carmel, the Transfiguration, and the Crucifixion on Golgotha. Mountains in Scripture symbolise the meeting place between God and humanity — they represent rising above the earthly to encounter the divine. Jesus often withdrew to mountains to pray alone (Luke 6:12) — He spent an entire night in prayer on a mountain before choosing His twelve apostles.","The name Jesus (Yeshua) literally means 'God saves' — salvation is the central theme of the entire Bible from Genesis to Revelation. Salvation involves three tenses: we have been saved (justification), we are being saved (sanctification), and we will be saved (glorification). The Bible describes salvation as being rescued from slavery, healed from disease, freed from prison, and adopted into a royal family — all at once."],
["Hallelujah","Freedom","Hallelujah is a Hebrew word meaning 'Praise the Lord' (Hallelu-Yah) — it appears 24 times in the Psalms and 4 times in Revelation. Hallelujah is one of the few Hebrew words that has passed unchanged into virtually every language on earth — it is the universal language of praise. The four 'Hallelujahs' in Revelation 19 are the only ones in the New Testament, celebrating the final victory of God over evil.","Liberation from bondage, sin, and death through Christ's redemptive work This word carries deep significance in biblical theology and Christian practice. This concept is foundational to Christian theology and has been debated and refined by scholars for centuries. Understanding this doctrine deepens our grasp of God's character and His plan for humanity's redemption."],
["Presence","Fortress","Being in the same place as someone; God's manifest nearness to us This word carries deep significance in biblical theology and Christian practice. Understanding this doctrine deepens our grasp of God's character and His plan for humanity's redemption. Church councils and creeds throughout history have carefully defined this teaching to preserve biblical truth.","A fortified place; God as our strong defence and impenetrable refuge Mountains and rocks in Scripture symbolise God's strength, permanence, and faithfulness. This concept is foundational to Christian theology and has been debated and refined by scholars for centuries. Understanding this doctrine deepens our grasp of God's character and His plan for humanity's redemption."],
["Near","Stronghold","Close in distance or relationship; God draws near to those who seek Him This word carries deep significance in biblical theology and Christian practice. This concept is foundational to Christian theology and has been debated and refined by scholars for centuries. Understanding this doctrine deepens our grasp of God's character and His plan for humanity's redemption.","A place of security and survival; God as our stronghold in times of distress This word carries deep significance in biblical theology and Christian practice. Church councils and creeds throughout history have carefully defined this teaching to preserve biblical truth. This concept is foundational to Christian theology and has been debated and refined by scholars for centuries."]

const ACT=[
["Adam","Garden of Eden","Adam was the first human, formed from the dust of the ground and given life by God's own breath in the Garden of Eden. Paul calls Jesus the 'second Adam' (1 Cor 15:45) — where the first Adam brought death through disobedience, Christ brings life through obedience. The Hebrew word 'adam' simply means 'man' or 'humanity' and comes from 'adamah' meaning 'ground' or 'red earth.'","The paradise God created for Adam and Eve with the tree of life This word carries deep significance in biblical theology and Christian practice. This location played a significant role in biblical history and can still be visited by pilgrims today. Archaeological discoveries at this site have confirmed details recorded in Scripture centuries ago."],
["Eve","Serpent","Eve was the first woman, created from Adam's rib to be his equal partner and companion in the Garden of Eden. Eve's creation from Adam's side symbolises equality — not from his head to rule over him, nor from his feet to be trampled, but from his side to be his equal. The name Eve (Chavah in Hebrew) means 'life-giver' or 'mother of all living' — given to her by Adam after the Fall.","The crafty creature Satan used to tempt Eve to eat the forbidden fruit This word carries deep significance in biblical theology and Christian practice. Understanding this doctrine deepens our grasp of God's character and His plan for humanity's redemption. Church councils and creeds throughout history have carefully defined this teaching to preserve biblical truth."],
["Noah","Ark","Noah built the ark over many decades, preaching righteousness to a world that ignored his warnings about the coming flood. Noah's ark is a type (foreshadow) of Christ — just as the ark saved those inside from judgment, so Christ saves those who enter into faith in Him. The ark's dimensions (300x50x30 cubits) give it a 6:1 length-to-width ratio, which modern naval architects confirm is ideal for stability in rough seas.","Noah's ark was approximately 450 feet long, 75 feet wide, and 45 feet high — large enough to hold over 500 railroad cars worth of space. The ark is a picture of salvation — there was only one door to enter (Jesus said 'I am the door'), and God Himself shut it when the time of grace ended. The ark came to rest on the mountains of Ararat (modern Turkey), and explorers have searched for its remains for centuries, with several claimed sightings."],
["Flood","Abraham","The flood covered the entire earth for 150 days, and Noah's family spent over a year inside the ark before the ground was dry enough to leave. Jesus compared His second coming to the days of Noah — people were eating and drinking, unaware of coming judgment, until the flood swept them away (Matt 24:37-39). Over 200 cultures worldwide have ancient flood stories remarkably similar to Noah's account — from Mesopotamia to China to Native American traditions.","God called Abraham to leave his home in Ur and journey to an unknown land, promising to make him the father of a great nation. Abraham believed God's promise even when it seemed impossible, and this faith was 'credited to him as righteousness' (Genesis 15:6) — the foundation of salvation by faith. Abraham came from Ur of the Chaldees, a sophisticated city in modern-day Iraq with running water, libraries, and a massive ziggurat temple."],
["Isaac","Sacrifice","Isaac was the miracle son born to Abraham and Sarah when they were 100 and 90 years old — proving nothing is impossible with God. Abraham's willingness to sacrifice Isaac on Mount Moriah is the most powerful foreshadowing of God the Father offering His own Son on the cross. Isaac is the only patriarch who never left the Promised Land — even when there was famine, God told him to stay and He would bless him there.","In the Old Testament, animals were sacrificed to temporarily cover sins — Jesus' sacrifice on the cross permanently removed sins once and for all. The word 'sacrifice' comes from Latin 'sacri-facere' meaning 'to make sacred' — through Christ's sacrifice, believers are made holy and set apart for God. Abraham's near-sacrifice of Isaac on Mount Moriah happened on the same mountain ridge where Jesus would be crucified approximately 2,000 years later."],
["Jacob","Ladder","Jacob tricked his brother Esau out of his birthright and his father's blessing, then spent 20 years working for his uncle Laban as consequence. After wrestling with God all night at Peniel, Jacob's name was changed to Israel ('he who struggles with God'), and he walked with a limp for the rest of his life. Jacob fathered 12 sons who became the 12 tribes of Israel — the entire nation descended from one man's family.","The stairway to heaven Jacob saw in a dream with angels ascending and descending This word carries deep significance in biblical theology and Christian practice. This concept is foundational to Christian theology and has been debated and refined by scholars for centuries. Understanding this doctrine deepens our grasp of God's character and His plan for humanity's redemption."],
["Joseph","Coat","Joseph was sold into slavery by his jealous brothers but rose to become the second most powerful ruler in all of Egypt, saving nations from famine. Joseph is one of the clearest 'types' of Christ in the Old Testament — betrayed by his own, sold for silver, falsely accused, and raised to glory to save his people. Joseph was 30 years old when he became ruler of Egypt — the same age Jesus was when He began His public ministry.","The special garment of many colours Jacob gave to his son Joseph This word carries deep significance in biblical theology and Christian practice. This concept is foundational to Christian theology and has been debated and refined by scholars for centuries. Understanding this doctrine deepens our grasp of God's character and His plan for humanity's redemption."],
["Moses","Bush","Moses led the Israelites out of 400 years of slavery in Egypt and received the Ten Commandments directly from God on Mount Sinai. Moses is a 'type' of Christ — both were saved from death as infants, both fasted 40 days, both were mediators between God and His people. Moses had a speech impediment and tried to refuse God's call five times before finally agreeing to confront Pharaoh.","The burning bush through which God spoke to Moses on Mount Horeb This word carries deep significance in biblical theology and Christian practice. Understanding this doctrine deepens our grasp of God's character and His plan for humanity's redemption. Church councils and creeds throughout history have carefully defined this teaching to preserve biblical truth."],
["Pharaoh","Plague","The king of Egypt who refused to let the Israelites go free This word carries deep significance in biblical theology and Christian practice. This person's story is recorded in the Old Testament and has been studied by scholars for thousands of years. Their faith journey reveals important lessons about trusting God even in difficult circumstances.","The devastating judgments God sent upon Egypt to free His people This word carries deep significance in biblical theology and Christian practice. Church councils and creeds throughout history have carefully defined this teaching to preserve biblical truth. This concept is foundational to Christian theology and has been debated and refined by scholars for centuries."],
["Sea","Staff","The Red Sea that God parted for Israel to cross on dry ground Water imagery appears throughout Scripture as a symbol of both judgment and renewal. God frequently uses this element of nature throughout Scripture as a powerful symbol of spiritual truth. This appears at key turning points in the biblical narrative, marking moments of divine intervention.","Moses' rod that God used to perform mighty miracles and signs This word carries deep significance in biblical theology and Christian practice. God often used ordinary physical objects to teach extraordinary spiritual truths to His people. Archaeological finds have revealed what these items actually looked like in the ancient biblical world."],
["Tablet","Manna","The stone tablets on which God wrote the Ten Commandments This word carries deep significance in biblical theology and Christian practice. This item held deep symbolic meaning in biblical culture, pointing to spiritual realities beyond its physical form. God often used ordinary physical objects to teach extraordinary spiritual truths to His people.","The bread from heaven God provided daily for Israel in the wilderness This word carries deep significance in biblical theology and Christian practice. Their encounter with God's grace transformed their life and continues to inspire believers today. Early church historians like Eusebius and Josephus provide additional context about this figure's life and times."],
["David","Goliath","David defeated the giant Goliath with just a sling and a stone, then became Israel's greatest king and established Jerusalem as the capital. God called David 'a man after My own heart' (Acts 13:22) — not because he was sinless, but because he always returned to God in genuine repentance. David was likely a redhead — the Hebrew word used to describe him ('admoni') means ruddy or red-haired, unusual in the ancient Near East.","The massive Philistine warrior who defied Israel's army for forty days This word carries deep significance in biblical theology and Christian practice. Their faith journey reveals important lessons about trusting God even in difficult circumstances. Ancient Jewish tradition preserves additional details about this figure beyond what Scripture records."],
["Sling","Crown","The simple weapon David used to defeat the giant Goliath This word carries deep significance in biblical theology and Christian practice. Archaeological finds have revealed what these items actually looked like in the ancient biblical world. This item held deep symbolic meaning in biblical culture, pointing to spiritual realities beyond its physical form.","The Bible mentions five crowns believers can receive: the crown of life, crown of glory, crown of righteousness, crown incorruptible, and crown of rejoicing. Jesus wore a crown of thorns — thorns were part of the curse in Genesis 3, so by wearing them He was symbolically taking the curse of sin upon Himself. In Revelation 4:10, the 24 elders cast their crowns before God's throne — showing that every reward we receive ultimately belongs to and glorifies God."],
["Solomon","Temple","Solomon asked God for wisdom instead of wealth or power, and God was so pleased He gave him all three, making him the richest king on earth. Solomon's temple took 7 years to build using 180,000 workers, but he spent 13 years building his own palace — a subtle warning about misplaced priorities. Solomon composed 3,000 proverbs and 1,005 songs, yet only a fraction survive in Scripture through Proverbs, Ecclesiastes, and Song of Solomon.","Solomon's temple was overlaid with 20 tons of pure gold and took seven years to build using 180,000 workers from across the kingdom. When Jesus said 'Destroy this temple and I will raise it in three days,' He was speaking about His body — the ultimate temple where God dwells (John 2:19-21). The temple veil that tore from top to bottom at Jesus' death was 60 feet tall, 30 feet wide, and 4 inches thick — only God could have torn it."],
["Elijah","Fire","Elijah challenged 450 prophets of Baal on Mount Carmel, and God answered with fire from heaven that consumed the sacrifice, the altar, and even the water. Elijah appeared with Moses at the Transfiguration of Jesus (Matt 17), representing the Prophets just as Moses represented the Law. After his greatest victory on Carmel, Elijah fell into such deep depression he wanted to die — showing that even great prophets struggled with mental health.","God appeared to Moses in a burning bush that was not consumed, and led Israel as a pillar of fire by night during their wilderness journey. Fire in Scripture represents God's presence, purification, and judgment — it refines gold, consumes sacrifice, and will ultimately purify the earth. On the Day of Pentecost, tongues of fire rested on each believer — fire that empowers rather than destroys, marking the birth of the Spirit-filled church."],
["Chariot","Jonah","The fiery chariot that took Elijah up to heaven in a whirlwind This word carries deep significance in biblical theology and Christian practice. God often used ordinary physical objects to teach extraordinary spiritual truths to His people. Archaeological finds have revealed what these items actually looked like in the ancient biblical world.","Jonah tried to run from God by sailing in the opposite direction, was swallowed by a great fish, and spent three days inside before being vomited onto shore. Jesus directly compared Jonah's three days in the fish to His own three days in the tomb (Matt 12:40), making it a prophetic sign of the resurrection. Jonah is the only prophet who was angry that his preaching worked — he wanted Nineveh destroyed and was furious when the entire city repented."],
["Whale","Daniel","The great sea creature that swallowed Jonah for three days This word carries deep significance in biblical theology and Christian practice. This concept is foundational to Christian theology and has been debated and refined by scholars for centuries. Understanding this doctrine deepens our grasp of God's character and His plan for humanity's redemption.","Daniel was thrown into a den of hungry lions for praying to God, but God shut the lions' mouths and he emerged without a scratch. Daniel's prophecies in chapters 2, 7-12 outline world history from Babylon to the end times with remarkable accuracy, including the timing of the Messiah's coming. Daniel served faithfully under four different kings across two empires (Babylonian and Persian) — a career spanning over 70 years in government."],
["Lion","Esther","A powerful beast; Daniel was thrown into a den of lions This word carries deep significance in biblical theology and Christian practice. This concept is foundational to Christian theology and has been debated and refined by scholars for centuries. Understanding this doctrine deepens our grasp of God's character and His plan for humanity's redemption.","Queen Esther risked her life by approaching the king uninvited to save her people from Haman's plot to destroy all the Jews in Persia. The book of Esther is the only book in the Bible that never directly mentions God's name, yet His providential hand is visible in every event. The Jewish festival of Purim, still celebrated today, commemorates Esther's bravery and the miraculous deliverance of the Jewish people."],
["Queen","Cross","A female monarch; Esther became queen of Persia This word carries deep significance in biblical theology and Christian practice. Church councils and creeds throughout history have carefully defined this teaching to preserve biblical truth. This concept is foundational to Christian theology and has been debated and refined by scholars for centuries.","The cross was the most shameful form of execution in the Roman world — reserved for slaves and the worst criminals, designed to maximise pain and humiliation. What appeared to be Satan's greatest victory (killing God's Son) was actually God's master plan all along — the cross defeated sin, death, and the devil simultaneously. Crucifixion victims typically died from asphyxiation as their body weight made it impossible to breathe — they had to push up on the nails to take each breath."],
["Jesus","Manger","Jesus performed over 37 recorded miracles including turning water into wine, walking on water, and raising the dead. The name Jesus (Yeshua in Hebrew) literally means 'God saves' — His very name declares His mission to rescue humanity from sin. Jesus was likely a carpenter who worked with stone as well as wood, since the Greek word 'tekton' means craftsman of hard materials.","The feeding trough where baby Jesus was laid after His birth This word carries deep significance in biblical theology and Christian practice. God often used ordinary physical objects to teach extraordinary spiritual truths to His people. Archaeological finds have revealed what these items actually looked like in the ancient biblical world."],
["Star","Shepherd","The bright light that guided the wise men to baby Jesus This word carries deep significance in biblical theology and Christian practice. God frequently uses this element of nature throughout Scripture as a powerful symbol of spiritual truth. This appears at key turning points in the biblical narrative, marking moments of divine intervention.","Jesus called Himself the Good Shepherd who lays down His life for His sheep — in ancient Israel, shepherds literally slept across the door of the sheepfold to protect the flock. The shepherd metaphor reveals Jesus' intimate care — He calls each sheep by name, leads them to green pastures, and searches tirelessly for even one that is lost. Shepherds were considered the lowest social class in Israel, yet God chose shepherds to be the first to hear the announcement of Jesus' birth."],
["Lamb","Camel","Jesus is called the 'Lamb of God who takes away the sin of the world' (John 1:29) — connecting Him to the Passover lamb whose blood saved Israel in Egypt. A sacrificial lamb had to be without blemish or defect — Jesus lived a sinless life so He could be the perfect, unblemished sacrifice for all humanity. In Revelation, Jesus appears as both a Lion (power) and a Lamb (sacrifice) — the only time in literature where the hero conquers by being slain.","The large animal the wise men rode across the desert to find Jesus This word carries deep significance in biblical theology and Christian practice. Understanding this doctrine deepens our grasp of God's character and His plan for humanity's redemption. Church councils and creeds throughout history have carefully defined this teaching to preserve biblical truth."],
["Donkey","Miracle","The humble animal Jesus rode into Jerusalem on Palm Sunday This word carries deep significance in biblical theology and Christian practice. God often used ordinary physical objects to teach extraordinary spiritual truths to His people. Archaeological finds have revealed what these items actually looked like in the ancient biblical world.","Jesus performed at least 37 recorded miracles, but John 21:25 says if everything Jesus did were written down, the world could not contain the books. Jesus' first miracle was turning water into wine at a wedding — transforming the ordinary into the extraordinary, which is exactly what He does with human lives. The miracles of Jesus were never performed for show — each one was an act of compassion that also served as a 'sign' pointing to His divine identity."],
["Heal","Pray","To restore health; Jesus healed the blind, lame, and sick This word carries deep significance in biblical theology and Christian practice. Church councils and creeds throughout history have carefully defined this teaching to preserve biblical truth. This concept is foundational to Christian theology and has been debated and refined by scholars for centuries.","The Bible records over 650 prayers, and Jesus Himself prayed constantly — rising early in the morning, spending entire nights, and praying in His final hours. Prayer is not informing God of our needs (He already knows) but aligning our hearts with His will and deepening our relationship with Him. The longest prayer in the Bible is Solomon's dedication prayer for the temple (1 Kings 8), and the shortest is Peter's 'Lord, save me!' as he sank in the water."],
["Baptize","Peter","To immerse in water as a sign of faith and new life in Christ This word carries deep significance in biblical theology and Christian practice. This concept is foundational to Christian theology and has been debated and refined by scholars for centuries. Understanding this doctrine deepens our grasp of God's character and His plan for humanity's redemption.","Peter was a fisherman whom Jesus called to be a 'fisher of men' — he became the leader of the twelve apostles and the early church. Jesus renamed Simon as Peter (Petros/Cephas meaning 'rock'), declaring he would be the foundation stone on which the church would be built. Peter initially sank when walking on water because he looked at the waves instead of Jesus — a powerful metaphor for faith amidst life's storms."],
["Fish","Bread","Jesus called His disciples to be fishers of men This word carries deep significance in biblical theology and Christian practice. This concept is foundational to Christian theology and has been debated and refined by scholars for centuries. Understanding this doctrine deepens our grasp of God's character and His plan for humanity's redemption.","Jesus as the Bread of Life who feeds our spiritual hunger This word carries deep significance in biblical theology and Christian practice. This item held deep symbolic meaning in biblical culture, pointing to spiritual realities beyond its physical form. God often used ordinary physical objects to teach extraordinary spiritual truths to His people."],
["Wine","Tomb","Jesus turned water into wine at the wedding in Cana This word carries deep significance in biblical theology and Christian practice. Archaeological finds have revealed what these items actually looked like in the ancient biblical world. This item held deep symbolic meaning in biblical culture, pointing to spiritual realities beyond its physical form.","The sealed cave where Jesus' body was laid after crucifixion This word carries deep significance in biblical theology and Christian practice. Church councils and creeds throughout history have carefully defined this teaching to preserve biblical truth. This concept is foundational to Christian theology and has been debated and refined by scholars for centuries."],
["Rise","Angel","To come back to life; Jesus rose from the dead on the third day This word carries deep significance in biblical theology and Christian practice. Understanding this doctrine deepens our grasp of God's character and His plan for humanity's redemption. Church councils and creeds throughout history have carefully defined this teaching to preserve biblical truth.","Angels are powerful spiritual beings created by God to serve as messengers, protectors, and warriors — the Bible mentions them nearly 300 times. The word 'angel' comes from the Greek 'angelos' meaning 'messenger' — their primary role is to deliver God's messages and carry out His will. Angels don't have wings in most biblical descriptions — cherubim and seraphim do, but the angels who appeared to Abraham and the women at the tomb looked like ordinary men."],
["Mary","Gabriel","Mary was chosen by God to give birth to Jesus through the Holy Spirit, making her the most honoured woman in all of Scripture. Mary's song of praise, the Magnificat (Luke 1:46-55), reveals deep theological understanding of God's justice, mercy, and faithfulness to His promises. Mary was likely between 12-14 years old when the angel Gabriel appeared to her — the typical age for betrothal in first-century Jewish culture.","The archangel who announced to Mary that she would bear God's Son This word carries deep significance in biblical theology and Christian practice. Early church historians like Eusebius and Josephus provide additional context about this figure's life and times. This person lived during the time of Jesus or the early church in the first century AD."],

["Paul","Ship","Paul transformed from Christianity's fiercest persecutor to its greatest missionary, planting churches across the entire Roman Empire. Paul's theology of grace — that salvation comes through faith alone, not works — revolutionised religion and remains the heart of Protestant Christianity. Paul was likely under five feet tall, partially blind, and suffered from a mysterious 'thorn in the flesh' that God refused to remove (2 Cor 12:7-9).","The English word 'worship' comes from 'worth-ship' — declaring the worth and value of the one being praised. True worship is not about music style or location — Jesus told the Samaritan woman that God seeks worshippers who worship 'in spirit and in truth' (John 4:24). The first recorded act of worship in the Bible is Abel's offering in Genesis 4 — and it cost him his life when his brother Cain became jealous."],

["Sing","Ruth","The most common Greek word for sin is 'hamartia' which literally means 'to miss the mark' — like an archer's arrow falling short of the target. Sin entered the world through one man (Adam) and death through sin — but grace overflowed through one man (Christ) to bring life to all who believe (Romans 5). The Bible identifies three categories of sin: the lust of the flesh, the lust of the eyes, and the pride of life (1 John 2:16) — the same three temptations Satan used on Eve and on Jesus.","Ruth left her homeland of Moab to stay with her mother-in-law Naomi, famously saying 'Where you go I will go, your God will be my God.' Ruth's story illustrates the concept of the kinsman-redeemer — Boaz redeemed Ruth just as Christ redeems believers, paying the price to make us His own. Ruth was a Moabite (a traditionally enemy nation), yet she appears in the genealogy of Jesus — showing God's grace extends to all peoples. Many great hymns and sermons throughout church history have been inspired by this truth."],
["Boaz","Harvest","The wealthy landowner who redeemed and married Ruth This word carries deep significance in biblical theology and Christian practice. Their faith journey reveals important lessons about trusting God even in difficult circumstances. Ancient Jewish tradition preserves additional details about this figure beyond what Scripture records.","The gathering of crops; Ruth gleaned in the fields during harvest This word carries deep significance in biblical theology and Christian practice. This appears at key turning points in the biblical narrative, marking moments of divine intervention. The original Hebrew or Greek words used for this carry deeper meaning than the English translation suggests."],
["Samson","Hair","Samson had supernatural strength from God that allowed him to kill a lion with his bare hands, defeat 1,000 men with a donkey jawbone, and tear down a temple. Samson's story is a warning about squandering God-given gifts — his physical strength was unmatched, but his moral weakness led to his downfall. Samson is listed in the 'Hall of Faith' in Hebrews 11 despite his many failures, showing that God judges the heart and honours genuine faith even in flawed people.","The source of Samson's strength; Delilah had it cut off This word carries deep significance in biblical theology and Christian practice. This concept is foundational to Christian theology and has been debated and refined by scholars for centuries. Understanding this doctrine deepens our grasp of God's character and His plan for humanity's redemption."],
