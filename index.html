["Ark of the Covenant","Tabernacle","Noah's ark was approximately 450 feet long, 75 feet wide, and 45 feet high — large enough to hold over 500 railroad cars worth of space. The ark is a picture of salvation — there was only one door to enter (Jesus said 'I am the door'), and God Himself shut it when the time of grace ended. The ark came to rest on the mountains of Ararat (modern Turkey), and explorers have searched for its remains for centuries, with several claimed sightings.","The portable tent of meeting that served as God's dwelling place among Israel during their wilderness journey This was an important part of Israel's worship system established by God. Archaeological finds have revealed what these items actually looked like in the ancient biblical world. This item held deep symbolic meaning in biblical culture, pointing to spiritual realities beyond its physical form."],
["Widow","Orphan","A woman whose husband has died; God commands special care for widows in both testaments This word carries deep significance in biblical theology and Christian practice. Church councils and creeds throughout history have carefully defined this teaching to preserve biblical truth. This concept is foundational to Christian theology and has been debated and refined by scholars for centuries.","A child who has lost both parents; God calls Himself a father to the fatherless and defender of orphans This word carries deep significance in biblical theology and Christian practice. Church councils and creeds throughout history have carefully defined this teaching to preserve biblical truth. This concept is foundational to Christian theology and has been debated and refined by scholars for centuries."],
["Sacrifice","Offering","In the Old Testament, animals were sacrificed to temporarily cover sins — Jesus' sacrifice on the cross permanently removed sins once and for all. The word 'sacrifice' comes from Latin 'sacri-facere' meaning 'to make sacred' — through Christ's sacrifice, believers are made holy and set apart for God. Abraham's near-sacrifice of Isaac on Mount Moriah happened on the same mountain ridge where Jesus would be crucified approximately 2,000 years later.","A gift voluntarily presented to God in worship, thanksgiving, or dedication as an act of faithful devotion This was an important part of Israel's worship system established by God. Early Christians practiced this as a central part of their faith, often at great personal risk and sacrifice. This element of worship has deep roots in both Old and New Testament practice."],
["Blessing","Curse","The most common Greek word for sin is 'hamartia' which literally means 'to miss the mark' — like an archer's arrow falling short of the target. Sin entered the world through one man (Adam) and death through sin — but grace overflowed through one man (Christ) to bring life to all who believe (Romans 5). The Bible identifies three categories of sin: the lust of the flesh, the lust of the eyes, and the pride of life (1 John 2:16) — the same three temptations Satan used on Eve and on Jesus.","A declaration of harm or misfortune; the opposite of blessing, often the consequence of disobedience This word carries deep significance in biblical theology and Christian practice. Understanding this doctrine deepens our grasp of God's character and His plan for humanity's redemption. Church councils and creeds throughout history have carefully defined this teaching to preserve biblical truth."],
["Victory","Defeat","Triumphant success through God's mighty power over sin, death, Satan, and all spiritual enemies Spiritual warfare is a reality for every believer, and God provides the resources to stand firm. Understanding this doctrine deepens our grasp of God's character and His plan for humanity's redemption. Church councils and creeds throughout history have carefully defined this teaching to preserve biblical truth.","Failure or loss in battle; Israel experienced crushing defeat whenever they turned away from God in disobedience This word carries deep significance in biblical theology and Christian practice. Church councils and creeds throughout history have carefully defined this teaching to preserve biblical truth. This concept is foundational to Christian theology and has been debated and refined by scholars for centuries."],
["Battle","Shout","A conflict or fight against enemies; Scripture declares that the Lord fights our battles on our behalf Spiritual warfare is a reality for every believer, and God provides the resources to stand firm. Understanding this doctrine deepens our grasp of God's character and His plan for humanity's redemption. Church councils and creeds throughout history have carefully defined this teaching to preserve biblical truth.","A loud triumphant cry of praise or war; when Israel shouted at Jericho the massive walls collapsed completely This word carries deep significance in biblical theology and Christian practice. Church councils and creeds throughout history have carefully defined this teaching to preserve biblical truth. This concept is foundational to Christian theology and has been debated and refined by scholars for centuries."],
["Spirit","Wind","The Holy Spirit is the third person of the Trinity — not an impersonal force but a divine person who speaks, guides, comforts, and can be grieved. The Hebrew word for Spirit is 'ruach' which also means 'wind' and 'breath' — the Spirit is as essential to spiritual life as breath is to physical life. The Holy Spirit appeared as a dove at Jesus' baptism, as tongues of fire at Pentecost, and as a mighty rushing wind — showing He works in diverse ways.","A powerful symbol of the Spirit's movement; a mighty rushing wind filled the room at the Pentecost outpouring The Holy Spirit plays a vital role in the life of every believer, providing guidance, comfort, and power. God frequently uses this element of nature throughout Scripture as a powerful symbol of spiritual truth. This appears at key turning points in the biblical narrative, marking moments of divine intervention."],
["Flame","Tongue","Fire symbolizing God's holy presence, purifying power, and the consuming nature of His divine glory The Holy Spirit plays a vital role in the life of every believer, providing guidance, comfort, and power. This concept is foundational to Christian theology and has been debated and refined by scholars for centuries. Understanding this doctrine deepens our grasp of God's character and His plan for humanity's redemption.","Languages and speech; at Pentecost the disciples miraculously spoke in many tongues understood by all nations The Holy Spirit plays a vital role in the life of every believer, providing guidance, comfort, and power. Understanding this doctrine deepens our grasp of God's character and His plan for humanity's redemption. Church councils and creeds throughout history have carefully defined this teaching to preserve biblical truth."],
["Gift","Church","A supernatural spiritual ability given by the Holy Spirit to each believer for building up the body of Christ The Holy Spirit plays a vital role in the life of every believer, providing guidance, comfort, and power. Church councils and creeds throughout history have carefully defined this teaching to preserve biblical truth. This concept is foundational to Christian theology and has been debated and refined by scholars for centuries.","The worldwide community of believers united in Christ for worship, fellowship, mission, and mutual encouragement The early church demonstrated this through their bold witness and sacrificial love. Church councils and creeds throughout history have carefully defined this teaching to preserve biblical truth. This concept is foundational to Christian theology and has been debated and refined by scholars for centuries."],
["Disciple","Apostle","A committed follower and student of Jesus who learns His teachings and applies them to daily life The early church demonstrated this through their bold witness and sacrificial love. Understanding this doctrine deepens our grasp of God's character and His plan for humanity's redemption. Church councils and creeds throughout history have carefully defined this teaching to preserve biblical truth.","One specifically chosen and sent out with Christ's authority to establish churches and spread the gospel worldwide The early church demonstrated this through their bold witness and sacrificial love. Understanding this doctrine deepens our grasp of God's character and His plan for humanity's redemption. Church councils and creeds throughout history have carefully defined this teaching to preserve biblical truth."],
["Martyr","Crown","A courageous person who suffers death rather than deny their faith; Stephen was the first Christian martyr This word carries deep significance in biblical theology and Christian practice. Understanding this doctrine deepens our grasp of God's character and His plan for humanity's redemption. Church councils and creeds throughout history have carefully defined this teaching to preserve biblical truth.","The Bible mentions five crowns believers can receive: the crown of life, crown of glory, crown of righteousness, crown incorruptible, and crown of rejoicing. Jesus wore a crown of thorns — thorns were part of the curse in Genesis 3, so by wearing them He was symbolically taking the curse of sin upon Himself. In Revelation 4:10, the 24 elders cast their crowns before God's throne — showing that every reward we receive ultimately belongs to and glorifies God."],
["Eternal Life","Amen","Eternal life is not just living forever — Jesus defined it as knowing God personally: 'This is eternal life, that they know You' (John 17:3). The Bible says God has 'set eternity in the human heart' (Eccl 3:11) — there is an innate longing in every person for something beyond this temporary world. The Hebrew word 'olam' (eternal/everlasting) comes from a root meaning 'hidden' — eternity is a reality hidden from full human comprehension.","Amen means 'so be it' or 'truly' and is used to affirm the truth of what has been said — Jesus often began statements with 'Truly, truly (Amen, amen).' Jesus is called 'The Amen' in Revelation 3:14 — He is the faithful and true witness, the ultimate confirmation of all God's promises. Amen is another Hebrew word used universally across languages and religions — it has been spoken in worship for over 3,000 years. Many great hymns and sermons throughout church history have been inspired by this truth."],

// ─── MONETISATION ───
const VALID_CODES=['LOGOS2026','LIVINGWORD','FULLGAME50','ADVENT144','BLESSED777','PSALM2334','JOHN316GO','FAITHFULL','REDEEMED1','GRACE4ALL'];
function isPro(){return S.isPro}
function checkUnlock(){
  try{
    if(localStorage.getItem('ll_pro')==='1')S.isPro=true;
    // Load denomination packs — unlocked + active state
    DENOM_PACKS.forEach(p=>{
      p.unlocked=localStorage.getItem('ll_dp_'+p.id)==='1';
      // Active defaults to true when unlocked, but can be toggled off
      const activeKey='ll_dp_active_'+p.id;
      const stored=localStorage.getItem(activeKey);
      p.active=p.unlocked?(stored===null?true:stored==='1'):false;
    });
  }catch(e){}
}
function toggleDenomPack(id){
  const p=DENOM_PACKS.find(x=>x.id===id);
  if(!p||!p.unlocked)return;
  p.active=!p.active;
  try{localStorage.setItem('ll_dp_active_'+id,p.active?'1':'0')}catch(e){}
  render();
}
function unlockPro(code){
  const c=code.trim().toUpperCase();
  if(VALID_CODES.includes(c)){
    S.isPro=true;try{localStorage.setItem('ll_pro','1')}catch(e){}return true}
  for(const p of DENOM_PACKS){
    if(p.codes.includes(c)){p.unlocked=true;p.active=true;try{localStorage.setItem('ll_dp_'+p.id,'1');localStorage.setItem('ll_dp_active_'+p.id,'1')}catch(e){}return true}
  }
  return false;
}
function getWeekNumber(){const d=new Date(),j=new Date(d.getFullYear(),0,1);return Math.ceil(((d-j)/86400000+j.getDay()+1)/7)}
// Free tier limits per mode
function freeLimit(m){return m==='sing'?30:m==='act'?40:50}
function getWeeklyCards(full,mode){
  if(isPro())return full;
  const week=getWeekNumber(),n=full.length,count=Math.min(freeLimit(mode||'explain'),n),idx=[];
  let seed=week*7+13;
  for(let i=0;i<n;i++)idx.push(i);
  for(let i=n-1;i>0;i--){seed=(seed*1103515245+12345)&0x7fffffff;const j=seed%(i+1);[idx[i],idx[j]]=[idx[j],idx[i]]}
  return idx.slice(0,count).sort((a,b)=>a-b).map(i=>full[i]);
}
// Get cards for a mode, including active denomination cards
function gc(m){
  const base=m==='sing'?SING:m==='act'?ACT:EXPLAIN;
  let full=[...base];
  DENOM_PACKS.forEach(p=>{if(p.active){full=full.concat(p.cards)}});
  return getWeeklyCards(full,m);
}

let _allWordsCache=null;
function getAllWords(){
  if(_allWordsCache)return _allWordsCache;
  const all=[];
  [SING,ACT,EXPLAIN].forEach((deck,di)=>{
    const mode=['sing','act','explain'][di];
    deck.forEach(c=>{
      all.push({word:c[0],def:c[2],mode,diff:'easy'});
      all.push({word:c[1],def:c[3],mode,diff:'challenge'});
    });
  });
  all.sort((a,b)=>a.word.localeCompare(b.word));
  // Remove duplicates by word
  const seen=new Set();
  _allWordsCache=all.filter(w=>{if(seen.has(w.word))return false;seen.add(w.word);return true});
  return _allWordsCache;
}

function vibrate(ms){try{if(!S.muted&&navigator.vibrate)navigator.vibrate(ms)}catch(e){}}
function ensureAudio(){try{if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();if(actx.state==='suspended')actx.resume()}catch(e){}}
function beep(t){
  if(S.muted)return;
  try{ensureAudio();const c=actx;if(!c)return;
    if(t==='correct'){
      // Warm major chord chime (C-E-G) with detuning for richness
      [523,659,784].forEach((f,i)=>{
        const o=c.createOscillator(),o2=c.createOscillator(),g=c.createGain();
        o.connect(g);o2.connect(g);g.connect(c.destination);
        g.gain.value=.04;o.frequency.value=f;o2.frequency.value=f*1.003;
        o.type='sine';o2.type='sine';
        o.start(c.currentTime+i*.04);o2.start(c.currentTime+i*.04);
        g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.4+i*.04);
        o.stop(c.currentTime+.45+i*.04);o2.stop(c.currentTime+.45+i*.04);
      });vibrate(50)
    }
    else if(t==='skip'){
      const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);
      g.gain.value=.04;o.frequency.value=400;o.type='triangle';o.start();
      o.frequency.linearRampToValueAtTime(200,c.currentTime+.2);
      g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.25);o.stop(c.currentTime+.3)
    }
    else if(t==='timesup'){
      // Deep dramatic gavel hits
      [180,170,160].forEach((f,i)=>{
        const o=c.createOscillator(),o2=c.createOscillator(),g=c.createGain();
        o.connect(g);o2.connect(g);g.connect(c.destination);
        g.gain.value=.06;o.frequency.value=f;o2.frequency.value=f*2;o2.type='sine';
        o.type='triangle';o.start(c.currentTime+i*.25);o2.start(c.currentTime+i*.25);
        g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.5+i*.25);
        o.stop(c.currentTime+.55+i*.25);o2.stop(c.currentTime+.55+i*.25);
      });vibrate([100,50,100,50,200])
    }
    else if(t==='penalty'){
      // Warbling buzzer
      const o=c.createOscillator(),o2=c.createOscillator(),g=c.createGain();
      o.connect(g);o2.connect(g);g.connect(c.destination);
      g.gain.value=.05;o.frequency.value=148;o2.frequency.value=152;
      o.type='square';o2.type='square';o.start();o2.start();
      g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.3);
      o.stop(c.currentTime+.35);o2.stop(c.currentTime+.35);vibrate([200,100,200])
    }
    else if(t==='countdown'||t==='tick'){
      // Woody tick with harmonic
      const o=c.createOscillator(),o2=c.createOscillator(),g=c.createGain();
      o.connect(g);o2.connect(g);g.connect(c.destination);
      g.gain.value=.035;o.frequency.value=440;o2.frequency.value=880;
      o.type='sine';o2.type='sine';
      g.gain.setValueAtTime(.035,c.currentTime);
      o.start();o2.start();
      g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.12);
      o.stop(c.currentTime+.15);o2.stop(c.currentTime+.15);vibrate(20)
    }
    else if(t==='go'){
      // Triumphant ascending fanfare with sweep
      [440,554,659,880].forEach((f,i)=>{
        const o=c.createOscillator(),o2=c.createOscillator(),g=c.createGain();
        o.connect(g);o2.connect(g);g.connect(c.destination);
        g.gain.value=.05;o.frequency.value=f;o2.frequency.value=f*1.005;
        o.type='sine';o2.type='sine';
        o.start(c.currentTime+i*.06);o2.start(c.currentTime+i*.06);
        g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.4+i*.06);
        o.stop(c.currentTime+.45+i*.06);o2.stop(c.currentTime+.45+i*.06);
      });vibrate(80)
    }
    else if(t==='victory'){
      // Victory fanfare — ascending C-D-E-G-C
      [523,587,659,784,1047].forEach((f,i)=>{
        const o=c.createOscillator(),o2=c.createOscillator(),g=c.createGain();
        o.connect(g);o2.connect(g);g.connect(c.destination);
        g.gain.value=.04;o.frequency.value=f;o2.frequency.value=f*1.002;
        o.type='sine';o2.type='sine';
        o.start(c.currentTime+i*.12);o2.start(c.currentTime+i*.12);
        g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.5+i*.12);
        o.stop(c.currentTime+.55+i*.12);o2.stop(c.currentTime+.55+i*.12);
      });vibrate([50,30,50,30,100])
    }
    else{const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);g.gain.value=.04;o.frequency.value=660;o.type='sine';o.start();g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.2);o.stop(c.currentTime+.25)}
  }catch(e){}
}

function nextC(){
  const used=getUsed();
  used.add(S.ci);
  const deck=S.cards;
  // Check if all cards in current deck have been used
  if(used.size>=deck.length&&!isPro()){
    // Free user has exhausted their weekly cards - show upgrade prompt
    clearAllTimers();releaseWake();
    S.screen='cards-exhausted';render();return;
  }
  let next=S.ci+1;
  let attempts=0;
  while(used.has(next)&&attempts<deck.length){next=(next+1)%deck.length;attempts++}
  if(attempts>=deck.length){used.clear();next=(S.ci+1)%deck.length}
  S.ci=next;S.cardDiff=S.diff;S.diffLocked=false;
}

    if(S.showSolo){

            </div>
            <div style="font-family:'Lora',serif;font-size:11px;color:var(--wood-light);font-style:italic;margin-top:6px">
              Unlock all ${(SING.length+ACT.length+EXPLAIN.length)*2} words for unlimited solo practice!

          </div></div>

        const deck=S.cards;const card=deck[S.soloCi];
        const word=card?card[S.cardDiff==='easy'?0:1]:'';
        const def=card?card[S.cardDiff==='easy'?2:3]:'';

        h=`<div class="screen" style="animation:slideRight .3s"><div class="content" style="gap:8px">

            <span style="font-family:'Cinzel',serif;font-size:11px;color:var(--gold-light);letter-spacing:2px">🎯 SOLO · ${mL(S.soloMode)}</span>
            <div style="display:flex;gap:4px">

            <div style="font-family:'Cinzel',serif;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:${mColHex(S.soloMode)};font-weight:700;opacity:.8">${S.cardDiff==='easy'?'Easy':'Challenge'}</div>
            <div class="gold-line" style="width:50px"></div>
            <div class="big-word" style="font-size:${fs}px">${word}</div>
            ${S.soloRevealed?`<div class="gold-line" style="width:50px"></div>
            <div style="font-family:'Lora',serif;font-size:12px;color:var(--wood-light);line-height:1.5;font-style:italic;padding:8px 12px;text-align:center;max-width:320px">${def}</div>`:''}
          </div>
          <div style="display:flex;gap:6px;width:100%">
            <button onclick="S.cardDiff=S.cardDiff==='easy'?'challenge':'easy';render()" class="btn-wood" style="flex:1;text-align:center;font-size:11px">${S.cardDiff==='easy'?'⬆ Challenge':'⬇ Easy'}</button>
            ${!S.soloRevealed?`<button onclick="soloReveal()" class="btn-gold" style="flex:2;text-align:center;font-size:13px">👁 Show Explanation</button>`
              :`<button onclick="soloNext()" class="btn-gold" style="flex:2;text-align:center;font-size:13px">Next Word →</button>`}
          </div>
        </div></div>`;
      }
    }

    // Modals
    if(S.rules)h+=rulesModal();
    if(S.showAbout)h+=aboutModal();
    if(S.showExit)h+=exitModal();
    if(S.showTutorial)h+=tutorialModal();
    if(S.showLearning)h+=learningModal();
    if(S.showJoin)h+=joinModal();
    if(S.showUnlock)h+=unlockModal();
    if(S.showRequestFree)h+=requestFreeModal();
    if(S.defWord)h+=defCardHTML(S.defWord,S.defDef);
    if(S.paused&&inGame){h+=`<div class="pause-overlay"><div style="font-family:'Almendra',serif;font-size:36px;color:var(--gold-light)">Paused</div><div style="font-family:'Lora',serif;font-size:13px;color:var(--parchment-deep);font-style:italic">${S.screen==='sing-reveal'?'':'Word hidden'}</div><button class="btn-gold" onclick="togglePause()" style="padding:14px 34px;font-size:17px">▶ Resume</button></div>`}

    if(S.roomCode&&S.role==='host'&&inGame){h+=`<div style="position:fixed;bottom:8px;left:50%;transform:translateX(-50%);z-index:40;padding:4px 12px;border-radius:4px;background:var(--wood-dark);font-family:'Cinzel',serif;font-size:10px;color:var(--gold-light);opacity:.7">Room: ${S.roomCode}</div>`}

    app.innerHTML=h;
  }catch(e){
    document.getElementById('app').innerHTML=`<div class="screen"><div class="content" style="gap:16px;text-align:center"><div style="font-size:48px">⚠️</div><div style="font-family:'Cinzel',serif;font-size:18px;color:var(--gold-light)">Something went wrong</div><button class="btn-gold" onclick="resetGame()">Restart</button></div></div>`;
  }
}

function tutorialModal(){
  const steps=[

    {icon:'🎴',title:'Choose Your Battle',text:'🎵 Sing-Off: Sing a song with the word. 🎭 Act: One word + gestures. 💬 Explain: Describe freely. 🏆 Championship: All three combined!'},
    {icon:'⏳',title:'Beat the Clock!',text:'60 seconds for Act & Explain. Sing-Off gives each team 10 seconds per song in a 120-second round. Every second counts!'},

    <div style="display:flex;padding:0 14px 14px;gap:8px">

function joinAsTeam(team){
  const input=document.getElementById('joinCodeInput');
  const code=input?input.value.trim():'';

function submitFreeRequest(){
  const name=document.getElementById('reqName')?.value?.trim()||'';
  const contact=document.getElementById('reqContact')?.value?.trim()||'';
  const church=document.getElementById('reqChurch')?.value?.trim()||'';
  const pack=document.getElementById('reqPack')?.value||'';
  const reason=document.getElementById('reqReason')?.value?.trim()||'';
  if(!name||!contact){alert('Please enter your name and contact details.');return}
  if(!reason){alert('Please explain why you need free access.');return}
  // Compose message for sharing via native share or clipboard
  const msg=`Fellowship Face-Off — Free Access Request\n\nName: ${name}\nContact: ${contact}\nChurch: ${church}\nPack: ${pack||'Not specified'}\nReason: ${reason}`;
  if(navigator.share){
    navigator.share({title:"Fellowship Face-Off — Free Access Request",text:msg}).then(()=>{
      S.showRequestFree=false;render();
      alert('Request sent! We\'ll review and get back to you with an unlock code.');

      copyAndConfirm(msg);
    });
  } else {

  }

function copyAndConfirm(msg){
  if(navigator.clipboard){
    navigator.clipboard.writeText(msg).then(()=>{
      S.showRequestFree=false;render();
      alert('Request copied to clipboard! Please paste it in an email or message to the developer.');
    }).catch(()=>{alert('Please screenshot this form and send to the developer.')});
  } else {

  }
}

let unlockAttempts=0;let unlockLockout=0;
function tryUnlock(){
  // Rate limit: max 5 attempts per 60 seconds
  const now=Date.now();
  if(now<unlockLockout){
    const secs=Math.ceil((unlockLockout-now)/1000);
    alert('Too many attempts. Please wait '+secs+' seconds.');return;
  }
  const input=document.getElementById('unlockCodeInput');
  const code=input?input.value.trim():'';
  if(!code)return;
  if(unlockPro(code)){
    unlockAttempts=0;
    S.showUnlock=false;render();
    setTimeout(()=>{alert('🎉 Unlocked successfully! Enjoy your new content.')},100);
  } else {
    unlockAttempts++;
    if(unlockAttempts>=5){unlockLockout=now+60000;unlockAttempts=0}
    const err=document.getElementById('unlockError');
    if(err)err.style.display='block';
  }
}

// Faith Library filter
function filterLibrary(letter){
  const search=document.getElementById('libSearch');
  const chips=document.querySelectorAll('#libWords .word-chip');
  const query=letter&&letter!=='ALL'?null:(search?search.value.trim().toLowerCase():'');
  chips.forEach(c=>{
    const word=c.getAttribute('data-word')||'';
    if(letter&&letter!=='ALL'){
      c.style.display=word[0].toUpperCase()===letter?'':'none';
    } else if(query){
      c.style.display=word.toLowerCase().includes(query)?'':'none';
    } else {
      c.style.display='';
    }
  });
  if(letter&&search)search.value='';
}

function startGame(){
  saveTeamNames();
  if(S.mode==='mix'){
    // Championship: build round sequence
    S.champPhase=0;S.champPhaseRound=0;
    S.champTotalA=0;S.champTotalB=0;S.champScores=[];
    const totalRounds=S.champSing+S.champAct+S.champExplain;
    S.rounds=totalRounds;S.round=1;
    // Build the sequence of modes
    S.mixModes=[];
    for(let i=0;i<S.champSing;i++)S.mixModes.push('sing');
    for(let i=0;i<S.champAct;i++)S.mixModes.push('act');
    for(let i=0;i<S.champExplain;i++)S.mixModes.push('explain');
    S.champPhase=0;
    const am=S.mixModes[0];
    S.cards=shuffle(gc(am));S.ci=0;
  } else {
    const am=S.mode;
    S.cards=shuffle(gc(am));S.ci=0;
  }
  S.sA=0;S.sB=0;S.team='A';S.round=1;
  S.cardDiff=S.diff;S.diffLocked=false;S.paused=false;
  S.gameStartTime=Date.now();usedByMode={sing:new Set(),act:new Set(),explain:new Set()};
  S.role='host';startHosting();goFullscreen();
  resetTurnStats();pushState();S.screen='card-front';render();
}

function animScore(txt,color,left){
  setTimeout(()=>{
    const el=document.getElementById('scoreAnim');
    if(el){
      el.style.display='block';el.style.left=left;el.style.transform='translateX(-50%)';
      el.textContent=txt;el.style.color=color;el.style.fontSize='32px';
      el.style.animation='none';el.offsetHeight;
      el.style.animation='scoreBurst .3s ease-out forwards, scoreFloat 1s ease-out .2s forwards';
      setTimeout(()=>{if(el)el.style.display='none'},1200);
    }
    // Sparkle particles on correct

  },50);
}
function spawnSparkles(left){
  const container=document.getElementById('scoreAnim');if(!container)return;
  const parent=container.parentElement;if(!parent)return;
  for(let i=0;i<6;i++){
    const s=document.createElement('div');
    const angle=(i/6)*360;const rad=angle*Math.PI/180;
    const x=Math.cos(rad)*30;const y=Math.sin(rad)*30;
    s.style.cssText=`position:absolute;top:40%;left:${left};width:6px;height:6px;background:var(--gold-light);border-radius:50%;z-index:6;pointer-events:none;transform:translate(-50%,-50%);animation:sparkle .5s ease-out ${i*0.05}s forwards`;
    s.style.setProperty('--tx',x+'px');s.style.setProperty('--ty',y+'px');
    parent.appendChild(s);
    setTimeout(()=>s.remove(),600);
  }
}

function endTurn(){
  clearAllTimers();releaseWake();
  if(S.team==='A'){S.team='B';resetTurnStats();S.screen='card-front'}
  else{
    if(S.round>=S.rounds){
      // Championship: accumulate scores
      if(S.mode==='mix'){
        S.champTotalA+=S.sA;S.champTotalB+=S.sB;
        S.champScores.push({phase:getActiveMode(),sA:S.sA,sB:S.sB});
      }
      logGame();beep('victory');S.screen='gameover';
      // Post-game share nudge after 3 seconds
      setTimeout(()=>{
        if(S.screen==='gameover'){
          const nudge=document.getElementById('shareNudge');
          if(nudge)nudge.style.display='flex';
        }
      },3000);
    }
    else{
      S.round++;S.team='A';resetTurnStats();
      if(S.mode==='mix'){
        // Championship: save current phase scores and move to next
        const prevMode=getActiveMode();
        S.champTotalA+=S.sA;S.champTotalB+=S.sB;
        S.champScores.push({phase:prevMode,sA:S.sA,sB:S.sB});
        // Check if moving to next mode phase
        const prevPhase=S.champPhase;
        S.champPhase=S.round-1; // 0-indexed position in mixModes
        if(S.mixModes[S.champPhase]!==prevMode){
          // New mode phase — reset round scores, load new cards
          S.sA=0;S.sB=0;
          S.cards=shuffle(gc(getActiveMode()));S.ci=0;
        }
      }
      S.screen='card-front';
    }
  }render();
}

// ─── v9: SCORE CARD IMAGE ───
function generateScoreCard(){
  try{
    const c=document.createElement('canvas');c.width=1080;c.height=1080;
    const x=c.getContext('2d');
    // Green felt background
    x.fillStyle='#1B4D2E';x.fillRect(0,0,1080,1080);
    // Parchment card
    x.fillStyle='#F5E6C8';x.beginPath();x.roundRect(60,60,960,960,24);x.fill();
    // Wood border
    x.strokeStyle='#5C3A1E';x.lineWidth=6;x.beginPath();x.roundRect(60,60,960,960,24);x.stroke();
    // Gold inner border
    x.strokeStyle='#C8963E';x.lineWidth=2;x.beginPath();x.roundRect(80,80,920,920,18);x.stroke();
    // Gold corner ornaments
    const corners=[[95,95],[985,95],[95,985],[985,985]];
    x.strokeStyle='#C8963E';x.lineWidth=3;
    corners.forEach(([cx,cy],i)=>{
      x.beginPath();
      if(i===0){x.moveTo(cx,cy+20);x.lineTo(cx,cy);x.lineTo(cx+20,cy)}
      if(i===1){x.moveTo(cx-20,cy);x.lineTo(cx,cy);x.lineTo(cx,cy+20)}
      if(i===2){x.moveTo(cx,cy-20);x.lineTo(cx,cy);x.lineTo(cx+20,cy)}
      if(i===3){x.moveTo(cx-20,cy);x.lineTo(cx,cy);x.lineTo(cx,cy-20)}
      x.stroke();
    });
    // Title
    x.fillStyle='#3B2210';x.font='bold 52px serif';x.textAlign='center';
    x.fillText('Fellowship Face-Off',540,160);
    // Gold divider
    const grd=x.createLinearGradient(240,180,840,180);
    grd.addColorStop(0,'transparent');grd.addColorStop(0.3,'#C8963E');grd.addColorStop(0.5,'#E8B84A');grd.addColorStop(0.7,'#C8963E');grd.addColorStop(1,'transparent');
    x.strokeStyle=grd;x.lineWidth=3;x.beginPath();x.moveTo(240,185);x.lineTo(840,185);x.stroke();
    // Subtitle
    x.font='italic 22px serif';x.fillStyle='#8B5E34';
    x.fillText('The Great Christian Multiplayer Game',540,220);
    // Scores
    const isChamp=S.mode==='mix';
    const tA=isChamp?S.champTotalA:S.sA;const tB=isChamp?S.champTotalB:S.sB;
    const w=tA>tB?'A':tB>tA?'B':null;
    // Team A panel
    x.fillStyle='rgba(43,108,176,.1)';x.beginPath();x.roundRect(120,270,380,280,16);x.fill();
    x.strokeStyle='#2B6CB0';x.lineWidth=3;x.beginPath();x.roundRect(120,270,380,280,16);x.stroke();
    x.fillStyle='#2B6CB0';x.font='bold 28px serif';x.fillText(sanitize(S.nameA),310,320);
    x.font='bold 120px serif';x.fillText(String(tA),310,440);
    // Team B panel
    x.fillStyle='rgba(197,48,48,.1)';x.beginPath();x.roundRect(580,270,380,280,16);x.fill();
    x.strokeStyle='#C53030';x.lineWidth=3;x.beginPath();x.roundRect(580,270,380,280,16);x.stroke();
    x.fillStyle='#C53030';x.font='bold 28px serif';x.fillText(sanitize(S.nameB),770,320);
    x.font='bold 120px serif';x.fillText(String(tB),770,440);
    // VS circle
    x.fillStyle='#3B2210';x.beginPath();x.arc(540,400,36,0,Math.PI*2);x.fill();
    x.fillStyle='#C8963E';x.font='bold 28px serif';x.fillText('VS',540,410);
    // Winner banner
    x.fillStyle='#C8963E';x.beginPath();x.roundRect(200,590,680,70,12);x.fill();
    x.fillStyle='#3B2210';x.font='bold 32px serif';
    x.fillText(w?('🏆 '+sanitize(w==='A'?S.nameA:S.nameB)+' Wins!'):"It's a Tie!",540,638);
    // Mode + rounds
    x.font='italic 22px serif';x.fillStyle='#5C3A1E';
    x.fillText(mL(S.mode)+' · '+S.rounds+' rounds',540,710);
    // Championship breakdown
    if(isChamp&&S.champScores.length){
      let cy=760;
      S.champScores.forEach(sc=>{
        const icon=sc.phase==='sing'?'Sing-Off':sc.phase==='act'?'Act It Out':'Explain';
        x.font='18px serif';x.fillStyle='#5C3A1E';x.textAlign='left';
        x.fillText(icon,200,cy);
        x.textAlign='right';x.fillText(sc.sA+' — '+sc.sB,880,cy);
        cy+=35;
      });
      x.textAlign='center';
    }
    // Footer with CTA
    x.font='bold 20px serif';x.fillStyle='#1B4D2E';
    x.fillText('Can you beat this score? Download Fellowship Face-Off!',540,980);
    x.font='16px serif';x.fillStyle='#8B5E34';
    x.fillText(location.href,540,1010);
    return c.toDataURL('image/png');
  }catch(e){return null}
}

}

  const was=isLandscape;
  isLandscape=window.innerWidth>window.innerHeight&&window.innerHeight<500;
  document.body.classList.toggle('landscape',isLandscape);
  if(was!==isLandscape)render();
}
window.addEventListener('resize',checkOrientation);
window.addEventListener('orientationchange',()=>setTimeout(checkOrientation,100));
checkOrientation();

// Fullscreen API — enter fullscreen when game starts for max screen space
function goFullscreen(){
  try{
    const el=document.documentElement;
    if(el.requestFullscreen)el.requestFullscreen();
    else if(el.webkitRequestFullscreen)el.webkitRequestFullscreen();
    // Lock to current orientation if possible
    if(screen.orientation&&screen.orientation.lock){screen.orientation.lock(isLandscape?'landscape':'portrait').catch(()=>{})}
  }catch(e){}
}
function exitFullscreen(){
  try{if(document.fullscreenElement){document.exitFullscreen()}else if(document.webkitFullscreenElement){document.webkitExitFullscreen()}}catch(e){}
}

render();

if('serviceWorker'in navigator){
  navigator.serviceWorker.register('sw.js').then(reg=>{
    reg.addEventListener('updatefound',()=>{
      const nw=reg.installing;
      nw.addEventListener('statechange',()=>{
        if(nw.state==='installed'&&navigator.serviceWorker.controller){
          const b=document.createElement('div');b.className='install-banner';b.onclick=()=>location.reload();
          b.innerHTML='<div class="install-inner"><div style="flex:1;color:var(--parchment);font-family:Cinzel,serif;font-size:13px">🆕 Update available</div><button class="btn-gold" style="padding:8px 14px;font-size:12px">Refresh</button></div>';
          document.body.appendChild(b);
        }
      });
    });
    // Request push notification permission after 3rd open
    const opens=parseInt(localStorage.getItem('ll_opens')||'0');
    if(opens>=3&&'Notification'in window&&Notification.permission==='default'){
      setTimeout(()=>{Notification.requestPermission().then(p=>{
        if(p==='granted'&&reg.active){
          // Schedule weekly reminder via SW
          try{reg.showNotification('Fellowship Face-Off',{body:'New cards are ready! Come play this weeks words.',icon:'icon-192.png',badge:'icon-192.png',tag:'weekly'})}catch(e){}
        }
      })},5000);
    }
  }).catch(()=>{});
}

</script>
