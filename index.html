["Adam","Garden of Eden","Adam was the first human, formed from the dust of the ground and given life by God's own breath in the Garden of Eden. Paul calls Jesus the 'second Adam' (1 Cor 15:45) — where the first Adam brought death through disobedience, Christ brings life through obedience. The Hebrew word 'adam' simply means 'man' or 'humanity' and comes from 'adamah' meaning 'ground' or 'red earth.'","The paradise with the tree of life where God placed Adam and Eve "+F[18]+" "+F[19]+" "+F[8]+""],
["Eve","Burning Bush","Eve was the first woman, created from Adam's rib to be his equal partner and companion in the Garden of Eden. Eve's creation from Adam's side symbolises equality — not from his head to rule over him, nor from his feet to be trampled, but from his side to be his equal. The name Eve (Chavah in Hebrew) means 'life-giver' or 'mother of all living' — given to her by Adam after the Fall.","The bush on fire but not consumed where God spoke to Moses (Exodus 3) "+F[1]+" "+F[2]+" "+F[10]+""],
["Noah","Red Sea","Noah built the ark over many decades, preaching righteousness to a world that ignored his warnings about the coming flood. Noah's ark is a type (foreshadow) of Christ — just as the ark saved those inside from judgment, so Christ saves those who enter into faith in Him. The ark's dimensions (300x50x30 cubits) give it a 6:1 length-to-width ratio, which modern naval architects confirm is ideal for stability in rough seas.","The body of water God parted so Israel could escape Egypt on dry ground "+F[20]+" "+F[17]+" "+F[22]+""],
["Ark","Ten Commandments","Noah's ark was approximately 450 feet long, 75 feet wide, and 45 feet high — large enough to hold over 500 railroad cars worth of space. The ark is a picture of salvation — there was only one door to enter (Jesus said 'I am the door'), and God Himself shut it when the time of grace ended. The ark came to rest on the mountains of Ararat (modern Turkey), and explorers have searched for its remains for centuries, with several claimed sightings.","The moral law God wrote on stone tablets and gave to Moses on Sinai "+F[2]+" "+F[0]+" "+F[7]+""],
["Abraham","Golden Calf","God called Abraham to leave his home in Ur and journey to an unknown land, promising to make him the father of a great nation. Abraham believed God's promise even when it seemed impossible, and this faith was 'credited to him as righteousness' (Genesis 15:6) — the foundation of salvation by faith. Abraham came from Ur of the Chaldees, a sophisticated city in modern-day Iraq with running water, libraries, and a massive ziggurat temple.","The idol the Israelites made from gold jewelry while Moses was on the mountain "+F[1]+" "+F[2]+" "+F[9]+""],
["Isaac","Jericho Walls","Isaac was the miracle son born to Abraham and Sarah when they were 100 and 90 years old — proving nothing is impossible with God. Abraham's willingness to sacrifice Isaac on Mount Moriah is the most powerful foreshadowing of God the Father offering His own Son on the cross. Isaac is the only patriarch who never left the Promised Land — even when there was famine, God told him to stay and He would bless him there.","The fortified walls that collapsed when Israel marched and shouted "+F[18]+" "+F[19]+" "+F[8]+""],
["Jacob","Sling and Stone","Jacob tricked his brother Esau out of his birthright and his father's blessing, then spent 20 years working for his uncle Laban as consequence. After wrestling with God all night at Peniel, Jacob's name was changed to Israel ('he who struggles with God'), and he walked with a limp for the rest of his life. Jacob fathered 12 sons who became the 12 tribes of Israel — the entire nation descended from one man's family.","The simple weapon young David used to defeat the giant Goliath "+F[29]+" "+F[15]+" "+F[14]+""],
["Joseph","Coat of Many Colors","Joseph was sold into slavery by his jealous brothers but rose to become the second most powerful ruler in all of Egypt, saving nations from famine. Joseph is one of the clearest 'types' of Christ in the Old Testament — betrayed by his own, sold for silver, falsely accused, and raised to glory to save his people. Joseph was 30 years old when he became ruler of Egypt — the same age Jesus was when He began His public ministry.","The special multicoloured garment Jacob gave to his favourite son Joseph "+F[1]+" "+F[2]+" "+F[11]+""],
["Moses","Manger","Moses led the Israelites out of 400 years of slavery in Egypt and received the Ten Commandments directly from God on Mount Sinai. Moses is a 'type' of Christ — both were saved from death as infants, both fasted 40 days, both were mediators between God and His people. Moses had a speech impediment and tried to refuse God's call five times before finally agreeing to confront Pharaoh.","The animal feeding trough where baby Jesus was laid in Bethlehem "+F[14]+" "+F[16]+" "+F[9]+""],
["Pharaoh","Star of Bethlehem","The Egyptian king who enslaved Israel and refused to let them go "+F[5]+" "+F[3]+" "+F[6]+"","The bright heavenly light that guided the wise men to find baby Jesus "+F[21]+" "+F[18]+" "+F[8]+""],
["David","Last Supper","David defeated the giant Goliath with just a sling and a stone, then became Israel's greatest king and established Jerusalem as the capital. God called David 'a man after My own heart' (Acts 13:22) — not because he was sinless, but because he always returned to God in genuine repentance. David was likely a redhead — the Hebrew word used to describe him ('admoni') means ruddy or red-haired, unusual in the ancient Near East.","The final meal Jesus shared with His disciples before His crucifixion "+F[2]+" "+F[0]+" "+F[6]+""],
["Goliath","Good Samaritan","The massive Philistine champion defeated by young David "+F[3]+" "+F[4]+" "+F[13]+"","The man in Jesus' parable who helped a wounded stranger on the road "+F[2]+" "+F[0]+" "+F[7]+""],
["Solomon","Prodigal Son","Solomon asked God for wisdom instead of wealth or power, and God was so pleased He gave him all three, making him the richest king on earth. Solomon's temple took 7 years to build using 180,000 workers, but he spent 13 years building his own palace — a subtle warning about misplaced priorities. Solomon composed 3,000 proverbs and 1,005 songs, yet only a fraction survive in Scripture through Proverbs, Ecclesiastes, and Song of Solomon.","The wayward son in Jesus' parable who wasted his inheritance then returned home "+F[16]+" "+F[15]+" "+F[6]+""],
["Jesus","Tower of Babel","Jesus performed over 37 recorded miracles including turning water into wine, walking on water, and raising the dead. The name Jesus (Yeshua in Hebrew) literally means 'God saves' — His very name declares His mission to rescue humanity from sin. Jesus was likely a carpenter who worked with stone as well as wood, since the Greek word 'tekton' means craftsman of hard materials.","The tower humans built trying to reach heaven before God confused their languages "+F[4]+" "+F[5]+" "+F[6]+""],
["Mary","Cain and Abel","Mary was chosen by God to give birth to Jesus through the Holy Spirit, making her the most honoured woman in all of Scripture. Mary's song of praise, the Magnificat (Luke 1:46-55), reveals deep theological understanding of God's justice, mercy, and faithfulness to His promises. Mary was likely between 12-14 years old when the angel Gabriel appeared to her — the typical age for betrothal in first-century Jewish culture.","The first two sons of Adam and Eve; one murdered the other out of jealousy "+F[5]+" "+F[3]+" "+F[13]+""],
["Angel","Sarah","Angels are powerful spiritual beings created by God to serve as messengers, protectors, and warriors — the Bible mentions them nearly 300 times. The word 'angel' comes from the Greek 'angelos' meaning 'messenger' — their primary role is to deliver God's messages and carry out His will. Angels don't have wings in most biblical descriptions — cherubim and seraphim do, but the angels who appeared to Abraham and the women at the tomb looked like ordinary men.","Abraham's wife who laughed when told she would bear a son in old age "+F[36]+" "+F[5]+" "+F[3]+""],
["Shepherd","Ruth","Jesus called Himself the Good Shepherd who lays down His life for His sheep — in ancient Israel, shepherds literally slept across the door of the sheepfold to protect the flock. The shepherd metaphor reveals Jesus' intimate care — He calls each sheep by name, leads them to green pastures, and searches tirelessly for even one that is lost. Shepherds were considered the lowest social class in Israel, yet God chose shepherds to be the first to hear the announcement of Jesus' birth.","Ruth left her homeland of Moab to stay with her mother-in-law Naomi, famously saying 'Where you go I will go, your God will be my God.' Ruth's story illustrates the concept of the kinsman-redeemer — Boaz redeemed Ruth just as Christ redeems believers, paying the price to make us His own. Ruth was a Moabite (a traditionally enemy nation), yet she appears in the genealogy of Jesus — showing God's grace extends to all peoples. "+F[32]+""],
["Donkey","Boaz","The humble animal; Balaam's donkey spoke; Jesus rode one into Jerusalem "+F[14]+" "+F[16]+" "+F[7]+"","The wealthy landowner who married Ruth and became an ancestor of Jesus "+F[3]+" "+F[4]+" "+F[10]+""],
["Lamb","Samson","Jesus is called the 'Lamb of God who takes away the sin of the world' (John 1:29) — connecting Him to the Passover lamb whose blood saved Israel in Egypt. A sacrificial lamb had to be without blemish or defect — Jesus lived a sinless life so He could be the perfect, unblemished sacrifice for all humanity. In Revelation, Jesus appears as both a Lion (power) and a Lamb (sacrifice) — the only time in literature where the hero conquers by being slain.","Samson had supernatural strength from God that allowed him to kill a lion with his bare hands, defeat 1,000 men with a donkey jawbone, and tear down a temple. Samson's story is a warning about squandering God-given gifts — his physical strength was unmatched, but his moral weakness led to his downfall. Samson is listed in the 'Hall of Faith' in Hebrews 11 despite his many failures, showing that God judges the heart and honours genuine faith even in flawed people."],
["Cross","Delilah","The cross was the most shameful form of execution in the Roman world — reserved for slaves and the worst criminals, designed to maximise pain and humiliation. What appeared to be Satan's greatest victory (killing God's Son) was actually God's master plan all along — the cross defeated sin, death, and the devil simultaneously. Crucifixion victims typically died from asphyxiation as their body weight made it impossible to breathe — they had to push up on the nails to take each breath.","The Philistine woman who seduced Samson and discovered the secret of his strength "+F[5]+" "+F[3]+" "+F[9]+""],
["Tomb","Gideon","The sealed cave where Jesus was buried and from which He rose "+F[0]+" "+F[1]+" "+F[7]+"","The judge who defeated the Midianites with only 300 men using torches and jars "+F[3]+" "+F[4]+" "+F[10]+""],
["Peter","Joshua","Peter was a fisherman whom Jesus called to be a 'fisher of men' — he became the leader of the twelve apostles and the early church. Jesus renamed Simon as Peter (Petros/Cephas meaning 'rock'), declaring he would be the foundation stone on which the church would be built. Peter initially sank when walking on water because he looked at the waves instead of Jesus — a powerful metaphor for faith amidst life's storms.","Moses' successor who led Israel into the Promised Land and conquered Jericho "+F[4]+" "+F[5]+" "+F[10]+""],
["Judas","Rahab","The disciple who betrayed Jesus for thirty silver coins "+F[33]+" "+F[34]+" "+F[7]+"","The woman in Jericho who hid Israelite spies and was saved when the city fell "+F[4]+" "+F[5]+" "+F[6]+""],
["Pilate","Miriam","The Roman governor who sentenced Jesus to death despite finding no guilt "+F[35]+" "+F[33]+" "+F[12]+"","Moses' sister, a prophetess who led women in celebration after crossing the Red Sea "+F[3]+" "+F[4]+" "+F[6]+""],
["Paul","Aaron","Paul transformed from Christianity's fiercest persecutor to its greatest missionary, planting churches across the entire Roman Empire. Paul's theology of grace — that salvation comes through faith alone, not works — revolutionised religion and remains the heart of Protestant Christianity. Paul was likely under five feet tall, partially blind, and suffered from a mysterious 'thorn in the flesh' that God refused to remove (2 Cor 12:7-9).","Moses' brother who served as Israel's first high priest and spokesman "+F[5]+" "+F[3]+" "+F[11]+""],
["Jonah","Elijah","Jonah tried to run from God by sailing in the opposite direction, was swallowed by a great fish, and spent three days inside before being vomited onto shore. Jesus directly compared Jonah's three days in the fish to His own three days in the tomb (Matt 12:40), making it a prophetic sign of the resurrection. Jonah is the only prophet who was angry that his preaching worked — he wanted Nineveh destroyed and was furious when the entire city repented.","Elijah challenged 450 prophets of Baal on Mount Carmel, and God answered with fire from heaven that consumed the sacrifice, the altar, and even the water. Elijah appeared with Moses at the Transfiguration of Jesus (Matt 17), representing the Prophets just as Moses represented the Law. After his greatest victory on Carmel, Elijah fell into such deep depression he wanted to die — showing that even great prophets struggled with mental health."],
["Whale","Elisha","The great sea creature that swallowed Jonah for three days and nights "+F[1]+" "+F[2]+" "+F[12]+"","Elijah's successor who received a double portion of his mentor's spirit "+F[4]+" "+F[5]+" "+F[7]+""],
["Daniel","John the Baptist","Daniel was thrown into a den of hungry lions for praying to God, but God shut the lions' mouths and he emerged without a scratch. Daniel's prophecies in chapters 2, 7-12 outline world history from Babylon to the end times with remarkable accuracy, including the timing of the Messiah's coming. Daniel served faithfully under four different kings across two empires (Babylonian and Persian) — a career spanning over 70 years in government.","The prophet who prepared the way for Jesus and baptized Him in the Jordan Known as the beloved disciple, he was closest to Jesus during His earthly ministry. "+F[35]+" "+F[33]+""],
["Lion","Jordan River","A powerful beast; Daniel was thrown to lions; Jesus is the Lion of Judah "+F[1]+" "+F[2]+" "+F[8]+"","The river where Jesus was baptized and Israel crossed into the Promised Land "+F[20]+" "+F[21]+" "+F[18]+""],
["Esther","Mount Sinai","Queen Esther risked her life by approaching the king uninvited to save her people from Haman's plot to destroy all the Jews in Persia. The book of Esther is the only book in the Bible that never directly mentions God's name, yet His providential hand is visible in every event. The Jewish festival of Purim, still celebrated today, commemorates Esther's bravery and the miraculous deliverance of the Jewish people.","The most common Greek word for sin is 'hamartia' which literally means 'to miss the mark' — like an archer's arrow falling short of the target. Sin entered the world through one man (Adam) and death through sin — but grace overflowed through one man (Christ) to bring life to all who believe (Romans 5). The Bible identifies three categories of sin: the lust of the flesh, the lust of the eyes, and the pride of life (1 John 2:16) — the same three temptations Satan used on Eve and on Jesus."],
["Queen","Bethlehem","A female monarch; Esther became queen of the Persian Empire "+F[0]+" "+F[1]+" "+F[6]+"","The small town where Jesus was born, fulfilling the prophecy of Micah "+F[19]+" "+F[21]+" "+F[13]+""],
["Camel","Jerusalem","A large desert animal; the wise men traveled by camel to find Jesus "+F[2]+" "+F[0]+" "+F[6]+"","The holy city where the temple stood and where Jesus was crucified and rose "+F[18]+" "+F[19]+" "+F[11]+""],
["Fish and Loaves","Nazareth","The five loaves and two fish Jesus multiplied to feed 5,000 people "+F[2]+" "+F[0]+" "+F[12]+"","The town in Galilee where Jesus grew up as a carpenter's son "+F[21]+" "+F[18]+" "+F[11]+""],
["Walking on Water","Golgotha","Jesus offered the Samaritan woman 'living water' that would become a spring welling up to eternal life — He is the source of spiritual refreshment that never runs dry. Water appears at key moments: creation (Spirit hovering over waters), the flood (judgment and renewal), the Red Sea (deliverance), and baptism (new life). When a Roman soldier pierced Jesus' side on the cross, blood and water flowed out (John 19:34) — medically indicating He died of a ruptured heart.","The hill outside Jerusalem, also called Calvary, where Jesus was crucified "+F[21]+" "+F[18]+" "+F[9]+""],
["Lazarus","Heaven","The man Jesus raised from the dead after four days in the tomb "+F[34]+" "+F[35]+" "+F[12]+"","Jesus said in His Father's house are many rooms and He was going to prepare a place for His followers (John 14:2-3). The Bible describes three heavens: the sky (atmosphere), space (cosmos), and the dwelling place of God — Paul said he was caught up to the 'third heaven.' Revelation describes the New Jerusalem as a perfect cube, 1,400 miles on each side, with streets of gold and gates made of single pearls. "+F[32]+""],
["Martha","Hell","Lazarus' sister who served Jesus and confessed Him as the Messiah "+F[33]+" "+F[34]+" "+F[7]+"","The place of eternal separation from God and punishment for the wicked "+F[0]+" "+F[1]+" "+F[7]+""],
["Zacchaeus","Satan","The short tax collector who climbed a tree to see Jesus "+F[33]+" "+F[34]+" "+F[10]+"","The fallen angel and adversary of God who tempts humanity to sin "+F[2]+" "+F[0]+" "+F[13]+""],
["Nicodemus","Gabriel","The Pharisee who came to Jesus at night and learned about being born again "+F[35]+" "+F[33]+" "+F[11]+"","The archangel who announced Jesus' birth to Mary and John's birth to Zechariah "+F[35]+" "+F[33]+" "+F[8]+""],
["Thomas","Dove","The apostle who doubted Jesus' resurrection until he saw the nail marks "+F[33]+" "+F[34]+" "+F[7]+"","The bird symbolizing the Holy Spirit that descended on Jesus at His baptism "+F[0]+" "+F[1]+" "+F[6]+""],
["Andrew","Pharaoh's Dreams","Peter's brother, one of the first disciples called by Jesus "+F[35]+" "+F[33]+" "+F[11]+"","The visions of seven fat and seven thin cows that Joseph interpreted in Egypt "+F[27]+" "+F[3]+" "+F[4]+""],
["James","Joseph's Cup","One of Jesus' inner circle of three disciples; brother of John "+F[35]+" "+F[33]+" "+F[8]+"","Joseph was sold into slavery by his jealous brothers but rose to become the second most powerful ruler in all of Egypt, saving nations from famine. Joseph is one of the clearest 'types' of Christ in the Old Testament — betrayed by his own, sold for silver, falsely accused, and raised to glory to save his people. Joseph was 30 years old when he became ruler of Egypt — the same age Jesus was when He began His public ministry."],
["John","Jacob's Ladder","The beloved disciple who wrote a Gospel, three letters, and Revelation Known as the beloved disciple, he was closest to Jesus during His earthly ministry. "+F[34]+" "+F[35]+"","Jacob tricked his brother Esau out of his birthright and his father's blessing, then spent 20 years working for his uncle Laban as consequence. After wrestling with God all night at Peniel, Jacob's name was changed to Israel ('he who struggles with God'), and he walked with a limp for the rest of his life. Jacob fathered 12 sons who became the 12 tribes of Israel — the entire nation descended from one man's family."],
["Matthew","Isaac's Sacrifice","A tax collector who became an apostle and wrote the first Gospel "+F[34]+" "+F[35]+" "+F[9]+"","Isaac was the miracle son born to Abraham and Sarah when they were 100 and 90 years old — proving nothing is impossible with God. Abraham's willingness to sacrifice Isaac on Mount Moriah is the most powerful foreshadowing of God the Father offering His own Son on the cross. Isaac is the only patriarch who never left the Promised Land — even when there was famine, God told him to stay and He would bless him there."],
["Mark","Passover Lamb","Noah's ark was approximately 450 feet long, 75 feet wide, and 45 feet high — large enough to hold over 500 railroad cars worth of space. The ark is a picture of salvation — there was only one door to enter (Jesus said 'I am the door'), and God Himself shut it when the time of grace ended. The ark came to rest on the mountains of Ararat (modern Turkey), and explorers have searched for its remains for centuries, with several claimed sightings.","Jesus is called the 'Lamb of God who takes away the sin of the world' (John 1:29) — connecting Him to the Passover lamb whose blood saved Israel in Egypt. A sacrificial lamb had to be without blemish or defect — Jesus lived a sinless life so He could be the perfect, unblemished sacrifice for all humanity. In Revelation, Jesus appears as both a Lion (power) and a Lamb (sacrifice) — the only time in literature where the hero conquers by being slain."],
["Luke","Manna","A physician who wrote a Gospel and Acts; Paul's traveling companion "+F[34]+" "+F[35]+" "+F[12]+"","The miraculous bread from heaven God provided each morning in the wilderness "+F[34]+" "+F[35]+" "+F[13]+""],
["Timothy","Quail","Paul's young protégé who became a pastor; received two letters from Paul "+F[35]+" "+F[33]+" "+F[8]+"","The birds God sent in abundance to give Israel meat in the desert "+F[0]+" "+F[1]+" "+F[13]+""],
["Silas","Staff of Moses","Paul's companion who sang hymns in prison and was freed by an earthquake "+F[33]+" "+F[34]+" "+F[9]+"","Moses led the Israelites out of 400 years of slavery in Egypt and received the Ten Commandments directly from God on Mount Sinai. Moses is a 'type' of Christ — both were saved from death as infants, both fasted 40 days, both were mediators between God and His people. Moses had a speech impediment and tried to refuse God's call five times before finally agreeing to confront Pharaoh."],
["Barnabas","Plagues of Egypt","The encouraging apostle who mentored Paul; his name means Son of Encouragement "+F[34]+" "+F[35]+" "+F[8]+"","The ten devastating judgments God sent on Egypt to free the Israelites "+F[21]+" "+F[18]+" "+F[13]+""],
["Lydia","Exodus","A seller of purple cloth who became the first European convert to Christianity "+F[34]+" "+F[35]+" "+F[11]+"","The departure of the Israelites from Egypt after 400 years of slavery "+F[2]+" "+F[0]+" "+F[9]+""],
["Priscilla","Promised Land","A leader in the early church who taught alongside her husband Aquila "+F[35]+" "+F[33]+" "+F[6]+"","Canaan, the land flowing with milk and honey God promised to Abraham's descendants "+F[0]+" "+F[1]+" "+F[11]+""],
["Aquila","Ark of the Covenant","Priscilla's husband; together they were tentmakers and church leaders "+F[35]+" "+F[33]+" "+F[7]+"","Noah's ark was approximately 450 feet long, 75 feet wide, and 45 feet high — large enough to hold over 500 railroad cars worth of space. The ark is a picture of salvation — there was only one door to enter (Jesus said 'I am the door'), and God Himself shut it when the time of grace ended. The ark came to rest on the mountains of Ararat (modern Turkey), and explorers have searched for its remains for centuries, with several claimed sightings."],
["Faith","Tabernacle","Hebrews 11:1 defines faith as 'the substance of things hoped for, the evidence of things not seen' — it is confident trust based on God's character. Jesus said faith the size of a mustard seed (the smallest seed known in Israel) could move mountains — it's not the quantity of faith that matters but its object. The word 'faith' (pistis in Greek) appears 243 times in the New Testament but only twice in the Old Testament, reflecting the shift from law to grace.","The portable tent of worship Israel carried through the wilderness "+F[28]+" "+F[16]+" "+F[15]+""],
["Hope","Temple","Biblical hope is not wishful thinking but confident certainty based on God's unbreakable promises and proven faithfulness throughout history. Paul lists hope alongside faith and love as the three things that last forever (1 Cor 13:13) — it is an eternal quality, not a temporary feeling. The anchor was the earliest Christian symbol (before the cross), based on Hebrews 6:19 which calls hope 'an anchor for the soul, firm and secure.'","Solomon's temple was overlaid with 20 tons of pure gold and took seven years to build using 180,000 workers from across the kingdom. When Jesus said 'Destroy this temple and I will raise it in three days,' He was speaking about His body — the ultimate temple where God dwells (John 2:19-21). The temple veil that tore from top to bottom at Jesus' death was 60 feet tall, 30 feet wide, and 4 inches thick — only God could have torn it."],
["Love","Altar","The Bible says 'God is love' (1 John 4:8) — love is not just something God does, it is the very essence of who He is. The Greek New Testament uses four different words for love: agape (unconditional), phileo (friendship), storge (family), and eros (romantic). The 'love chapter' (1 Corinthians 13) was written to a church full of conflict — Paul was teaching that spiritual gifts mean nothing without genuine love.","Altars were places where people met with God through sacrifice — from Abel's first offering to the heavenly altar described in Revelation. The altar of burnt offering in the tabernacle was made of acacia wood overlaid with bronze — wood represents humanity and bronze represents judgment. Abraham built altars wherever he went, marking his journey of faith — they served as memorials of encounters with God and acts of worship."],
["Grace","Priest","Grace means God's undeserved favour — getting good things we don't deserve, while mercy means not getting the punishment we do deserve. The Greek word 'charis' (grace) appears 156 times in the New Testament and is the root of 'charisma' (spiritual gifts) and 'eucharist' (thanksgiving). In the ancient world, 'grace' was a patron-client term — a wealthy benefactor would show 'grace' to those who couldn't repay, which is exactly what God does for us.","A minister who offers sacrifices and stands between God and the people "+F[28]+" "+F[0]+" "+F[1]+""],
["Mercy","Levite","God showed mercy to David after his sin with Bathsheba, to Peter after his denial, and to Paul after he persecuted Christians — no one is beyond mercy. The Hebrew word for mercy is 'chesed' which combines love, loyalty, and compassion — it describes God's covenant faithfulness even when we are unfaithful. The Mercy Seat on the Ark of the Covenant was where God's presence dwelt — it sat directly above the Ten Commandments, symbolising mercy covering the law.","A member of the tribe of Levi dedicated to service in God's tabernacle "+F[3]+" "+F[4]+" "+F[9]+""],
["Repentance","Prophet","The Greek word for repentance is 'metanoia' which means a complete change of mind and direction — not just feeling sorry but turning completely around. Repentance was the first word of John the Baptist's preaching, the first word of Jesus' public ministry, and the first word of Peter's sermon at Pentecost. True repentance produces fruit — Zacchaeus demonstrated genuine repentance by giving half his possessions to the poor and repaying four times what he had stolen.","A spokesperson called by God to deliver divine messages and warnings "+F[27]+" "+F[2]+" "+F[0]+""],
["Baptism","King","The word baptism comes from the Greek 'baptizo' meaning to immerse, dip, or plunge underwater — it was originally used for dyeing cloth by submerging it. Baptism symbolises death, burial, and resurrection — going under water represents dying to the old self, and coming up represents rising to new life in Christ. John the Baptist baptised in the Jordan River near Bethany beyond the Jordan — the same river Israel had miraculously crossed to enter the Promised Land.","Jesus spoke about the Kingdom of God more than any other topic — it was the central theme of His teaching and appears over 100 times in the Gospels. The Kingdom of God is both 'already' and 'not yet' — it began with Jesus' first coming and will be fully established at His second coming. Jesus said the kingdom belongs to those who become like little children (Matthew 18:3) — not childish, but trusting, humble, and dependent on the Father."],
["Miracle","Servant","Jesus performed at least 37 recorded miracles, but John 21:25 says if everything Jesus did were written down, the world could not contain the books. Jesus' first miracle was turning water into wine at a wedding — transforming the ordinary into the extraordinary, which is exactly what He does with human lives. The miracles of Jesus were never performed for show — each one was an act of compassion that also served as a 'sign' pointing to His divine identity.","One who serves others humbly; Jesus came not to be served but to serve "+F[1]+" "+F[2]+" "+F[8]+""],
["Prayer","Widow","The Bible records over 650 prayers, and Jesus Himself prayed constantly — rising early in the morning, spending entire nights, and praying in His final hours. Prayer is not informing God of our needs (He already knows) but aligning our hearts with His will and deepening our relationship with Him. The longest prayer in the Bible is Solomon's dedication prayer for the temple (1 Kings 8), and the shortest is Peter's 'Lord, save me!' as he sank in the water.","A woman whose husband has died; God cares especially for widows "+F[0]+" "+F[1]+" "+F[9]+""],
["Worship","Orphan","The English word 'worship' comes from 'worth-ship' — declaring the worth and value of the one being praised. True worship is not about music style or location — Jesus told the Samaritan woman that God seeks worshippers who worship 'in spirit and in truth' (John 4:24). The first recorded act of worship in the Bible is Abel's offering in Genesis 4 — and it cost him his life when his brother Cain became jealous.","A child without parents; God is a father to the fatherless "+F[0]+" "+F[1]+" "+F[6]+""],
["Sacrifice","Offering","In the Old Testament, animals were sacrificed to temporarily cover sins — Jesus' sacrifice on the cross permanently removed sins once and for all. The word 'sacrifice' comes from Latin 'sacri-facere' meaning 'to make sacred' — through Christ's sacrifice, believers are made holy and set apart for God. Abraham's near-sacrifice of Isaac on Mount Moriah happened on the same mountain ridge where Jesus would be crucified approximately 2,000 years later.","A gift presented to God in worship, gratitude, or dedication "+F[28]+" "+F[31]+" "+F[30]+""],
["Blessing","Curse","The most common Greek word for sin is 'hamartia' which literally means 'to miss the mark' — like an archer's arrow falling short of the target. Sin entered the world through one man (Adam) and death through sin — but grace overflowed through one man (Christ) to bring life to all who believe (Romans 5). The Bible identifies three categories of sin: the lust of the flesh, the lust of the eyes, and the pride of life (1 John 2:16) — the same three temptations Satan used on Eve and on Jesus.","An invocation of harm; the opposite of God's blessing "+F[2]+" "+F[0]+" "+F[8]+""],
["Victory","Defeat","Triumph through God's power over sin, death, and enemies "+F[25]+" "+F[2]+" "+F[0]+"","Loss in battle; Israel experienced defeat when they disobeyed God "+F[0]+" "+F[1]+" "+F[11]+""],
["Battle","Shout","A fight or conflict; the Lord fights battles for His people "+F[25]+" "+F[2]+" "+F[0]+"","A loud cry of praise or war; Israel shouted and Jericho's walls fell "+F[0]+" "+F[1]+" "+F[12]+""],
["Spirit","Wind","The Holy Spirit is the third person of the Trinity — not an impersonal force but a divine person who speaks, guides, comforts, and can be grieved. The Hebrew word for Spirit is 'ruach' which also means 'wind' and 'breath' — the Spirit is as essential to spiritual life as breath is to physical life. The Holy Spirit appeared as a dove at Jesus' baptism, as tongues of fire at Pentecost, and as a mighty rushing wind — showing He works in diverse ways.","A symbol of the Spirit's movement; a mighty wind came at Pentecost "+F[23]+" "+F[17]+" "+F[22]+""],
["Flame","Tongue","Fire symbolizing God's presence and purification "+F[23]+" "+F[1]+" "+F[2]+"","Languages; at Pentecost the disciples spoke in many tongues "+F[23]+" "+F[2]+" "+F[0]+""],
["Gift","Church","A spiritual ability given by the Holy Spirit for ministry "+F[23]+" "+F[0]+" "+F[1]+"","The body of believers gathered in Jesus' name for worship and mission "+F[24]+" "+F[0]+" "+F[1]+""],
["Disciple","Apostle","A follower who learns from Jesus and obeys His teachings "+F[24]+" "+F[2]+" "+F[0]+"","One sent with authority by Christ to spread the gospel to all nations "+F[24]+" "+F[2]+" "+F[0]+""],
["Martyr","Crown","A person who dies for their faith; Stephen was the first "+F[2]+" "+F[0]+" "+F[8]+"","The Bible mentions five crowns believers can receive: the crown of life, crown of glory, crown of righteousness, crown incorruptible, and crown of rejoicing. Jesus wore a crown of thorns — thorns were part of the curse in Genesis 3, so by wearing them He was symbolically taking the curse of sin upon Himself. In Revelation 4:10, the 24 elders cast their crowns before God's throne — showing that every reward we receive ultimately belongs to and glorifies God."],
["Eternal Life","Amen","Eternal life is not just living forever — Jesus defined it as knowing God personally: 'This is eternal life, that they know You' (John 17:3). The Bible says God has 'set eternity in the human heart' (Eccl 3:11) — there is an innate longing in every person for something beyond this temporary world. The Hebrew word 'olam' (eternal/everlasting) comes from a root meaning 'hidden' — eternity is a reality hidden from full human comprehension.","Amen means 'so be it' or 'truly' and is used to affirm the truth of what has been said — Jesus often began statements with 'Truly, truly (Amen, amen).' Jesus is called 'The Amen' in Revelation 3:14 — He is the faithful and true witness, the ultimate confirmation of all God's promises. Amen is another Hebrew word used universally across languages and religions — it has been spoken in worship for over 3,000 years. "+F[32]+""],
["Cain","Abel","Adam's firstborn who murdered his brother out of jealousy "+F[3]+" "+F[4]+" "+F[11]+"","The second son of Adam whose sacrifice pleased God "+F[3]+" "+F[4]+" "+F[13]+""],

["Marching","Shelter","Moving forward together as God's people toward the heavenly Promised Land. The Israelites marched around Jericho seven days before the walls fell down flat. SDA churches worldwide love singing 'Marching to Zion' with joyful energy.","A safe place of protection found only in God during the storms of life. Psalm 91:1 says whoever dwells in the shelter of the Most High rests in His shadow. 'A Shelter in the Time of Storm' is a cherished SDA prayer meeting hymn."],
["Trusting","Consecrate","Putting your full confidence in God even when the path ahead seems unclear and uncertain. Proverbs 3:5 says trust in the Lord with all your heart and lean not on your own understanding. 'Tis So Sweet to Trust in Jesus' is sung during many Adventist baptismal services.","Setting yourself apart completely for God's holy service and divine purposes. Romans 12:1 calls believers to present their bodies as living sacrifices, holy and acceptable to God. Consecration hymns are central to Adventist Week of Prayer and camp meeting services."],
["Watching","Pilgrim","Staying alert and spiritually ready for Jesus to return at any unexpected moment. Jesus said in Matthew 24:42 to keep watch because you do not know when your Lord will come. 'Watchman Blow the Gospel Trumpet' reflects the core Adventist calling to be watchful and ready.","A traveller passing through this temporary world on the journey to a heavenly home. Hebrews 11:13 says the heroes of faith saw themselves as strangers and pilgrims on earth. 'We Are Pilgrims' reminds Adventists that this world is not their final resting place."],
["Wonderful","Coming","A name given to Jesus in Isaiah 9:6 — Wonderful Counsellor, Mighty God, Prince of Peace. When we call God wonderful we mean He fills our hearts with awe and amazement. 'Wonderful Words of Life' is a favourite SDA Sabbath School song loved by all ages.","Jesus promised 'I am coming soon' three times in the final chapter of Revelation. The entire Adventist movement was born from the expectation of Christ's imminent return. 'Jesus Is Coming Again' captures the urgency and joy that defines Adventist worship and identity."]

const DENOM_SDA_ACT=[
["Foot Washing","Tithe Envelope","Kneeling to wash another person's feet as Jesus did for His disciples at the Last Supper. John 13:14-15 says if Jesus washed our feet we should wash one another's feet too. Adventists practice this Ordinance of Humility before every quarterly Communion service.","A small envelope used to return ten percent of your income to God through the local church. Malachi 3:10 says bring the whole tithe into the storehouse and test God's faithfulness. Adventists believe faithful tithing is a sacred act of worship demonstrating trust in God's provision."],
["Sabbath Candle","Health Screening","A candle some Adventist families light at sunset on Friday evening to welcome the Sabbath rest. Genesis 2:2-3 says God rested on the seventh day and made it holy and blessed. Many Adventist families mark Sabbath's beginning and ending with special worship traditions.","Checking someone's blood pressure or health status at a community wellness event or expo. Adventists believe the body is the temple of the Holy Spirit based on 1 Corinthians 6:19. SDA health expos and free screenings are a major worldwide outreach and ministry method."],
["Vegetarian Cooking","Pathfinder Salute","Preparing plant-based meals without meat as part of a commitment to healthy biblical living. Genesis 1:29 records God's original diet of fruits, grains, nuts and vegetables for humanity. Adventists promote vegetarianism as part of the health message and caring for God's temple.","Standing at attention with three fingers raised representing the three angels' messages of Revelation 14. Pathfinders is the Adventist youth organisation centred on faith, service and outdoor skills. The three-finger salute reminds young people of their commitment to God, others and personal growth."],
["Sunset Worship","Camp Meeting Tent","A family gathering outdoors to sing hymns and pray as the sun sets on Friday evening welcoming Sabbath. The biblical day begins and ends at sunset based on Genesis 1 — there was evening and morning. Adventist families cherish Friday sunset worship as the most special and sacred hour of the week.","A large canvas tent set up outdoors where people gather for multi-day spiritual revival meetings. The Israelites lived in tents during the Feast of Tabernacles remembering God's wilderness care. Adventist camp meetings have been held continuously since the 1860s and remain a cherished annual tradition."],
["Baptism Immersion","Revelation Seminar","Going completely underwater and coming back up symbolising dying to sin and rising to new life in Christ. Romans 6:4 says we are buried with Christ through baptism and raised to walk in newness of life. Adventists practice full immersion baptism as the only biblical method demonstrated by Jesus Himself.","A series of evening Bible presentations walking through the prophecies in the book of Revelation. Revelation 1:3 promises a special blessing to everyone who reads and hears the words of this prophecy. Adventist evangelistic campaigns often centre on Revelation's messages as the heart of the church's mission."],
["Offering Plate","Literature Sharing","Passing a plate or bag through the congregation to collect voluntary gifts for God's worldwide work. 2 Corinthians 9:7 says God loves a cheerful giver who gives willingly from a generous heart. Adventist offerings support global missions, education, hospitals and ministry projects around the world.","Handing out books, magazines or Bible study pamphlets about present truth to people in the community. Revelation 14:6 speaks of the everlasting gospel going to every nation, tribe, tongue and people. Literature evangelism has been a cornerstone of Adventist mission strategy since the church's earliest days."],
["Prayer Circle","Potluck Setup","A group kneeling or standing in a circle holding hands and taking turns praying aloud together. Matthew 18:20 promises that where two or three gather in Jesus' name He is right there with them. Adventist prayer circles are common at the close of Sabbath School classes and church services.","Setting out dishes of homemade food on tables for a communal meal after the Sabbath church service. Acts 2:46 says the early Christians broke bread together in their homes with glad and generous hearts. Adventist potlucks after church are famous worldwide for delicious vegetarian food and warm fellowship."],
["Sabbath Walk","Anointing Service","Taking a peaceful nature walk on Saturday afternoon to enjoy God's creation and rest from weekly work. Isaiah 58:13-14 calls the Sabbath a delight and promises rich blessings for honouring God's holy day. Adventist families often spend Sabbath afternoons outdoors marvelling at the beauty of God's handiwork.","Church elders placing oil on a sick person's forehead and praying earnestly together for God's healing. James 5:14 instructs the sick to call for the elders of the church to pray and anoint them with oil. Adventist anointing services are solemn occasions where members place their full trust in God's healing power."],
["Deacon Greeting","Adventurer Pledge","A church deacon standing at the door welcoming each person with a warm handshake and a church bulletin. Romans 12:13 instructs believers to practise hospitality and share generously with God's people in need. Adventist deacons and deaconesses serve as the welcoming face and caring hands of the local congregation.","Children aged 4-9 standing together reciting their pledge of love for Jesus with hands over their hearts. Proverbs 22:6 says train up a child in the way they should go and they will not depart from it. Adventurer Clubs nurture faith in the youngest members through fun activities, badges and Bible stories."],
["Bible Study Group","Ingathering Visit","A small group sitting together with open Bibles studying a passage verse by verse in someone's home. Acts 17:11 praises the Bereans who examined the Scriptures daily to check if what they heard was true. Adventist small group Bible studies are the foundation of personal evangelism and spiritual growth.","Going door to door in the community asking for donations to support church charitable relief projects. The practice connects with the biblical principle that whoever is kind to the poor lends to the Lord (Proverbs 19:17). Adventist Ingathering campaigns have funded hospitals, schools and disaster relief for over a century."]

const DENOM_SDA_EXPLAIN=[
["Sabbath","Investigative Judgment","The seventh day of the week (Saturday) set apart by God as a day of rest and worship since creation. God Himself rested on the seventh day, blessed it and made it holy (Genesis 2:2-3). The Hebrew word 'Shabbat' means to cease or stop — it is a gift of rest, not a burden.","A heavenly court review of every believer's life that began in 1844 based on Daniel 8:14. Just as the earthly high priest entered the Most Holy Place once a year on the Day of Atonement, Christ entered the heavenly sanctuary. This teaching is unique to Adventism and explains why Christ has not yet returned — He is completing this work of judgment."],
["Sanctuary","Remnant","The heavenly temple where Jesus serves as our High Priest interceding for us before God the Father. The earthly tabernacle Moses built was a copy of the true sanctuary in heaven (Hebrews 8:5). Understanding the sanctuary services reveals the complete plan of salvation from sacrifice to final judgment.","The end-time faithful group described in Revelation 12:17 that keeps God's commandments and has the testimony of Jesus. Throughout Bible history God has always preserved a faithful remnant even when the majority turned away. Adventists believe they are called to be part of this last-day remnant proclaiming the three angels' messages."],
["Spirit of Prophecy","Three Angels Messages","Ellen G. White's prophetic writings which Adventists believe fulfil the biblical gift of prophecy described in Revelation 19:10. The testimony of Jesus is the spirit of prophecy — a guiding voice for God's end-time church. Her book 'Steps to Christ' has been translated into over 165 languages and touched millions of lives worldwide.","The urgent threefold proclamation of Revelation 14:6-12 calling the world to worship the Creator, leave Babylon and remain faithful. The first angel calls all people to fear God and give Him glory because the hour of His judgment has come. These messages form the theological backbone and unique mission identity of the Seventh-day Adventist Church."],
["Seal of God","Mark of the Beast","Sabbath observance as the sign of loyalty to God in the final conflict between truth and error. Exodus 31:13 identifies the Sabbath as a sign between God and His people throughout all generations. In the end times the seal of God distinguishes those who worship the Creator on His holy day.","Sunday worship enforced by law as the sign of allegiance to earthly religious-political powers in the last days. Adventists teach that Revelation 13 predicts a future crisis where true Sabbath-keeping will be the test of loyalty. This interpretation drives the Adventist sense of urgency about sharing the Sabbath truth with the world."],
["Health Message","State of the Dead","The Adventist emphasis on caring for the body through plant-based diet and abstaining from harmful substances. 1 Corinthians 6:19-20 says your body is the temple of the Holy Spirit — honour God with your body. Adventist health principles have been scientifically validated — Adventists in Loma Linda live 7-10 years longer than average.","The biblical teaching that death is an unconscious sleep until the resurrection at Christ's second coming. Ecclesiastes 9:5 says the dead know nothing and have no more reward under the sun. This contradicts the popular belief in an immortal soul but aligns with Jesus calling death a sleep in John 11:11-14."],
["Great Controversy","Close of Probation","The cosmic battle between Christ and Satan that has been playing out across all of human history. This conflict began in heaven when Lucifer rebelled and was cast out (Revelation 12:7-9). Ellen White's book 'The Great Controversy' traces this battle from the destruction of Jerusalem to the end of sin.","The solemn moment when every person's eternal destiny is permanently fixed just before Christ returns. Revelation 22:11 says let the righteous remain righteous and let the wicked remain wicked. After probation closes there is no more opportunity for repentance — making present decisions eternally significant."],
["Sunday Law","1844","Future legislation enforcing Sunday worship that Adventists believe will trigger the final crisis of earth's history. Daniel 7:25 predicts a power that would think to change God's times and laws. Adventists watch for religious liberty threats as prophetic signs of the approaching end of the world.","The pivotal year when Adventists believe Christ entered the Most Holy Place of the heavenly sanctuary to begin the investigative judgment. This date comes from the 2300-day prophecy of Daniel 8:14 using the day-for-a-year principle. The Great Disappointment of October 22, 1844 led to deeper Bible study that birthed the Adventist movement."],
["Loud Cry","Latter Rain","The final powerful worldwide proclamation of the three angels' messages just before Jesus returns in glory. Revelation 18:1 describes an angel lighting up the entire earth with the glory of God's final message. Adventists believe this final evangelistic push will be empowered by the Holy Spirit in unprecedented ways.","The promised outpouring of the Holy Spirit in the last days that empowers the church to finish God's work on earth. Joel 2:23 speaks of the former rain and latter rain — the early church received the former rain at Pentecost. Adventists pray for the latter rain as the power needed to take the gospel to every nation before Christ returns."],
["28 Fundamentals","General Conference","The official statement of 28 core doctrines that define Seventh-day Adventist beliefs and biblical understanding. These beliefs are based solely on Scripture and include unique teachings about the Sabbath, sanctuary and second coming. They were most recently revised in 2015 at the General Conference Session in San Antonio, Texas.","The highest administrative body of the worldwide Seventh-day Adventist Church with authority over all divisions and unions. The General Conference Session meets every five years with delegates from around the world voting on church matters. The SDA Church operates in over 200 countries making it one of the most widespread Protestant denominations on earth."],
["EGW","Pathfinders","The common abbreviation for Ellen Gould White, co-founder of the Seventh-day Adventist Church in 1863. She received approximately 2000 visions during her 70-year ministry and wrote over 100,000 pages. She is the most translated female non-fiction author in history and the most translated American author of either gender.","The Adventist youth organisation for ages 10-15 combining outdoor skills, community service and spiritual growth. Similar to scouting but with a strong faith foundation, Pathfinders earn honours in dozens of skill areas. The international Pathfinder Camporee brings together tens of thousands of young Adventists from around the globe."]
];
const DENOM_CATHOLIC_SING=[
["Sacred","Mercy","Set apart as holy and dedicated entirely to God's purposes and divine worship. The Sacred Heart of Jesus is one of the most widely recognised Catholic devotional images worldwide. Catholic hymns use this word to describe the Mass, Scripture, tradition and the mysteries of faith.","God's compassionate kindness shown to those who deserve punishment instead of forgiveness. Jesus told the parable of the Prodigal Son to show the Father's unlimited mercy toward sinners. The Catholic hymn 'Lord Have Mercy' (Kyrie Eleison) is sung at every Mass asking for God's compassion."],
["Adore","Alleluia","To worship God with the deepest love, reverence and devotion of your entire heart and soul. The Magi came to Bethlehem to adore the newborn King and laid their gifts before Him. Catholic hymns like 'O Come All Ye Faithful' call believers to come and adore Christ the Lord.","A joyful exclamation meaning Praise the Lord, sung with great celebration especially at Easter. The word comes directly from Hebrew — hallelu meaning praise and Yah meaning the Lord God. During Lent Catholics stop singing Alleluia, making its triumphant return at Easter feel powerfully joyful."],
["Hosanna","Offering","A Hebrew word meaning save us or save now, shouted by crowds as Jesus entered Jerusalem on Palm Sunday. Matthew 21:9 records the people crying Hosanna to the Son of David, blessed is He who comes. Catholic Palm Sunday liturgy recreates this scene with the congregation processing and singing Hosanna.","A gift freely given to God in worship — your time, money, talents and even your very life itself. The Mass itself is understood as the offering of Christ's sacrifice made present on the altar. Catholic hymns about offering reflect the total self-giving that Christ modelled and believers are called to imitate."],
["Proclaim","Vessel","To announce boldly and publicly the good news of what God has done through Jesus Christ. Mary proclaimed the greatness of the Lord in her song the Magnificat found in Luke 1:46-55. Catholic hymns call believers to proclaim God's love, mercy and truth to the whole world.","A container or instrument used by God for His holy purposes — every believer is a vessel of God's grace. 2 Timothy 2:21 says anyone who cleanses themselves will be a vessel for honourable use, set apart for God. Catholic hymns describe Mary as a chosen vessel and call all believers to be vessels of God's love."],
["Communion","Dwelling","The intimate sharing and unity between God and His people, and among believers with one another. The Eucharist is the highest form of communion — receiving the Body and Blood of Christ at Mass. Catholic hymns about communion celebrate the mystery of God dwelling intimately with His people through the sacrament.","Making your permanent home in God's presence and love, not just visiting but truly living there always. Psalm 23:6 says I will dwell in the house of the Lord forever as the shepherd's sheep. Catholic hymns about dwelling express the longing to remain always in God's presence through prayer and sacrament."]
];
const DENOM_CATHOLIC_ACT=[
["Sign of Cross","Genuflect","Touching forehead, chest, left shoulder then right shoulder while saying 'In the name of the Father, Son and Holy Spirit.' This gesture marks the beginning and end of every Catholic prayer and acknowledges the Trinity. Catholics make the sign of the cross with holy water when entering a church as a reminder of baptism.","Bending the right knee to touch the floor as a sign of deep reverence before the Blessed Sacrament in the tabernacle. Philippians 2:10 says at the name of Jesus every knee should bow in heaven and on earth. Catholics genuflect every time they enter or leave a pew when the Eucharist is present in the church."],
["Rosary Beads","Holy Water","A string of beads used to count prayers while meditating on mysteries from the life of Christ and Mary. The full Rosary consists of 20 decades, each with 10 Hail Marys and one Our Father. Pope John Paul II added the Luminous Mysteries in 2002, bringing the total to four sets of five mysteries.","Blessed water used for the sign of the cross when entering church and in various sacramental rites and blessings. Its use reminds Catholics of their baptismal promises and spiritual cleansing from sin. Holy water fonts are placed at every entrance of Catholic churches around the world."],
["Kneeling Prayer","Incense Swinging","Dropping to both knees on a kneeler during the most sacred moments of the Mass such as the Consecration. Kneeling expresses humility, adoration and submission before the real presence of Christ in the Eucharist. Catholic churches have padded kneelers built into every pew for this purpose.","A priest or deacon swinging a metal thurible (censer) containing burning incense during solemn liturgical celebrations. Psalm 141:2 says 'Let my prayer rise before you like incense.' The rising smoke symbolises prayers ascending to God and is used at Mass, Benediction and funerals."],
["Communion Line","Confession Booth","Walking forward in a line to receive the Body of Christ from the priest during Holy Communion at Mass. Catholics believe the bread and wine truly become the Body and Blood of Christ through transubstantiation. The communion procession is a solemn, reverent moment at the heart of every Catholic Mass.","Entering a small enclosed space in the church to confess sins privately to a priest in the Sacrament of Reconciliation. Jesus gave the apostles the power to forgive sins in John 20:23 — 'whose sins you forgive are forgiven.' The seal of confession means a priest can never reveal what is confessed under any circumstances."],
["Stations of Cross","Ash Wednesday","Walking from station to station around the church walls, stopping at 14 scenes depicting Jesus' journey to Calvary. Each station invites prayer and meditation on Christ's suffering, from His condemnation to His burial. Catholics traditionally pray the Stations of the Cross on Fridays during the season of Lent.","A priest marking a cross of ashes on each person's forehead saying 'Remember that you are dust and to dust you shall return.' The ashes come from burning the previous year's blessed Palm Sunday palm branches. Ash Wednesday marks the beginning of the 40-day season of Lent — prayer, fasting and preparation for Easter."],
["Lighting Candle","Sprinkling Rite","Placing a candle before a statue or icon of a saint and saying a prayer for a special intention or loved one. The burning flame represents the prayer continuing even after the person has left the church. Votive candles have been part of Catholic devotional practice for over a thousand years.","A priest walking through the congregation sprinkling holy water over the people as a blessing and baptismal reminder. This rite called the Asperges replaces the Penitential Act at the beginning of Mass during Easter season. The name comes from Psalm 51:7 — 'Sprinkle me with hyssop and I shall be clean.'"],
["Procession","Blessing","Walking in an organised line carrying a cross, candles and the Book of Gospels into the church at the start of Mass. Processions are also held on feast days like Corpus Christi when the Eucharist is carried through the streets. The entrance procession symbolises the pilgrim journey of God's people toward the heavenly kingdom.","A priest raising his hand and making the sign of the cross over people or objects to invoke God's grace and protection. The final blessing at Mass sends the congregation out with God's favour to serve the world. Parents also ask priests to bless their children, homes, vehicles and religious objects."],
["Altar Serving","Palm Waving","Young people assisting the priest during Mass by carrying the cross, holding the book, and preparing the altar. Altar servers have an important liturgical ministry that dates back to the earliest centuries of the Church. Both boys and girls can serve at the altar in most Catholic parishes today.","Holding and waving palm branches during the procession on Palm Sunday, remembering Jesus' triumphal entry into Jerusalem. John 12:13 says the crowd took palm branches and went out to meet Him shouting 'Hosanna.' The blessed palms are kept in homes as a sacramental and later burned to make ashes for Ash Wednesday."],
["Eucharistic Adoration","Fish Friday","Sitting or kneeling in silent prayer before the exposed Blessed Sacrament displayed in a monstrance on the altar. Catholics believe Christ is truly, really and substantially present in the consecrated Host. Some parishes have perpetual adoration chapels open 24 hours a day for continuous prayer and worship.","Choosing to eat fish instead of meat on Fridays as an act of penance remembering Christ's sacrifice on Good Friday. The practice of Friday abstinence from meat has been a Catholic discipline for centuries worldwide. The fish symbol (ichthys) is one of the earliest Christian symbols, representing Jesus Christ, Son of God, Saviour."],
["Choir Procession","Infant Baptism","Choir members in robes walking together in formation while singing a hymn to begin a solemn liturgical celebration. Sacred music has been central to Catholic worship since the earliest centuries of the Church. The choir leads the congregation in sung prayer, lifting hearts and voices together to God.","A priest pouring water over a baby's head while saying 'I baptize you in the name of the Father, Son and Holy Spirit.' Catholics baptize infants because they believe baptism removes original sin and makes the child a member of the Church. Parents and godparents make promises to raise the child in the Catholic faith until confirmation."]
];
const DENOM_CATHOLIC_EXPLAIN=[
["Transubstantiation","Papal Infallibility","The Catholic belief that during Mass the bread and wine truly become the Body and Blood of Jesus Christ. The appearance of bread and wine remains but the substance (inner reality) is completely changed. This teaching was formally defined at the Fourth Lateran Council in 1215 and is central to Catholic Eucharistic theology.","The teaching that when the Pope speaks officially (ex cathedra) on matters of faith or morals he is protected from error by God. This does not mean the Pope is perfect or sinless in his personal life or opinions. It has been formally invoked only twice in history — for the Immaculate Conception (1854) and the Assumption of Mary (1950)."],
["Purgatory","Immaculate Conception","A state of purification after death where souls are cleansed before entering heaven's perfect holiness. It is not a second chance for the wicked but a preparation for those already saved who died with imperfections. Catholics pray for souls in purgatory especially during November, the Month of the Holy Souls.","The Catholic dogma that Mary was conceived without the stain of original sin from the very first moment of her existence. This does not refer to Mary conceiving Jesus (a common confusion) but to Mary's own conception by her parents. It was proclaimed by Pope Pius IX in 1854 and Mary appeared at Lourdes in 1858 saying 'I am the Immaculate Conception.'"],
["Canon Law","Canonization","The complete system of laws and regulations that governs the Roman Catholic Church's organisation and discipline. The current Code of Canon Law contains 1,752 canons (rules) and was last revised in 1983. Canon law covers everything from the sacraments to church property to the rights and duties of clergy and laity.","The official process by which the Pope declares a deceased person to be a saint worthy of universal veneration and imitation. The process typically requires proof of two miracles attributed to the candidate's intercession after death. It can take decades or even centuries — Joan of Arc was canonized 489 years after her death."],
["Cardinal","Conclave","A senior member of the clergy appointed by the Pope, ranking just below the Pope in the Church hierarchy. Cardinals wear distinctive red robes symbolising their willingness to shed blood for the faith. Cardinals under age 80 form the electoral body that chooses a new Pope when the office becomes vacant.","The secret meeting of cardinals locked inside the Sistine Chapel to elect a new Pope after the previous Pope dies or resigns. The word comes from Latin 'cum clave' meaning 'with a key' because the cardinals are literally locked in. White smoke from the chapel chimney signals a successful election while black smoke means no decision yet."],
["Rosary","Tabernacle","A form of prayer using beads to meditate on 20 mysteries from the lives of Jesus and Mary while reciting prayers. Each mystery recalls a specific event like the Annunciation, Crucifixion or Resurrection. Pope John Paul II called the Rosary his favourite prayer and prayed all 20 mysteries every single day.","The ornate locked box on or near the altar where consecrated Hosts (the Body of Christ) are reserved after Mass. A sanctuary lamp burns continuously nearby to indicate that Christ is present in the tabernacle. The word comes from the Latin tabernaculum meaning tent, connecting to the Old Testament Tent of Meeting."],
["Lent","Advent","A 40-day season of prayer, fasting and almsgiving from Ash Wednesday to Easter preparing hearts for the Resurrection. The 40 days recall Jesus' 40 days of fasting and temptation in the wilderness (Matthew 4:1-2). Catholics over 14 abstain from meat on Ash Wednesday, Good Friday and all Fridays of Lent.","The four-week season of preparation before Christmas anticipating the coming of Christ at Bethlehem and His future return. Each Sunday an additional candle is lit on the Advent wreath — three purple and one pink (for joy). The word 'Advent' comes from the Latin 'adventus' meaning coming or arrival."],
["Sacrament","Diocese","An outward sign instituted by Christ that gives grace — Catholics recognise seven sacraments in total. The seven are Baptism, Confirmation, Eucharist, Penance, Anointing of the Sick, Holy Orders and Matrimony. The Catechism teaches that sacraments are necessary for salvation because they confer the grace they signify.","A geographical region of the Catholic Church under the authority and pastoral care of a bishop. The word comes from a Greek term for administration and the system dates to the earliest centuries of Christianity. There are approximately 3,000 dioceses worldwide, each with a cathedral as the bishop's official church."],
["Eucharist","Apostolic Succession","The Catholic term for Holy Communion — the central sacrament in which bread and wine become Christ's Body and Blood. Catholics believe the Eucharist is not merely a symbol but the real, true and substantial presence of Jesus Christ. The word comes from the Greek 'eucharistia' meaning thanksgiving, referring to Jesus giving thanks at the Last Supper.","The unbroken chain of ordination from the original twelve apostles through every bishop to the present day clergy. Catholics believe this continuous laying on of hands transmits the authority Christ gave His apostles. This is why Catholic priests must be ordained by a bishop who was ordained by another bishop going back to the apostles."],
["Marian Dogma","Beatification","An official teaching about Mary that Catholics are required to believe as part of the deposit of faith. The four Marian dogmas are: Mary as Mother of God, her perpetual virginity, the Immaculate Conception and her bodily Assumption into heaven. These beliefs developed over centuries and are considered infallibly defined by the Church.","The second-to-last step in the canonization process, where a deceased person is declared 'Blessed' by the Pope. Beatification requires proof of one miracle and allows public veneration in the candidate's home region. Mother Teresa was beatified in 2003 (just 6 years after her death) and canonized as a saint in 2016."],
["Holy Orders","Indulgence","The sacrament by which men are ordained as deacons, priests or bishops to serve the Church in sacred ministry. Only baptised men can receive this sacrament — a teaching the Catholic Church considers divinely established. The three degrees of Holy Orders each have specific roles: deacons serve, priests offer sacraments and bishops govern.","A remission of the temporal punishment due to sins that have already been forgiven through the Sacrament of Reconciliation. Indulgences can be partial or plenary (full) and can be applied to oneself or to souls in purgatory. The abuse of indulgences in the 16th century was one of the key triggers of Martin Luther's Protestant Reformation."]
];
const DENOM_BAPTIST_SING=[
